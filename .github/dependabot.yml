version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 2
    target-branch: "main"
    labels:
      - "build"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    versioning-strategy: lockfile-only
    target-branch: "main"
    labels:
      # Keep in sync with exempt-pr-labels in .github/workflows/stale.yml
      - "dependencies"

    cooldown:
      default-days: 14
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 14

    groups:
      patternfly:
        applies-to: version-updates
        patterns:
          - "@patternfly/*"
      react:
        applies-to: version-updates
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-router'
          - 'react-router-dom'
      fastify:
        applies-to: version-updates
        patterns:
          - '@fastify/*'
          - 'fastify*'
      all:
        applies-to: version-updates
        patterns:
          - '*'
