version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 2
    target-branch: "main"
    labels:
      - "build"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patternfly:
        applies-to: version-updates
        patterns:
          - "@patternfly/*"
      production-deps:
        applies-to: version-updates
        dependency-type: production
        exclude-patterns:
          - "@patternfly/*"
      dev-deps:
        applies-to: version-updates
        dependency-type: development
        exclude-patterns:
          - "@patternfly/*"
      security-patches:
        applies-to: security-updates

