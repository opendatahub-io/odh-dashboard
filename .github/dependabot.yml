version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 2
    target-branch: "main"
    labels:
      - "build"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    target-branch: "main"
    labels:
      # Keep in sync with exempt-pr-labels in .github/workflows/stale.yml
      - "dependencies"

    cooldown:
      default-days: 14
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 14

    # Only patch versions to limit scope during test phase
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

    groups:
      patternfly:
        applies-to: version-updates
        update-types:
          - "patch"
        patterns:
          - "@patternfly/*"
      patch-updates:
        applies-to: version-updates
        update-types:
          - "patch"
        exclude-patterns:
          - "@patternfly/*"
