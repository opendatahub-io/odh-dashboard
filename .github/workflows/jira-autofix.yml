name: Jira Autofix

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tickets:
        description: 'Comma-separated Jira ticket keys (e.g., RHOAIENG-123,RHOAIENG-456)'
        required: false
        type: string

concurrency:
  group: jira-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

env:
  JIRA_BASE_URL: https://issues.redhat.com
  JIRA_PROJECT: RHOAIENG
  MAX_ITERATIONS: 5
  # Seconds between iterations: 24h / 5 ≈ 4h48m.
  # First iteration after PR creation runs immediately; throttle applies from the second onward.
  ITERATION_INTERVAL: 17280
  LABEL_TRIGGER: jira-autofix
  LABEL_PENDING: jira-autofix-pending
  LABEL_REVIEW: jira-autofix-review
  LABEL_DONE: jira-autofix-done
  LABEL_NEEDS_INFO: jira-autofix-needs-info

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      new_matrix: ${{ steps.new_tickets.outputs.matrix }}
      has_new_tickets: ${{ steps.new_tickets.outputs.has_tickets }}
      review_matrix: ${{ steps.review_tickets.outputs.matrix }}
      has_review_tickets: ${{ steps.review_tickets.outputs.has_tickets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github/scripts/jira-autofix

      - name: Query Jira for new autofix tickets
        id: new_tickets
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          MANUAL_TICKETS: ${{ inputs.tickets }}
        run: .github/scripts/jira-autofix/fetch-tickets.sh --new

      - name: Label new tickets as pending
        if: steps.new_tickets.outputs.has_tickets == 'true'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          MATRIX_JSON: ${{ steps.new_tickets.outputs.matrix }}
        run: |
          source .github/scripts/jira-autofix/common.sh
          for key in $(echo "$MATRIX_JSON" | jq -r '.include[].key'); do
            jira_labels "$key" "$LABEL_PENDING"
            echo "Labeled $key as $LABEL_PENDING"
          done

      - name: Query Jira for review tickets
        id: review_tickets
        if: inputs.tickets == ''
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: .github/scripts/jira-autofix/fetch-tickets.sh --review

  autofix:
    needs: prepare
    if: needs.prepare.outputs.has_new_tickets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.new_matrix) }}
    env:
      TICKET_KEY: ${{ matrix.key }}
      WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch ticket details
        id: ticket
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: .github/scripts/jira-autofix/fetch-ticket.sh "$TICKET_KEY"

      - name: Create branch
        run: git checkout -b "jira-autofix/$TICKET_KEY"

      - name: Build prompt
        id: prompt
        run: .github/scripts/jira-autofix/build-prompt.sh "$TICKET_KEY" --mode autofix

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: '--model claude-opus-4-6 --max-turns 25'
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ vars.ANTHROPIC_VERTEX_PROJECT_ID }}
          CLOUD_ML_REGION: us-east5

      - name: Safety net commit
        run: |
          git reset -- .jira-ticket-context.md 2>/dev/null || true
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "$(cat <<EOF
          ${TICKET_KEY}: Automated fix

          Automated fix generated by jira-autofix using Claude Code.

          Closes ${TICKET_KEY}

          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"
          fi

      - name: Check for changes
        id: changes
        run: |
          commit_count=$(git rev-list --count HEAD ^origin/main 2>/dev/null || echo "0")
          echo "has_changes=$([[ "$commit_count" -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Handle spike findings
        if: steps.ticket.outputs.issue_type == 'Spike'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          source .github/scripts/jira-autofix/common.sh
          findings="Claude completed the investigation. See: ${WORKFLOW_URL}"
          if [[ -f .jira-findings.md ]]; then findings=$(cat .jira-findings.md); fi
          jira_comment "$TICKET_KEY" "$findings"
          jira_labels "$TICKET_KEY" "$LABEL_DONE" "$LABEL_PENDING"

      - name: Push branch and create PR
        if: steps.changes.outputs.has_changes == 'true' && steps.ticket.outputs.issue_type != 'Spike'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET_SUMMARY: ${{ steps.ticket.outputs.summary }}
        run: |
          git push -u origin "jira-autofix/$TICKET_KEY"
          title="${TICKET_KEY}: ${TICKET_SUMMARY:0:240}"
          body=$(git log --format='%b' -1 HEAD)
          if [[ -z "$body" ]]; then
            body="Automated fix for Jira ticket [${TICKET_KEY}](${JIRA_BASE_URL}/browse/${TICKET_KEY})."
          fi
          pr_url=$(gh pr create \
            --title "$title" \
            --body "$(cat <<EOF
          $body

          ---
          Jira: [${TICKET_KEY}](${JIRA_BASE_URL}/browse/${TICKET_KEY})
          EOF
          )" \
            --head "jira-autofix/$TICKET_KEY" \
            --base main)
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Update Jira with PR link
        if: steps.pr.outputs.pr_url != ''
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          source .github/scripts/jira-autofix/common.sh
          jira_comment "$TICKET_KEY" "Pull request created: ${PR_URL}"
          jira_labels "$TICKET_KEY" "$LABEL_REVIEW" "$LABEL_PENDING"

      - name: Handle no changes
        if: steps.changes.outputs.has_changes == 'false' && steps.ticket.outputs.issue_type != 'Spike'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          source .github/scripts/jira-autofix/common.sh
          jira_comment "$TICKET_KEY" "Claude analyzed the ticket but was unable to produce a code fix. Manual investigation may be needed.\n\nWorkflow run: ${WORKFLOW_URL}"
          jira_labels "$TICKET_KEY" "$LABEL_NEEDS_INFO" "$LABEL_PENDING"

      - name: Handle failure
        if: failure()
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          source .github/scripts/jira-autofix/common.sh
          jira_comment "$TICKET_KEY" "Autofix workflow failed. See: ${WORKFLOW_URL}"
          jira_labels "$TICKET_KEY" "$LABEL_NEEDS_INFO" "$LABEL_PENDING" || true

  iterate:
    needs: prepare
    if: needs.prepare.outputs.has_review_tickets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.review_matrix) }}
    env:
      TICKET_KEY: ${{ matrix.key }}
      WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pre-flight checks
        id: preflight
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: .github/scripts/jira-autofix/preflight.sh "$TICKET_KEY"

      # Clean-rewrite strategy: branch from main so each iteration starts
      # fresh, then force-push so the PR auto-updates.
      - name: Create branch from main
        if: steps.preflight.outputs.proceed == 'true'
        run: git checkout -B "jira-autofix/$TICKET_KEY"

      - name: Build prompt
        if: steps.preflight.outputs.proceed == 'true'
        id: prompt
        run: .github/scripts/jira-autofix/build-prompt.sh "$TICKET_KEY" --mode iterate

      - name: Authenticate to Google Cloud
        if: steps.preflight.outputs.proceed == 'true'
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Claude Code
        if: steps.preflight.outputs.proceed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: '--model claude-opus-4-6 --max-turns 25'
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ vars.ANTHROPIC_VERTEX_PROJECT_ID }}
          CLOUD_ML_REGION: us-east5

      - name: Safety net commit
        if: steps.preflight.outputs.proceed == 'true'
        env:
          NEXT_ITERATION: ${{ steps.preflight.outputs.next_iteration }}
        run: |
          git reset -- .jira-ticket-context.md 2>/dev/null || true
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "$(cat <<EOF
          ${TICKET_KEY}: Address review feedback (iteration ${NEXT_ITERATION})

          Automated fix addressing review comments and/or CI failures.

          Closes ${TICKET_KEY}

          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"
          fi

      - name: Force push
        if: steps.preflight.outputs.proceed == 'true'
        id: push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          commit_count=$(git rev-list --count HEAD ^origin/main 2>/dev/null || echo "0")
          if [[ "$commit_count" -eq 0 ]]; then
            echo "No changes produced — skipping push"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git push --force -u origin "jira-autofix/$TICKET_KEY" 2>&1; then
            merged=$(gh pr list --head "jira-autofix/$TICKET_KEY" --state merged --json number --limit 1)
            if [[ $(echo "$merged" | jq 'length') -gt 0 ]]; then
              echo "PR was merged (detected during push)"
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed" >&2
            exit 1
          fi
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Resolve review threads and update Jira
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ steps.preflight.outputs.pr_url }}
          NEXT_ITERATION: ${{ steps.preflight.outputs.next_iteration }}
          REVIEW_COUNT: ${{ steps.preflight.outputs.review_count }}
          HAS_CI_FAILURES: ${{ steps.preflight.outputs.has_ci_failures }}
        run: .github/scripts/jira-autofix/resolve-threads.sh "$TICKET_KEY"

      - name: Handle failure
        if: failure()
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          source .github/scripts/jira-autofix/common.sh
          jira_comment "$TICKET_KEY" "Iteration failed. See: ${WORKFLOW_URL}" || true
          jira_labels "$TICKET_KEY" "$LABEL_NEEDS_INFO" "$LABEL_REVIEW" || true
