name: Test
on: [push, pull_request]

# Concurrency control: Only run latest tests for each PR/branch
# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  DO_NOT_TRACK: 1
jobs:
  Setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate all package-lock.json files
        run: ./scripts/check-package-lock.sh --all
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
          include-modules: 'true'
          force-install: 'true'

      - name: Validate module federation ports
        run: npm run validate:ports

      - name: Check for uncommitted changes
        run: git diff --exit-code

  Type-Check:
    needs: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
          include-modules: 'true'
      - name: Cache turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            **/.turbo
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-turbo-type-check-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_VERSION }}-turbo-type-check-
      - name: Run type checks
        run: npm run type-check

  Lint:
    needs: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
          include-modules: 'true'
      - name: Cache turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            **/.turbo
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_VERSION }}-turbo-lint-
      - name: Run linting and formatting checks
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run lint

  Unit-Tests:
    needs: [Setup, Lint, Type-Check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            **/.turbo
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-turbo-unit-tests-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_VERSION }}-turbo-unit-tests-
      - name: Unit tests with coverage
        run: |
          npm run test-unit-coverage
      - name: Upload unit test coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-coverage
          path: ./jest-coverage
          if-no-files-found: error

  Get-Test-Groups:
    needs: Setup
    runs-on: ubuntu-latest
    outputs:
      test-groups: ${{ steps.set-groups.outputs.test-groups }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: set-groups
        shell: bash
        run: |
          # Generate test groups using Node.js script
          # Automatically splits large files (>15KB) into individual groups
          # Groups smaller files together
          # New test files are automatically picked up
          TEST_GROUPS=$(node scripts/generate-cypress-test-matrix.js)

          # Output for GitHub Actions matrix
          echo "test-groups=$TEST_GROUPS" >> "$GITHUB_OUTPUT"

          # Pretty print for logs
          echo "$TEST_GROUPS" | jq .

  Contract-Tests:
    needs: [Setup, Lint, Type-Check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache-dependency-path: |
            packages/model-registry/upstream/bff/go.sum
            packages/gen-ai/bff/go.sum
            packages/mlflow/bff/go.sum
            distributions/core-bff/bff/go.sum
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run contract tests
        run: |
          export GITHUB_RUN_ID="$GITHUB_RUN_ID"
          export CI="true"
          npm run test:contract
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          CI: true
      - name: Upload contract test results
        if: always()
        run: |
          # Find and upload the most recent contract test results
          LATEST_DIR=$(find packages/*/contract-tests/contract-test-results -name "ci-*" -type d 2>/dev/null | head -1)
          if [ -n "$LATEST_DIR" ] && [ -d "$LATEST_DIR" ]; then
            echo "Uploading from: $LATEST_DIR" && echo "results-dir=$LATEST_DIR" >> $GITHUB_OUTPUT
          else
            echo "No results found" && echo "results-dir=" >> $GITHUB_OUTPUT
          fi
        id: upload-results
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.upload-results.outputs.results-dir != ''
        with:
          name: contract-test-results
          path: ${{ steps.upload-results.outputs.results-dir }}

  Get-Cypress-Packages:
    needs: [Setup]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.discover.outputs.packages }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: discover
        name: Discover packages with Cypress builds
        run: |
          PACKAGES=$(npm query '.workspace' --json | jq -c '[.[] | select(.scripts."cypress:server:build:coverage" != null) | {workspace: .location, name: .name}]')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Discovered packages: $PACKAGES"

  Cypress-Setup:
    needs: [Setup, Get-Cypress-Packages]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.Get-Cypress-Packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Generate artifact name
        id: artifact
        env:
          PKG_WORKSPACE: ${{ matrix.package.workspace }}
        run: |
          # Create artifact-safe name by replacing / with -
          ARTIFACT_NAME=$(echo "$PKG_WORKSPACE" | tr '/' '-')
          echo "artifact-name=cypress-build-${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
          include-modules: 'true'
      - name: Build ${{ matrix.package.name }} for cypress
        env:
          PKG_NAME: ${{ matrix.package.name }}
        run: npm run cypress:server:build:coverage -w "$PKG_NAME"
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.artifact.outputs.artifact-name }}
          path: ${{ matrix.package.workspace }}/**/public-cypress
          retention-days: 1

  Cypress-Mock-Tests:
    needs: [Setup, Lint, Type-Check, Cypress-Setup, Get-Test-Groups, Get-Cypress-Packages]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.Get-Test-Groups.outputs.test-groups) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Module caches
        uses: ./.github/actions/module-caches
        with:
          node-version: ${{ env.NODE_VERSION }}
          include-modules: 'true'
      - name: Download all Cypress build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cypress-build-*
          path: cypress-artifacts
      - name: Restore artifact structure
        env:
          PACKAGES_JSON: ${{ needs.Get-Cypress-Packages.outputs.packages }}
        run: |
          # Move artifacts from cypress-artifacts/cypress-build-{name}/**/public-cypress
          # to the expected {workspace}/**/public-cypress location
          PACKAGES="$PACKAGES_JSON"

          while IFS= read -r pkg_json; do
            workspace=$(echo "$pkg_json" | jq -r '.workspace')
            name=$(echo "$pkg_json" | jq -r '.name')

            # Artifact name is workspace path with / replaced by -
            artifact_name=$(echo "$workspace" | tr '/' '-')
            artifact_dir="cypress-artifacts/cypress-build-${artifact_name}"

            if [ -d "$artifact_dir" ]; then
              echo "Restoring build for $name from $artifact_dir to $workspace"
              # Copy preserving structure (e.g., frontend/public-cypress)
              cp -r "$artifact_dir"/* "$workspace/" 2>/dev/null || true
            else
              echo "::warning::Artifact directory not found: $artifact_dir"
            fi
          done < <(echo "$PACKAGES" | jq -c '.[]')

          # Cleanup temporary artifact directory
          rm -rf cypress-artifacts
      - name: Verify builds exist
        id: verify
        env:
          PACKAGES_JSON: ${{ needs.Get-Cypress-Packages.outputs.packages }}
        run: |
          MISSING=0
          PACKAGES="$PACKAGES_JSON"

          while IFS= read -r pkg_json; do
            workspace=$(echo "$pkg_json" | jq -r '.workspace')
            name=$(echo "$pkg_json" | jq -r '.name')

            # Look for public-cypress at any depth within the workspace (matches upload pattern)
            if ! find "$workspace" -type d -name "public-cypress" -print -quit | grep -q .; then
              echo "Missing build for $name in $workspace/**/public-cypress"
              MISSING=1
            else
              BUILD_PATH=$(find "$workspace" -type d -name "public-cypress" -print -quit)
              echo "✅ Found build for $name at $BUILD_PATH"
            fi
          done < <(echo "$PACKAGES" | jq -c '.[]')

          echo "needs-rebuild=$MISSING" >> $GITHUB_OUTPUT
      - name: Rebuild on missing artifacts
        if: steps.verify.outputs.needs-rebuild == '1'
        run: |
          echo "::warning::Some Cypress builds missing — rebuilding all"
          npm run cypress:server:build:coverage -- --concurrency=4
      - name: Run Cypress Mock tests
        env:
          CYPRESS_SPEC: ${{ matrix.test-group.spec }}
        run: |
          npm run test:cypress-ci:coverage:nobuild -- --spec "../packages/${CYPRESS_SPEC}"
        working-directory: ./frontend
      - name: Test group name
        if: ${{ always() }}
        env:
          TEST_GROUP_RAW: ${{ matrix.test-group.name }}
        run: echo "TEST_GROUP_NAME=$(echo "${TEST_GROUP_RAW}" | tr '/-' '_')" >> $GITHUB_ENV
      - name: Upload Cypress Mock results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: cypress-results-${{ env.TEST_GROUP_NAME }}
          path: ./packages/cypress/results/mocked
      - name: Upload Cypress coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cypress-coverage-${{ env.TEST_GROUP_NAME }}
          path: ./packages/cypress/coverage

  Combine-Results-and-Upload:
    needs: [Unit-Tests, Cypress-Mock-Tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: all-artifacts
      - name: Install dependencies
        run: npm install nyc --no-save
      - name: Combine coverage reports
        run: |
          mkdir -p ./coverage
          cp all-artifacts/unit-coverage/coverage-final.json ./coverage/unit-coverage-final.json || true
          find all-artifacts -name "cypress-coverage-*" -type d | while read dir; do
          group_name=$(basename "$dir")
          cp "$dir/coverage-final.json" "./coverage/${group_name}-coverage-final.json" || true
          done
          echo "Combined coverage files:"
          ls -R ./coverage
      - name: Merge coverage reports
        run: |
          npx nyc merge ./coverage ./coverage/merged-coverage.json
          echo "Cleaning up merged coverage file..."
          jq 'del(.[] | select(.statementMap == {}))' ./coverage/merged-coverage.json > ./coverage/cleaned-coverage.json
          mv ./coverage/cleaned-coverage.json ./coverage/merged-coverage.json
      - name: Generate coverage report
        run: |
          mkdir -p ./coverage/report
          npx nyc report --reporter=html --reporter=text-summary --temp-directory ./coverage -t ./coverage --report-dir ./coverage/report
          cp ./coverage/unit-coverage-final.json ./coverage/combined-coverage-final.json || true
      - name: Upload combined results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: combined-coverage-results
          path: ./coverage/combined-coverage-final.json
      - name: Cleanup interim coverage files
        run: |
          rm -rf ./coverage/unit-coverage-final.json
          find ./coverage -name "*-coverage-final.json" -type f -delete
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          name: frontend-and-backend
          file: ./coverage/merged-coverage.json
          disable_search: true
          directory: ./coverage
          verbose: true

  Tests:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - Lint
      - Type-Check
      - Unit-Tests
      - Contract-Tests
      - Cypress-Mock-Tests
      - Combine-Results-and-Upload
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required jobs failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "All required jobs have successfully completed for Node.js ${{ env.NODE_VERSION }}."
