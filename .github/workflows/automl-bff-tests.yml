name: Test / AutoML BFF Tests
on:
  push:
    paths:
      - "packages/automl/**"
      - "!LICENSE*"
      - "!DOCKERFILE*"
      - "!**.gitignore"
      - "!**.md"

  pull_request:
    paths:
      - "packages/automl/**"
      - ".github/workflows/automl-bff-tests.yml"
      - "!LICENSE*"
      - "!DOCKERFILE*"
      - "!**.gitignore"
      - "!**.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.x"

      - name: Lint
        working-directory: packages/automl/bff
        run: make lint

      - name: Build (BFF)
        working-directory: packages/automl/bff
        run: make build

      - name: Test (BFF)
        working-directory: packages/automl/bff
        run: make test

      - name: Check if there are uncommitted file changes
        working-directory: packages/automl
        run: |
          clean=$(git status --porcelain)
          if [[ -z "$clean" ]]; then
              echo "Empty git status --porcelain: $clean"
          else
              echo "Uncommitted file changes detected: $clean"
              git diff
              exit 1
          fi
