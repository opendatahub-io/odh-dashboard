name: Dependency Validation

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/*/frontend/package.json"
      - "packages/*/frontend/package-lock.json"
      - "packages/*/upstream/frontend/package.json"
      - "packages/*/upstream/frontend/package-lock.json"
      - "packages/*/upstream/workspaces/frontend/package.json"
      - "packages/*/upstream/workspaces/frontend/package-lock.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

jobs:
  detect-dirs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dirs: ${{ steps.dirs.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed package directories
        id: dirs
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- \
            'package.json' 'package-lock.json' \
            'packages/*/frontend/package.json' 'packages/*/frontend/package-lock.json' \
            'packages/*/upstream/frontend/package.json' 'packages/*/upstream/frontend/package-lock.json' \
            'packages/*/upstream/workspaces/frontend/package.json' 'packages/*/upstream/workspaces/frontend/package-lock.json')

          DIRS="[]"
          if echo "$CHANGED" | grep -qE '^package(-lock)?\.json$'; then
            DIRS=$(echo "$DIRS" | jq '. + ["."]')
          fi

          for dir in $(echo "$CHANGED" | grep -oE '^packages/[^/]+(/upstream)?(/workspaces)?/frontend' | sort -u); do
            DIRS=$(echo "$DIRS" | jq --arg d "$dir" '. + [$d]')
          done

          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
          echo "Directories to audit: $DIRS"

  audit:
    needs: detect-dirs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-audit') && needs.detect-dirs.outputs.dirs != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.detect-dirs.outputs.dirs) }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.dir }}

      - name: Run npm audit
        id: audit
        working-directory: ${{ matrix.dir }}
        run: |
          set +e
          npm audit --audit-level=high --json > audit-head.json 2>&1
          AUDIT_EXIT=$?
          set -e

          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-head.json)
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-head.json)
          TOTAL=$(jq '.metadata.vulnerabilities.total // 0' audit-head.json)

          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

      - name: Checkout base for comparison
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Run npm audit on base
        id: audit-base
        run: |
          cd base/${{ matrix.dir }}
          npm ci
          set +e
          npm audit --audit-level=high --json > audit-base.json 2>&1
          set -e

          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-base.json)
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-base.json)
          TOTAL=$(jq '.metadata.vulnerabilities.total // 0' audit-base.json)

          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Fail if new high/critical CVEs introduced
        if: fromJSON(steps.audit.outputs.high) > fromJSON(steps.audit-base.outputs.high) || fromJSON(steps.audit.outputs.critical) > fromJSON(steps.audit-base.outputs.critical)
        run: |
          echo "::error::PR introduces new high/critical vulnerabilities in ${{ matrix.dir }}."
          echo "Base: ${{ steps.audit-base.outputs.high }} high, ${{ steps.audit-base.outputs.critical }} critical"
          echo "Head: ${{ steps.audit.outputs.high }} high, ${{ steps.audit.outputs.critical }} critical"
          exit 1

  override-consistency:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check override consistency
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const found = execSync(
            'find . -name package.json -not -path \"*/node_modules/*\" -not -path \"*/base/*\"',
            { encoding: 'utf8' }
          ).trim().split('\n').filter(Boolean).map(p => p.replace(/^\.\//, ''));

          const overrides = {};
          let hasError = false;

          for (const p of found) {
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (!pkg.overrides) continue;

            for (const [key, value] of Object.entries(pkg.overrides)) {
              if (typeof value === 'string') {
                if (!overrides[key]) overrides[key] = {};
                overrides[key][p] = value;
              }
            }
          }

          for (const [dep, locations] of Object.entries(overrides)) {
            const values = Object.values(locations);
            if (new Set(values).size > 1) {
              console.error('Override mismatch for ' + dep + ':');
              for (const [file, ver] of Object.entries(locations)) {
                console.error('  ' + file + ': ' + ver);
              }
              hasError = true;
            }
          }

          if (hasError) {
            console.error('Override ranges diverge across package.json files.');
            process.exit(1);
          } else {
            console.log('All shared overrides are consistent (' + found.length + ' files checked).');
          }
          "

  dependency-summary:
    needs: detect-dirs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Generate dependency diff summary
        id: diff
        env:
          CHANGED_DIRS: ${{ needs.detect-dirs.outputs.dirs }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dirs = JSON.parse(process.env.CHANGED_DIRS || '[]');
          const marker = '<!-- dependency-validation -->';

          const lockfiles = dirs
            .map(d => d === '.' ? 'package-lock.json' : path.join(d, 'package-lock.json'))
            .filter(f => fs.existsSync(f) && fs.existsSync(path.join('base', f)));

          if (lockfiles.length === 0) {
            fs.writeFileSync('dep-summary.md', marker + '\nNo dependency version changes detected.\n');
            process.exit(0);
          }

          const changes = [];
          for (const lockfile of lockfiles) {
            const baseLock = JSON.parse(fs.readFileSync(path.join('base', lockfile), 'utf8'));
            const headLock = JSON.parse(fs.readFileSync(lockfile, 'utf8'));
            const basePkgs = baseLock.packages || {};
            const headPkgs = headLock.packages || {};
            const dir = path.dirname(lockfile);
            const prefix = dir === '.' ? '' : dir + ': ';

            for (const [name, info] of Object.entries(headPkgs)) {
              const basePkg = basePkgs[name];
              const short = prefix + name.replace('node_modules/', '');
              if (!basePkg) {
                changes.push('| \`' + short + '\` | — | ' + info.version + ' | Added |');
              } else if (basePkg.version !== info.version) {
                changes.push('| \`' + short + '\` | ' + basePkg.version + ' | ' + info.version + ' | Updated |');
              }
            }
            for (const name of Object.keys(basePkgs)) {
              if (!headPkgs[name]) {
                const short = prefix + name.replace('node_modules/', '');
                changes.push('| \`' + short + '\` | ' + basePkgs[name].version + ' | — | Removed |');
              }
            }
          }

          if (changes.length === 0) {
            fs.writeFileSync('dep-summary.md', marker + '\nNo dependency version changes detected.\n');
          } else {
            const header = '## Dependency Changes\n\n| Package | Before | After | Status |\n|---------|--------|-------|--------|\n';
            const limited = changes.slice(0, 50);
            let body = marker + '\n' + header + limited.join('\n') + '\n';
            if (changes.length > 50) {
              body += '\n*...and ' + (changes.length - 50) + ' more changes.*\n';
            }
            fs.writeFileSync('dep-summary.md', body);
          }
          "

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('dep-summary.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('<!-- dependency-validation -->')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
