name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'opendatahub-io/odh-dashboard'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3

      - name: Check for upstream changes
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          upstream_files=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" \
            --paginate -q '.[].filename | select(contains("/upstream/"))' || true)

          if [ -n "$upstream_files" ]; then
            echo "PR modifies upstream files:"
            echo "$upstream_files"
            echo "touches_upstream=true" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream files modified"
            echo "touches_upstream=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check eligibility
        id: check
        env:
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          PREV_VERSION: ${{ steps.metadata.outputs.previous-version }}
          TOUCHES_UPSTREAM: ${{ steps.upstream.outputs.touches_upstream }}
        run: |
          if [ "$TOUCHES_UPSTREAM" = "true" ]; then
            echo "Not eligible: PR modifies upstream files"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          elif [ "$ECOSYSTEM" != "npm_and_yarn" ]; then
            echo "Not eligible: ecosystem=$ECOSYSTEM"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          elif [ "$UPDATE_TYPE" = "version-update:semver-patch" ]; then
            echo "Eligible: patch update"
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          elif [ "$UPDATE_TYPE" = "version-update:semver-minor" ]; then
            # Block auto-merge for pre-1.0 packages (0.x minor bumps can be breaking).
            # This relies on previous-version which is only set for individual PRs.
            # Grouped PRs (patternfly, react, fastify) are assumed >= 1.0.
            # If a 0.x package is added to a named group, this check will NOT catch it.
            if [ -n "$PREV_VERSION" ] && echo "$PREV_VERSION" | grep -q '^0\.'; then
              echo "Not eligible: minor update on pre-1.0 package ($PREV_VERSION)"
              echo "eligible=false" >> "$GITHUB_OUTPUT"
            else
              echo "Eligible: minor update (stable package)"
              echo "eligible=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Not eligible: update-type=$UPDATE_TYPE"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply merge labels
        if: steps.check.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "Adding lgtm and approved labels to $PR_URL"
          gh pr edit "$PR_URL" --add-label "lgtm,approved"
          echo "::notice::Labels applied successfully"

      - name: Summary
        env:
          DEPS: ${{ steps.metadata.outputs.dependency-names }}
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          PREV_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          ELIGIBLE: ${{ steps.check.outputs.eligible }}
          TOUCHES_UPSTREAM: ${{ steps.upstream.outputs.touches_upstream }}
        run: |
          if [ "$ELIGIBLE" = "true" ]; then
            echo "### ✅ Auto-merge labels applied" | tee -a "$GITHUB_STEP_SUMMARY"
          elif [ "$TOUCHES_UPSTREAM" = "true" ]; then
            echo "### ⏭️ Skipped — PR modifies upstream (subtree) files" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⏭️ Skipped — not eligible for auto-merge" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Ecosystem:** \`$ECOSYSTEM\`" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- **Update type:** \`$UPDATE_TYPE\`" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- **Dependencies:** \`$DEPS\`" | tee -a "$GITHUB_STEP_SUMMARY"

          if ! echo "$DEPS" | grep -q ","; then
            echo "- **Version:** \`$PREV_VERSION\` → \`$NEW_VERSION\`" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
