name: Dependabot Auto-merge

on:
  # Trigger after the Dependency Validation workflow completes on Dependabot PRs.
  workflow_run:
    workflows: ["Dependency Validation"]
    types:
      - completed

  # Safety-net for edge cases (dropped events, races, Prow status delays).
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Find Dependabot PR from workflow run
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          if [[ ! "$HEAD_BRANCH" =~ ^dependabot/ ]]; then
            echo "Not a Dependabot branch, skipping"
            exit 0
          fi

          PR_NUMBER=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --json number,author --jq '.[] | select(.author.login == "dependabot[bot]") | .number' \
            --repo "$REPO" | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "No Dependabot PR found for branch $HEAD_BRANCH"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Verify all checks passed
        id: checks
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          FAILING=$(gh pr checks "$PR_NUMBER" --repo "$REPO" \
            --json name,state --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')

          echo "Non-passing checks: $FAILING"

          if [ "$FAILING" != "0" ]; then
            echo "Not all checks have passed, skipping"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Apply lgtm and approved labels for patch updates
        if: steps.checks.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          HAS_PATCH_LABEL=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels --jq '[.labels[].name] | index("version-update:semver-patch") != null')

          if [ "$HAS_PATCH_LABEL" != "true" ]; then
            echo "PR #$PR_NUMBER is not a semver-patch update, skipping"
            exit 0
          fi

          gh pr edit "$PR_NUMBER" --repo "$REPO" \
            --add-label "lgtm,approved"

  # Safety-net sweep: catches any Dependabot PRs that slipped through
  # the event-driven paths (dropped events, races, etc.).
  auto-merge-sweep:
    if: github.event_name == 'schedule' && github.repository == 'opendatahub-io/odh-dashboard'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Find patch-level Dependabot PRs missing merge labels
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          NUMBERS=$(gh pr list \
            --state open \
            --label version-update:semver-patch \
            --json number,author,labels \
            --jq '[.[] | select(
              .author.login == "dependabot[bot]" and
              (([.labels[].name] | index("lgtm")) == null or
               ([.labels[].name] | index("approved")) == null)
            )] | .[].number' \
            --repo "$REPO" | tr '\n' ' ')
          echo "numbers=$NUMBERS" >> "$GITHUB_OUTPUT"

      - name: Label ready PRs
        if: steps.prs.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBERS: ${{ steps.prs.outputs.numbers }}
        run: |
          for PR_NUMBER in $PR_NUMBERS; do
            echo "--- Checking PR #$PR_NUMBER ---"

            FAILING=$(gh pr checks "$PR_NUMBER" --repo "$REPO" \
              --json name,state --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length' 2>/dev/null || echo "unknown")

            if [ "$FAILING" != "0" ]; then
              echo "PR #$PR_NUMBER has non-passing checks — not ready"
              continue
            fi

            echo "All checks passed — labelling PR #$PR_NUMBER"
            gh pr edit "$PR_NUMBER" --repo "$REPO" \
              --add-label "lgtm,approved"
          done
