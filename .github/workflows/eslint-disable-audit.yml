name: Test / ESLint Disable Audit
on:
  pull_request:
    branches: [main]
  push:
    branches: [RHOAIENG-56189/eslint-disable-audit]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

jobs:
  Audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run unit tests
        run: node --test scripts/eslint-disable-audit.test.mjs

      - name: Run audit against baseline
        run: node scripts/eslint-disable-audit.mjs --baseline scripts/eslint-disable-baseline.json --fail-on-increase
