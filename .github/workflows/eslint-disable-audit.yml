name: Test / ESLint Disable Audit
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

permissions:
  contents: read

jobs:
  Unit-Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run unit tests
        run: node --test scripts/eslint-disable-audit.test.mjs

  Audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute merge base
        run: echo "MERGE_BASE=$(git merge-base HEAD origin/${{ github.base_ref }})" >> "$GITHUB_ENV"

      - name: Run diff-scoped audit
        run: |
          node scripts/eslint-disable-audit.mjs \
            --diff-base "$MERGE_BASE" \
            --fail-on-increase \
            --json --output-file audit-results.json \
            --github-summary "$GITHUB_STEP_SUMMARY" \
            --github-annotations

      - name: Save PR number
        if: always()
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-disable-audit
          path: |
            audit-results.json
            pr-number.txt
          retention-days: 90

  Repo-Report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run repo-wide audit
        run: |
          node scripts/eslint-disable-audit.mjs \
            --json --output-file audit-results.json \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: eslint-disable-audit
          path: audit-results.json
          retention-days: 90
