name: 'Free Disk Space'
description: >
  Remove large pre-installed toolchains that are unused by this repository's
  workflows (dotnet, android, ghc, boost, graalvm, swift) and prune the Docker
  layer cache. Frees ~20 GB on a standard GitHub-hosted runner.
runs:
  using: composite
  steps:
    - name: Free disk space
      shell: bash
      run: |
        echo "::group::Disk usage before cleanup"
        df -h
        echo "::endgroup::"
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup \
          /usr/share/swift || true
        docker system prune -af || true
        echo "::group::Disk usage after cleanup"
        df -h
        echo "::endgroup::"
