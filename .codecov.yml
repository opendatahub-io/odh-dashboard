codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "50...70"
  status:
    project:
      default:
        informational: true
        target: auto
        threshold: 1%
      unit:
        informational: true
        target: auto
        threshold: 1%
        flags:
          - unit
      cypress-mock:
        informational: true
        target: auto
        threshold: 1%
        flags:
          - cypress-mock
      cypress-e2e:
        informational: true
        target: auto
        threshold: 1%
        flags:
          - cypress-e2e
    patch:
      default:
        informational: true
        target: 70%
      unit:
        informational: true
        target: 50%
        flags:
          - unit
      cypress-mock:
        informational: true
        target: 50%
        flags:
          - cypress-mock
      cypress-e2e:
        informational: true
        target: auto
        flags:
          - cypress-e2e

flags:
  unit:
    paths:
      - frontend/src/
      - backend/src/
      - packages/
      - distributions/
    carryforward: true
  cypress-mock:
    paths:
      - frontend/src/
      - packages/
    carryforward: true
  cypress-e2e:
    paths:
      - frontend/src/
      - packages/
    carryforward: true

ignore:
  - "**/*Types.ts"
  - "**/*types.ts"
  - "**/*.d.ts"
  - "**/third_party/**"
  - "packages/eslint-config/**"
  - "packages/eslint-plugin/**"
  - "packages/tsconfig/**"
  - "packages/contract-tests/**"
  - "packages/cypress/**"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: frontend-core
      name: "Frontend Core"
      paths:
        - frontend/src/**
    - component_id: backend
      name: "Backend"
      paths:
        - backend/src/**
    - component_id: pkg-gen-ai
      name: "Gen AI"
      paths:
        - packages/gen-ai/**
    - component_id: pkg-model-registry
      name: "Model Registry"
      paths:
        - packages/model-registry/**
    - component_id: pkg-model-serving
      name: "Model Serving"
      paths:
        - packages/model-serving/**
    - component_id: pkg-eval-hub
      name: "Eval Hub"
      paths:
        - packages/eval-hub/**
    - component_id: pkg-maas
      name: "MaaS"
      paths:
        - packages/maas/**
    - component_id: pkg-agent-ops
      name: "Agent Ops"
      paths:
        - packages/agent-ops/**
    - component_id: pkg-automl
      name: "AutoML"
      paths:
        - packages/automl/**
    - component_id: pkg-autorag
      name: "AutoRAG"
      paths:
        - packages/autorag/**
    - component_id: pkg-notebooks
      name: "Notebooks"
      paths:
        - packages/notebooks/**
    - component_id: pkg-observability
      name: "Observability"
      paths:
        - packages/observability/**
    - component_id: pkg-mlflow
      name: "MLflow"
      paths:
        - packages/mlflow-embedded/**
    - component_id: pkg-gpuaas
      name: "GPUaaS"
      paths:
        - packages/gpuaas/**
    - component_id: pkg-model-training
      name: "Model Training"
      paths:
        - packages/model-training/**
    - component_id: distributions
      name: "Distributions"
      paths:
        - distributions/**
