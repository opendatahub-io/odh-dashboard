apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opendatahub

resources:
- ../../../core-bff/manifests/base
- api-tester.yaml

patches:
- target:
    kind: Deployment
    name: rhaii-dashboard
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: user_token
