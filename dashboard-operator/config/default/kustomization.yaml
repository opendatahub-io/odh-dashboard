apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opendatahub
namePrefix: odh-
resources:
  - ../crd
  - ../rbac
  - ../manager
  - ../webhook
replacements:
  - source:
      kind: Certificate
      name: dashboard-operator-webhook-cert
      fieldPath: metadata.namespace
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: /
          index: 0
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - webhooks.0.clientConfig.service.namespace
  - source:
      kind: Certificate
      name: dashboard-operator-metrics-cert
      fieldPath: metadata.namespace
    targets:
      - select:
          kind: Service
          name: dashboard-operator-metrics-service
        fieldPaths:
          - metadata.namespace
