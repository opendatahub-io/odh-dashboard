apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: dashboard-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: CERTIFICATE_NAMESPACE/dashboard-operator-webhook-cert
webhooks:
  - name: validate.dashboards.components.platform.opendatahub.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: dashboard-operator-webhook-service
        namespace: system
        path: /validate-dashboard
    rules:
      - apiGroups:
          - components.platform.opendatahub.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - dashboards
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-operator-webhook-service
  namespace: system
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    app.kubernetes.io/name: dashboard-operator
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dashboard-operator-webhook-cert
  namespace: system
spec:
  dnsNames:
    - dashboard-operator-webhook-service.system.svc
    - dashboard-operator-webhook-service.system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: dashboard-operator-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-operator-metrics-service
  namespace: system
spec:
  ports:
    - port: 8443
      protocol: TCP
      targetPort: 8443
      name: https
  selector:
    app.kubernetes.io/name: dashboard-operator
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dashboard-operator-metrics-cert
  namespace: system
spec:
  dnsNames:
    - dashboard-operator-metrics-service.system.svc
    - dashboard-operator-metrics-service.system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: dashboard-operator-metrics-tls
