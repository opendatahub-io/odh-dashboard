apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.configMapName" . }}
  namespace: {{ include "dashboard.namespace" . }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    platform.opendatahub.io/managed: "true"
data:
{{- range $key, $value := .Values.config.data }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
