kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: model-serving-llmisvcconfig-role
rules:
  - apiGroups:
      - serving.kserve.io
    verbs:
      - get
      - list
      - watch
    resources:
      - llminferenceserviceconfigs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-serving-llmisvcconfig-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-serving-llmisvcconfig-role
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
