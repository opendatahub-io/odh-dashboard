# Grants authenticated users the minimum reads needed to resolve RayCluster
# dashboard hyperlinks (RHOAIENG-62527 follow-up for non-admin users).
#
# HTTPRoute: Role + RoleBinding in the applications namespace (get only).
# Gateway: Role + RoleBinding intended for openshift-ingress (get on
# data-science-gateway only). The dashboard-operator remaps these to
# openshift-ingress after kustomize WithNamespace(apps).
# GatewayConfig: ClusterRole + ClusterRoleBinding (cluster-scoped get on
# default-gateway only).
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: fetch-ray-httproutes-role
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fetch-ray-httproutes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fetch-ray-httproutes-role
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: fetch-ray-data-science-gateway
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    resourceNames:
      - data-science-gateway
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fetch-ray-data-science-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fetch-ray-data-science-gateway
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: fetch-ray-dashboard-gatewayconfig
rules:
  - apiGroups:
      - services.platform.opendatahub.io
    resources:
      - gatewayconfigs
    resourceNames:
      - default-gateway
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fetch-ray-dashboard-gatewayconfig
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fetch-ray-dashboard-gatewayconfig
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
