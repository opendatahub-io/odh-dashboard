# Grants authenticated users the minimum reads needed to resolve RayCluster
# dashboard hyperlinks (RHOAIENG-62527 follow-up for non-admin users).
#
# HTTPRoute lives in the applications namespace (Role + RoleBinding).
# Gateway is in openshift-ingress and GatewayConfig is cluster-scoped, so those
# require ClusterRole + ClusterRoleBinding with resourceNames (Staff+ approved
# exception to the usual "no ClusterRoleBinding in all-users" guidance).
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: fetch-ray-httproutes-role
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fetch-ray-httproutes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fetch-ray-httproutes-role
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: fetch-ray-dashboard-gateway
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    resourceNames:
      - data-science-gateway
    verbs:
      - get
  - apiGroups:
      - services.platform.opendatahub.io
    resources:
      - gatewayconfigs
    resourceNames:
      - default-gateway
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fetch-ray-dashboard-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fetch-ray-dashboard-gateway
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
