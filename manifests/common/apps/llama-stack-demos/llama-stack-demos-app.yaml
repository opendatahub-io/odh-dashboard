  getStartedMarkDown: >-
    # Llama Stack Demos

    A progressive learning path for building AI applications with Llama
    Stack on OpenShift AI. Six core phases take you from basic setup through
    production-ready applications, plus specialized advanced demos.

    ## Learning Path

    1. **Foundations** -- Client setup, chat completions, vector DB basics

    2. **Responses API** -- Tool calling, conversations, streaming, formats

    3. **RAG** -- Retrieval-augmented generation with Milvus and FAISS

    4. **Agents** -- Simple to advanced agents with tools and RAG

    5. **Observability** -- OpenTelemetry, Jaeger, Prometheus, Grafana

    6. **OpenAI Compatibility** -- Use existing OpenAI code with Llama Stack

    Plus specialized demos for A2A multi-agent systems, client tools,
    and RAG evaluation.

    ## Getting Started

    1. Clone the repository from GitHub.

    2. Install dependencies with `pip install -e .`

    3. Start with demo 01 and work through progressively, or jump
    directly to advanced demos.

    Each demo includes runnable Python scripts with step-by-step examples.
  description: >-
    Progressive learning path for building AI applications with Llama Stack,
