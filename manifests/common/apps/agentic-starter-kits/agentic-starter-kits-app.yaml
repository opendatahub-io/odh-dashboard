  getStartedMarkDown: >-
    # Agentic Starter Kits

    Reference implementations for building AI agents on OpenShift AI using
    Llama Stack. Ready-to-deploy agent patterns covering common agentic
    architectures across multiple frameworks.

    ## Available Agents

    - **LangGraph ReAct Agent** -- General-purpose agent using a ReAct
    loop with tool calling

    - **LangGraph Agentic RAG** -- RAG agent with Milvus vector store
    for knowledge-grounded answers

    - **LangGraph ReAct + DB Memory** -- ReAct agent with PostgreSQL-backed
    conversation memory and FIFO sliding window

    - **LangGraph Human-in-the-Loop** -- Agent that pauses for human
    approval before running sensitive tools

    - **LlamaIndex WebSearch Agent** -- Event-driven agent with web search
    tool integration

    - **CrewAI WebSearch Agent** -- CrewAI-based agent with web search

    - **Vanilla Python OpenAI Responses** -- Minimal agent using only the
    OpenAI Python client with no framework dependencies

    - **AutoGen MCP Agent** -- AutoGen AssistantAgent with MCP tools over SSE

    - **Langflow Tool-Calling Agent** -- Visual flow-based agent with
    weather, air quality, and NPS tools

    - **Google ADK 2.0 Agent** -- Agent using Google Agent Development Kit
    with LiteLLM routing to Llama Stack

    - **A2A LangGraph + CrewAI** -- Agent-to-Agent example with CrewAI
    specialist and LangGraph orchestrator

    ## Getting Started

    1. Clone the repository from GitHub.

    2. Choose an agent pattern organized by framework.

    3. Follow the agent-specific README to configure environment variables
    and deploy locally with Ollama or on OpenShift.

    Each agent exposes a FastAPI server with `/chat` and `/health` endpoints.
  description: >-
    Production-ready agent templates for OpenShift AI featuring LangGraph,
    LlamaIndex, CrewAI, AutoGen, Langflow, Google ADK, A2A, and vanilla
