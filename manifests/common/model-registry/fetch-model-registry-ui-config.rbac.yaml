kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: fetch-model-registry-ui-config-role
rules:
  - apiGroups:
      - ""
    verbs:
      - get
    resources:
      - configmaps
    resourceNames:
      - model-registry-ui-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fetch-model-registry-ui-config-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fetch-model-registry-ui-config-role
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
