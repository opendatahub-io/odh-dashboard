apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: odhdashboardconfigs.opendatahub.io
spec:
  group: opendatahub.io
  scope: Namespaced
  names:
    plural: odhdashboardconfigs
    singular: odhdashboardconfig
    kind: OdhDashboardConfig
  versions:
    - name: v1alpha
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                # TODO: for v1 we should fix the "disabled" prefix
                dashboardConfig:
                  description: 'Feature flag configurations; intended to just contain overrides'
                  type: object
                  properties:
                    enablement:
                      type: boolean
                      description: 'When true, enables the ability to install and manage ISV applications from the Explore page.'
                    disableInfo:
                      type: boolean
                      description: 'When true, hides the information panel for applications on the Explore page.'
                    disableSupport:
                      type: boolean
                      description: 'When true, hides the support link from the dashboard toolbar.'
                    disableClusterManager:
                      type: boolean
                      description: 'When true, hides the Cluster Settings page from the dashboard navigation.'
                    disableTracking:
                      type: boolean
                      description: 'When true, disables usage analytics and telemetry tracking in the dashboard.'
                    disableBYONImageStream:
                      type: boolean
                      description: 'When true, hides the Notebook images (Bring Your Own Notebook) administration page.'
                    disableISVBadges:
                      type: boolean
                      description: 'When true, hides ISV partner badges on application cards.'
                    disableUserManagement:
                      type: boolean
                      description: 'When true, hides the User Management administration page.'
                    disableHome:
                      type: boolean
                      description: 'When true, hides the Home page from the dashboard navigation.'
                    disableProjects:
                      type: boolean
                      description: 'When true, hides the Data Science Projects page from the dashboard navigation.'
                    disableProjectScoped:
                      type: boolean
                      description: 'When true, disables project-scoped navigation mode for workbenches and model serving.'
                    disableModelServing:
                      type: boolean
                      description: 'When true, hides the Model Serving pages and disables model deployment features.'
                    disableProjectSharing:
                      type: boolean
                      description: 'When true, hides the project sharing and permissions tab within Data Science Projects.'
                    disableCustomServingRuntimes:
                      type: boolean
                      description: 'When true, hides the Serving Runtimes administration page for managing custom runtimes.'
                    disablePipelines:
                      type: boolean
                      description: 'When true, hides the Data Science Pipelines pages and disables pipeline features.'
                    disableTrustyBiasMetrics:
                      type: boolean
                      description: 'When true, hides the TrustyAI bias metrics tab on model serving pages.'
                    disablePerformanceMetrics:
                      type: boolean
                      description: 'When true, hides performance metrics on model serving pages.'
                    disableKServe:
                      type: boolean
                      description: 'When true, disables KServe single-model serving platform features.'
                    disableKServeAuth:
                      type: boolean
                      description: 'When true, disables token authentication configuration for KServe deployments.'
                    disableKServeMetrics:
                      type: boolean
                      description: 'When true, hides the metrics tab for KServe model deployments.'
                    disableKServeRaw:
                      type: boolean
                      description: 'When true, disables the raw (non-serverless) deployment mode for KServe.'
                    disableModelMesh:
                      type: boolean
                      description: 'DEPRECATED: ModelMesh has been removed. This field will be removed in a future version.'
                    disableAcceleratorProfiles:
                      type: boolean
                      description: 'DEPRECATED: Accelerator Profiles are replaced by Hardware Profiles. This field will be removed in a future version.'
                    disableHardwareProfiles:
                      type: boolean
                      description: 'DEPRECATED: Hardware Profiles are GA and cannot be disabled via this field. This field will be removed in a future version.'
                    disableFineTuning:
                      type: boolean
                      description: 'DEPRECATED: This field is no longer used and will be removed in a future version.'
                    disableDistributedWorkloads:
                      type: boolean
                      description: 'When true, hides the Distributed Workloads pages from the dashboard navigation.'
                    disableModelCatalog:
                      type: boolean
                      description: 'When true, hides the Model Catalog page from the dashboard navigation.'
                    disableModelRegistry:
                      type: boolean
                      description: 'When true, hides the Model Registry pages from the dashboard navigation.'
                    disableModelRegistrySecureDB:
                      type: boolean
                      description: 'When true, hides the secure database connection options in the Model Registry settings.'
                    disableServingRuntimeParams:
                      type: boolean
                      description: 'When true, hides the runtime parameters configuration on KServe model deployment forms.'
                    disableStorageClasses:
                      type: boolean
                      description: 'When true, hides the Storage Classes administration page.'
                    disableNIMModelServing:
                      type: boolean
                      description: 'When true, disables NVIDIA NIM model serving features.'
                    disableAdminConnectionTypes:
                      type: boolean
                      description: 'When true, hides the Connection Types administration page.'
                    disableKueue:
                      type: boolean
                      description: 'When true, disables Kueue workload queue management features.'
                    disableLMEval:
                      type: boolean
                      description: 'When true, disables the Language Model Evaluation (LM Eval) features.'
                    disableFeatureStore:
                      type: boolean
                      description: 'When true, hides the Feature Store pages from the dashboard navigation.'
                    genAiStudio:
                      type: boolean
                      description: 'When true, enables the Gen AI Studio plugin for generative AI features.'
                    guardrails:
                      type: boolean
                      description: 'When true, enables guardrails configuration for model deployments.'
                    autorag:
                      type: boolean
                      description: 'When true, enables the AutoRAG (Automated Retrieval-Augmented Generation) features.'
                    automl:
                      type: boolean
                      description: 'When true, enables the AutoML (Automated Machine Learning) features.'
                    modelAsService:
                      type: boolean
                      description: 'When true, enables Model-as-a-Service (MaaS) features for managed model deployments.'
                    maasAuthPolicies:
                      type: boolean
                      description: 'When true, enables authentication policy configuration for Model-as-a-Service deployments.'
                    aiAssetCustomEndpoints:
                      type: boolean
                      description: 'When true, enables custom endpoint configuration for AI assets.'
                    externalVectorStores:
                      type: boolean
                      description: 'When true, enables external vector store integration for RAG workflows.'
                    mlflow:
                      type: boolean
                      description: 'DEPRECATED: MLflow is now always enabled when the operator component is present. This field will be removed in a future version.'
                    mcpCatalog:
                      type: boolean
                      description: 'When true, enables the MCP (Model Context Protocol) Catalog page.'
                    projectRBAC:
                      type: boolean
                      description: 'When true, enables project-level RBAC (Role-Based Access Control) settings.'
                    trainingJobs:
                      type: boolean
                      description: 'When true, enables model training job and Ray job features.'
                    observabilityDashboard:
                      type: boolean
                      description: 'When true, enables the observability dashboard features.'
                    disableLLMd:
                      type: boolean
                      description: 'When true, disables the LLMd (Large Language Model daemon) serving features on KServe.'
                    deploymentWizardYAMLViewer:
                      type: boolean
                      description: 'When true, enables the YAML viewer in the model deployment wizard.'
                    vLLMDeploymentOnMaaS:
                      type: boolean
                      description: 'When true, enables vLLM deployment options within Model-as-a-Service.'
                    promptManagement:
                      type: boolean
                      description: 'When true, enables prompt management features.'
                    llmGatewayField:
                      type: boolean
                      description: 'When true, shows the LLM gateway configuration field on LLMd serving forms.'
                  x-kubernetes-validations:
                    - rule: '!has(self.disableAcceleratorProfiles) || self.disableAcceleratorProfiles == oldSelf.disableAcceleratorProfiles'
                      message: 'DEPRECATED: spec.dashboardConfig.disableAcceleratorProfiles must be removed or left unchanged.'
                    - rule: '!has(self.disableHardwareProfiles) || self.disableHardwareProfiles == oldSelf.disableHardwareProfiles'
                      message: 'DEPRECATED: spec.dashboardConfig.disableHardwareProfiles must be removed or left unchanged.'
                    - rule: '!has(self.disableFineTuning) || self.disableFineTuning == oldSelf.disableFineTuning'
                      message: 'DEPRECATED: spec.dashboardConfig.disableFineTuning must be removed or left unchanged.'
                    - rule: '!has(self.mlflow) || (has(oldSelf.mlflow) && self.mlflow == oldSelf.mlflow)'
                      message: 'DEPRECATED: spec.dashboardConfig.mlflow must be removed or left unchanged.'
                # TODO: Remove before going to v1
                groupsConfig:
                  description: 'Ignored -- See "Auth" Resource'
                  type: object
                  required:
                    - adminGroups
                    - allowedGroups
                  properties:
                    adminGroups:
                      type: string
                    allowedGroups:
                      type: string
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: Can no longer modify group configurations here, see the Auth resource instead
                # Remove notebookSizes in a future version
                notebookSizes:
                  description: 'DEPRECATED: Please use Hardware Profiles instead. This field will be removed in a future version.'
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - resources
                    properties:
                      name:
                        type: string
                      resources:
                        type: object
                        properties:
                          requests:
                            type: object
                            properties:
                              cpu:
                                type: string
                              memory:
                                type: string
                          limits:
                            type: object
                            properties:
                              cpu:
                                type: string
                              memory:
                                type: string
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: 'This field is DEPRECATED and must either be removed or left unchanged. Please use Hardware Profiles instead.'
                # Remove modelServerSizes in a future version
                modelServerSizes:
                  description: 'DEPRECATED: Please use Hardware Profiles instead. This field will be removed in a future version.'
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - resources
                    properties:
                      name:
                        type: string
                      resources:
                        type: object
                        properties:
                          requests:
                            type: object
                            properties:
                              cpu:
                                type: string
                              memory:
                                type: string
                          limits:
                            type: object
                            properties:
                              cpu:
                                type: string
                              memory:
                                type: string
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: 'This field is DEPRECATED and must either be removed or left unchanged. Please use Hardware Profiles instead.'
                # May get impacted by Notebooks 2.0
                notebookController:
                  description: 'Jupyter tile configurations'
                  type: object
                  required:
                    - enabled
                  properties:
                    enabled:
                      type: boolean
                    # TODO: Remove before going to v1
                    notebookNamespace:
                      type: string
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: Can no longer modify notebookNamespace here
                    pvcSize:
                      type: string
                    notebookTolerationSettings:
                      description: 'DEPRECATED: Please use Hardware Profiles to set tolerations instead. This field will be removed in a future version.'
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        key:
                          type: string
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: 'This field is DEPRECATED and must either be removed or left unchanged. Please use Hardware Profiles to set tolerations instead.'
                    storageClassName:
                      type: string
                # Likely needs a better spot to exist -- hard to do granular permissions
                templateOrder:
                  description: 'Ordered list of workbench image template names controlling their display order.'
                  type: array
                  items:
                    type: string
                # Likely needs a better spot to exist -- hard to do granular permissions
                templateDisablement:
                  description: 'List of workbench image template names to hide from users.'
                  type: array
                  items:
                    type: string
                # Likely needs a better spot to exist -- hard to do granular permissions
                hardwareProfileOrder:
                  description: 'Ordered list of hardware profile names controlling their display order.'
                  type: array
                  items:
                    type: string
                # Model serving deployment configurations
                modelServing:
                  description: 'Configuration options for model serving deployments.'
                  type: object
                  properties:
                    deploymentStrategy:
                      description: 'Kubernetes deployment strategy for model servers.'
                      type: string
                      enum:
                        - rolling
                        - recreate
                    isLLMdDefault:
                      description: 'When true, sets LLMd as the default serving platform for new model deployments.'
                      type: boolean
                genAiStudioConfig:
                  description: 'Configuration options for Gen AI Studio features'
                  type: object
                  properties:
                    aiAssetCustomEndpoints:
                      description: 'Configuration for AI Asset custom endpoints feature'
                      type: object
                      properties:
                        externalProviders:
                          description: 'Allow users to configure external LLM providers (e.g., OpenAI, Gemini, Anthropic)'
                          type: boolean
                        clusterDomains:
                          description: 'List of DNS domains for cluster-local services (e.g., ["cluster.local", "prod.local"]). Used to identify internal Kubernetes services vs external providers.'
                          type: array
                          items:
                            type: string
