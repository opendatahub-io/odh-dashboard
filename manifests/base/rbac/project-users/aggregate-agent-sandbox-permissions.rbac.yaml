kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: aggregate-agent-sandbox-permissions
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: 'true'
    rbac.authorization.k8s.io/aggregate-to-edit: 'true'
rules:
  - apiGroups:
      - agents.x-k8s.io
    verbs:
      - get
      - list
      - patch
    resources:
      - sandboxes
