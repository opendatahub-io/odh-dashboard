apiVersion: v1
kind: Service
metadata:
  name: model-registry
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: dashboard-proxy-tls
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: model-registry
  ports:
    - name: mr-ui
      protocol: TCP
      port: 8043
      targetPort: 8043
