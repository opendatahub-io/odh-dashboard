apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../core-bases/base
  - federation-configmap.yaml
  - networkpolicy.yaml
  - modules-service-account.yaml
  - modules-cluster-role.yaml
  - modules-cluster-role-binding.yaml
  - modules-sa-token-secret.yaml
  - modules/model-registry/deployment.yaml
  - modules/model-registry/service.yaml
  - modules/model-registry/networkpolicy.yaml
  - modules/gen-ai/deployment.yaml
  - modules/gen-ai/service.yaml
  - modules/gen-ai/networkpolicy.yaml
  - modules/maas/deployment.yaml
  - modules/maas/service.yaml
  - modules/maas/networkpolicy.yaml
  - modules/mlflow/deployment.yaml
  - modules/mlflow/service.yaml
  - modules/mlflow/networkpolicy.yaml
  - modules/eval-hub/deployment.yaml
  - modules/eval-hub/service.yaml
  - modules/eval-hub/networkpolicy.yaml
  - modules/automl/deployment.yaml
  - modules/automl/service.yaml
  - modules/automl/networkpolicy.yaml
  - modules/autorag/deployment.yaml
  - modules/autorag/service.yaml
  - modules/autorag/networkpolicy.yaml
configMapGenerator:
  - name: modular-architecture-params
    env: params.env
generatorOptions:
  disableNameSuffixHash: true
vars:
  - name: model-registry-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.model-registry-ui-image
  - name: gen-ai-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.gen-ai-ui-image
  - name: maas-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.maas-ui-image
  - name: mlflow-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.mlflow-ui-image
  - name: eval-hub-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.eval-hub-ui-image
  - name: automl-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.automl-ui-image
  - name: automl-pipeline-runtime-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.automl-pipeline-runtime-image
  - name: autorag-ui-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.autorag-ui-image
  - name: autorag-pipeline-runtime-image
    objref:
      kind: ConfigMap
      name: modular-architecture-params
      apiVersion: v1
    fieldref:
      fieldpath: data.autorag-pipeline-runtime-image
configurations:
  - params.yaml
patchesJson6902:
  - path: deployment.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: odh-dashboard
  - path: service.yaml
    target:
      version: v1
      kind: Service
      name: odh-dashboard
