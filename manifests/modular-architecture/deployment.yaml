- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: MODULE_FEDERATION_CONFIG
    valueFrom:
      configMapKeyRef:
        key: module-federation-config.json
        name: federation-config
# --- SA isolation: disable auto-mount and add per-container SA tokens ---
- op: add
  path: /spec/template/spec/automountServiceAccountToken
  value: false
# Projected volume with the pod's own SA token (odh-dashboard) for containers 0-1
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: dashboard-sa-token
    projected:
      defaultMode: 420
      sources:
        - serviceAccountToken:
            expirationSeconds: 3607
            path: token
        - configMap:
            name: kube-root-ca.crt
            items:
              - key: ca.crt
                path: ca.crt
        - downwardAPI:
            items:
              - path: namespace
                fieldRef:
                  fieldPath: metadata.namespace
        - configMap:
            name: openshift-service-ca.crt
            items:
              - key: service-ca.crt
                path: service-ca.crt
# Secret-based volume with the modules SA token (odh-dashboard-modules) for BFF containers
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: modules-sa-token
    projected:
      defaultMode: 420
      sources:
        - secret:
            name: odh-dashboard-modules-token
            items:
              - key: token
                path: token
              - key: ca.crt
                path: ca.crt
        - downwardAPI:
            items:
              - path: namespace
                fieldRef:
                  fieldPath: metadata.namespace
        - configMap:
            name: openshift-service-ca.crt
            items:
              - key: service-ca.crt
                path: service-ca.crt
# Mount dashboard SA token into odh-dashboard (container 0) and kube-rbac-proxy (container 1)
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: dashboard-sa-token
    mountPath: /var/run/secrets/kubernetes.io/serviceaccount
    readOnly: true
- op: add
  path: /spec/template/spec/containers/1/volumeMounts/-
  value:
    name: dashboard-sa-token
    mountPath: /var/run/secrets/kubernetes.io/serviceaccount
    readOnly: true
# --- End SA isolation infrastructure ---
- op: add
  path: /spec/template/spec/containers/-
  value:
    name: model-registry-ui
    image: $(model-registry-ui-image)
    imagePullPolicy: Always
    livenessProbe:
      httpGet:
        path: /healthcheck
        port: 8043
        scheme: HTTPS
      initialDelaySeconds: 30
      timeoutSeconds: 15
      periodSeconds: 30
      successThreshold: 1
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthcheck
        port: 8043
        scheme: HTTPS
      initialDelaySeconds: 15
      timeoutSeconds: 15
      periodSeconds: 30
      successThreshold: 1
      failureThreshold: 3
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
        ephemeral-storage: 10Mi
      limits:
        memory: 512Mi
    ports:
      - containerPort: 8043
        name: mr-ui
    volumeMounts:
      - name: proxy-tls
        mountPath: /etc/tls/private
        readOnly: true
      - name: odh-trusted-ca-cert
        mountPath: /etc/pki/tls/certs/odh-trusted-ca-bundle.crt
        subPath: odh-trusted-ca-bundle.crt
        readOnly: true
      - name: odh-trusted-ca-cert
        mountPath: /etc/ssl/certs/odh-trusted-ca-bundle.crt
        subPath: odh-trusted-ca-bundle.crt
        readOnly: true
      - name: odh-ca-cert
        mountPath: /etc/pki/tls/certs/odh-ca-bundle.crt
        subPath: odh-ca-bundle.crt
        readOnly: true
      - name: odh-ca-cert
        mountPath: /etc/ssl/certs/odh-ca-bundle.crt
        subPath: odh-ca-bundle.crt
        readOnly: true
      - name: modules-sa-token
        mountPath: /var/run/secrets/kubernetes.io/serviceaccount
        readOnly: true
    args:
      - '--deployment-mode=federated'
      - '--auth-method=user_token'
      - '--auth-token-header=x-forwarded-access-token'
      - '--auth-token-prefix='
      - '--port=8043'
      - '--cert-file=/etc/tls/private/tls.crt'
      - '--key-file=/etc/tls/private/tls.key'
      - '--bundle-paths=/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem,/var/run/secrets/kubernetes.io/serviceaccount/ca.crt,/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt,/etc/pki/tls/certs/odh-ca-bundle.crt,/etc/pki/tls/certs/odh-trusted-ca-bundle.crt'
    env:
      - name: GATEWAY_DOMAIN
        value: ""
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
