# Module NetworkPolicy template — substitute all <PLACEHOLDER> values before apply.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: <MODULE_NAME>-allow-ports
spec:
  podSelector:
    matchLabels:
      deployment: <MODULE_NAME>
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: <MODULE_PORT>
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        - podSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
