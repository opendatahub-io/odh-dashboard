# Module Service template — substitute all <PLACEHOLDER> values before apply.
apiVersion: v1
kind: Service
metadata:
  name: <MODULE_SERVICE_NAME>
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: <TLS_SECRET_NAME>
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: <MODULE_NAME>
  ports:
    - name: <MODULE_PORT_NAME>
      protocol: TCP
      port: <MODULE_PORT>
      targetPort: <MODULE_PORT>
