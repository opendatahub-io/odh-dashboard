---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odh-dashboard-allow-ports
spec:
  podSelector:
    matchLabels:
      deployment: odh-dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8443
          protocol: TCP
        - port: 8043
          protocol: TCP
        - port: 8143
          protocol: TCP
        - port: 8243
          protocol: TCP
        - port: 8343
          protocol: TCP
        - port: 8543
          protocol: TCP
        - port: 8643
          protocol: TCP
        - port: 8743
          protocol: TCP
      from:
        # Allow traffic from OpenShift ingress controller
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        # Allow traffic from pods in the same namespace
        - podSelector: {}
  egress:
    # Allow DNS resolution (RHOAIENG-49013)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow inter-BFF communication within same namespace
    - to:
        - podSelector:
            matchLabels:
              deployment: odh-dashboard
      ports:
        - port: 8043
          protocol: TCP
        - port: 8143
          protocol: TCP
        - port: 8243
          protocol: TCP
        - port: 8343
          protocol: TCP
    # Allow HTTPS egress to external services (LlamaStack, MaaS, MLflow backends)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 8321
          protocol: TCP
