apiVersion: v1
kind: Service
metadata:
  name: odh-dashboard-mlflow-ui
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: mlflow-proxy-tls
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: mlflow
  ports:
    - name: mlflow-ui
      protocol: TCP
      port: 8343
      targetPort: 8343
