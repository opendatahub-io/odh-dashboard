apiVersion: v1
kind: Service
metadata:
  name: odh-dashboard-maas-ui
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: maas-proxy-tls
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: maas
  ports:
    - name: maas-ui
      protocol: TCP
      port: 8243
      targetPort: 8243
