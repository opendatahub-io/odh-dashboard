apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas
  labels:
    app.kubernetes.io/name: maas
    app.kubernetes.io/part-of: odh-dashboard
    components.platform.opendatahub.io/managed-by: opendatahub-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      deployment: maas
  template:
    metadata:
      labels:
        deployment: maas
        app.kubernetes.io/name: maas
        app.kubernetes.io/part-of: odh-dashboard
        components.platform.opendatahub.io/managed-by: opendatahub-operator
    spec:
      automountServiceAccountToken: false
      serviceAccountName: odh-dashboard-modules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - odh-dashboard
                topologyKey: topology.kubernetes.io/zone
      volumes:
        - name: modules-sa-token
          projected:
            defaultMode: 420
            sources:
              - secret:
                  name: odh-dashboard-modules-token
                  items:
                    - key: token
                      path: token
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
              - configMap:
                  name: openshift-service-ca.crt
                  items:
                    - key: service-ca.crt
                      path: service-ca.crt
        - name: proxy-tls
          secret:
            secretName: dashboard-proxy-tls
        - name: odh-trusted-ca-cert
          configMap:
            name: odh-trusted-ca-bundle
            items:
              - key: ca-bundle.crt
                path: odh-trusted-ca-bundle.crt
            optional: true
        - name: odh-ca-cert
          configMap:
            name: odh-trusted-ca-bundle
            items:
              - key: odh-ca-bundle.crt
                path: odh-ca-bundle.crt
            optional: true
      containers:
        - name: maas-ui
          image: $(maas-ui-image)
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8243
              scheme: HTTPS
            initialDelaySeconds: 30
            timeoutSeconds: 15
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8243
              scheme: HTTPS
            initialDelaySeconds: 15
            timeoutSeconds: 15
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
              ephemeral-storage: 10Mi
            limits:
              memory: 512Mi
          ports:
            - containerPort: 8243
              name: maas-ui
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: odh-trusted-ca-cert
              mountPath: /etc/pki/tls/certs/odh-trusted-ca-bundle.crt
              subPath: odh-trusted-ca-bundle.crt
              readOnly: true
            - name: odh-trusted-ca-cert
              mountPath: /etc/ssl/certs/odh-trusted-ca-bundle.crt
              subPath: odh-trusted-ca-bundle.crt
              readOnly: true
            - name: odh-ca-cert
              mountPath: /etc/pki/tls/certs/odh-ca-bundle.crt
              subPath: odh-ca-bundle.crt
              readOnly: true
            - name: odh-ca-cert
              mountPath: /etc/ssl/certs/odh-ca-bundle.crt
              subPath: odh-ca-bundle.crt
              readOnly: true
            - name: modules-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          args:
            - '--auth-method=user_token'
            - '--auth-token-header=x-forwarded-access-token'
            - '--auth-token-prefix='
            - '--port=8243'
            - '--cert-file=/etc/tls/private/tls.crt'
            - '--key-file=/etc/tls/private/tls.key'
            - '--bundle-paths=/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem,/var/run/secrets/kubernetes.io/serviceaccount/ca.crt,/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt,/etc/pki/tls/certs/odh-ca-bundle.crt,/etc/pki/tls/certs/odh-trusted-ca-bundle.crt'
          env:
            - name: GATEWAY_DOMAIN
              value: ""
            - name: TIERS_CONFIGMAP_NS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
