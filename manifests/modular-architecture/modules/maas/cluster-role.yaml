kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: odh-dashboard-maas
rules:
  # DSC product type for maas-api infra namespace discovery
  - apiGroups:
      - datasciencecluster.opendatahub.io
    verbs:
      - list
    resources:
      - datascienceclusters
  - apiGroups:
      - config.openshift.io
    verbs:
      - get
      - list
      - watch
    resources:
      - ingresses
  - apiGroups:
      - authorization.k8s.io
    verbs:
      - create
    resources:
      - subjectaccessreviews
