kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: odh-dashboard-gen-ai
rules:
  - apiGroups:
      - mlflow.opendatahub.io
    verbs:
      - get
      - list
      - watch
    resources:
      - mlflows
  - apiGroups:
      - config.openshift.io
    verbs:
      - get
      - list
      - watch
    resources:
      - ingresses
  # OTel Collector — create/manage the gen-ai-trace-collector CR for per-namespace trace routing
  - apiGroups:
      - opentelemetry.io
    verbs:
      - get
      - list
      - create
      - update
      - delete
    resources:
      - opentelemetrycollectors
  - apiGroups:
      - authorization.k8s.io
    verbs:
      - create
    resources:
      - subjectaccessreviews
