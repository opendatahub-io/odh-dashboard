kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: odh-dashboard-gen-ai
rules:
  - apiGroups:
      - mlflow.opendatahub.io
    verbs:
      - get
      - list
      - watch
    resources:
      - mlflows
  - apiGroups:
      - config.openshift.io
    verbs:
      - get
      - list
      - watch
    resources:
      - ingresses
  # OTel Collector — discovery and per-namespace trace route management
  - apiGroups:
      - opentelemetry.io
    verbs:
      - get
      - list
      - patch
    resources:
      - opentelemetrycollectors
  - apiGroups:
      - authorization.k8s.io
    verbs:
      - create
    resources:
      - subjectaccessreviews
