kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: odh-dashboard-gen-ai
rules:
  - apiGroups:
      - mlflow.opendatahub.io
    verbs:
      - get
      - list
      - watch
    resources:
      - mlflows
  - apiGroups:
      - config.openshift.io
    verbs:
      - get
      - list
      - watch
    resources:
      - ingresses
  - apiGroups:
      - authorization.k8s.io
    verbs:
      - create
    resources:
      - subjectaccessreviews
  # pgvector auto-provisioning (RHOAIENG-68914)
  - apiGroups:
      - ""
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
    resources:
      - secrets
      - services
      - persistentvolumeclaims
      - configmaps
  - apiGroups:
      - apps
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
    resources:
      - deployments
  - apiGroups:
      - networking.k8s.io
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
    resources:
      - networkpolicies
  - apiGroups:
      - storage.k8s.io
    verbs:
      - list
    resources:
      - storageclasses
