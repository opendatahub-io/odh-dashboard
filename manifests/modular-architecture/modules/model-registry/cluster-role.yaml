kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: odh-dashboard-model-registry
rules:
  - apiGroups:
      - authorization.k8s.io
    verbs:
      - create
    resources:
      - subjectaccessreviews
  - apiGroups:
      - config.openshift.io
    resources:
      - apiservers
    resourceNames:
      - cluster
    verbs:
      - get
