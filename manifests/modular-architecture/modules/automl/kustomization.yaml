apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - service-account.yaml
  - cluster-role.yaml
  - cluster-role-binding.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
configMapGenerator:
  - name: automl-params
    env: params.env
generatorOptions:
  disableNameSuffixHash: true
vars:
  - name: automl-ui-image
    objref:
      kind: ConfigMap
      name: automl-params
      apiVersion: v1
    fieldref:
      fieldpath: data.automl-ui-image
  - name: automl-pipeline-runtime-image
    objref:
      kind: ConfigMap
      name: automl-params
      apiVersion: v1
    fieldref:
      fieldpath: data.automl-pipeline-runtime-image
configurations:
  - params.yaml
