apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eval-hub-allow-ports
spec:
  podSelector:
    matchLabels:
      deployment: eval-hub
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8543
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              deployment: model-registry
      ports:
        - port: 8043
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
