apiVersion: v1
kind: Service
metadata:
  name: odh-dashboard-eval-hub-ui
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: eval-hub-proxy-tls
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: eval-hub
  ports:
    - name: eval-hub-ui
      protocol: TCP
      port: 8543
      targetPort: 8543
