apiVersion: v1
kind: Service
metadata:
  name: odh-dashboard-autorag-ui
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: autorag-proxy-tls
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: autorag
  ports:
    - name: autorag-ui
      protocol: TCP
      port: 8743
      targetPort: 8743
