# Module NetworkPolicy template — substitute all <PLACEHOLDER> values before apply.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: <MODULE_NAME>-allow-ports
spec:
  podSelector:
    matchLabels:
      deployment: <MODULE_NAME>
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: <MODULE_PORT>
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # <MODULE_EXTRA_EGRESS> — add module-specific in-cluster egress rules here when required
