# Module Deployment template — substitute all <PLACEHOLDER> values before apply.
# See templates/README.md for parameter definitions and controller rendering notes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <MODULE_NAME>
  labels:
    app.kubernetes.io/name: <MODULE_NAME>
    app.kubernetes.io/part-of: <PART_OF_LABEL>
    components.platform.opendatahub.io/managed-by: opendatahub-operator
spec:
  replicas: <REPLICA_COUNT>
  selector:
    matchLabels:
      deployment: <MODULE_NAME>
  template:
    metadata:
      labels:
        deployment: <MODULE_NAME>
        app.kubernetes.io/name: <MODULE_NAME>
        app.kubernetes.io/part-of: <PART_OF_LABEL>
        components.platform.opendatahub.io/managed-by: opendatahub-operator
    spec:
      automountServiceAccountToken: false
      serviceAccountName: <MODULE_SERVICE_ACCOUNT_NAME>
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    deployment: <MODULE_NAME>
                topologyKey: topology.kubernetes.io/zone
      volumes:
        - name: tmp
          emptyDir: {}
        - name: modules-sa-token
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
              - configMap:
                  name: openshift-service-ca.crt
                  items:
                    - key: service-ca.crt
                      path: service-ca.crt
        - name: proxy-tls
          secret:
            secretName: <TLS_SECRET_NAME>
        - name: odh-trusted-ca-cert
          configMap:
            name: odh-trusted-ca-bundle
            items:
              - key: ca-bundle.crt
                path: odh-trusted-ca-bundle.crt
        - name: odh-ca-cert
          configMap:
            name: odh-trusted-ca-bundle
            items:
              - key: odh-ca-bundle.crt
                path: odh-ca-bundle.crt
      containers:
        - name: <MODULE_CONTAINER_NAME>
          image: <MODULE_IMAGE>
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: <MODULE_PORT>
              scheme: HTTPS
            initialDelaySeconds: 30
            timeoutSeconds: 15
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: <MODULE_PORT>
              scheme: HTTPS
            initialDelaySeconds: 15
            timeoutSeconds: 15
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
              ephemeral-storage: 10Mi
            limits:
              cpu: 300m
              memory: 512Mi
              ephemeral-storage: 10Mi
          ports:
            - containerPort: <MODULE_PORT>
              name: <MODULE_PORT_NAME>
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: odh-trusted-ca-cert
              mountPath: /etc/pki/tls/certs/odh-trusted-ca-bundle.crt
              subPath: odh-trusted-ca-bundle.crt
              readOnly: true
            - name: odh-trusted-ca-cert
              mountPath: /etc/ssl/certs/odh-trusted-ca-bundle.crt
              subPath: odh-trusted-ca-bundle.crt
              readOnly: true
            - name: odh-ca-cert
              mountPath: /etc/pki/tls/certs/odh-ca-bundle.crt
              subPath: odh-ca-bundle.crt
              readOnly: true
            - name: odh-ca-cert
              mountPath: /etc/ssl/certs/odh-ca-bundle.crt
              subPath: odh-ca-bundle.crt
              readOnly: true
            - name: modules-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          args:
            - '--auth-method=user_token'
            - '--auth-token-header=x-forwarded-access-token'
            - '--auth-token-prefix='
            - '--port=<MODULE_PORT>'
            - '--cert-file=/etc/tls/private/tls.crt'
            - '--key-file=/etc/tls/private/tls.key'
            - '--bundle-paths=/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem,/var/run/secrets/kubernetes.io/serviceaccount/ca.crt,/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt,/etc/pki/tls/certs/odh-ca-bundle.crt,/etc/pki/tls/certs/odh-trusted-ca-bundle.crt'
            # <MODULE_EXTRA_ARGS> — append module-specific args here when required
          # <MODULE_EXTRA_ENV> — add an env: list when the module needs extra variables
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
