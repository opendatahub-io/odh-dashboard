apiVersion: v1
kind: Service
metadata:
  name: odh-dashboard-automl-ui
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: automl-proxy-tls
    service.beta.kubernetes.io/backend-protocol: HTTPS
spec:
  selector:
    deployment: automl
  ports:
    - name: automl-ui
      protocol: TCP
      port: 8643
      targetPort: 8643
