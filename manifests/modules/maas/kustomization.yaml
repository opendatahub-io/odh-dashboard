apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - service-account.yaml
  - cluster-role.yaml
  - cluster-role-binding.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
configMapGenerator:
  - name: maas-params
    env: params.env
generatorOptions:
  disableNameSuffixHash: true
vars:
  - name: maas-ui-image
    objref:
      kind: ConfigMap
      name: maas-params
      apiVersion: v1
    fieldref:
      fieldpath: data.maas-ui-image
replacements:
  - source:
      kind: ConfigMap
      name: maas-params
      fieldPath: data.gateway-domain
    targets:
      - select:
          kind: Deployment
          name: maas-ui
        fieldPaths:
          - spec.template.spec.containers.[name=maas-ui].env.[name=GATEWAY_DOMAIN].value
configurations:
  - params.yaml
