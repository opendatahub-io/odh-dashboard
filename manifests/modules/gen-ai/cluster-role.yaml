kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: odh-dashboard-gen-ai
rules:
  - apiGroups:
      - mlflow.opendatahub.io
    verbs:
      - get
      - list
      - watch
    resources:
      - mlflows
  - apiGroups:
      - config.openshift.io
    verbs:
      - get
      - list
      - watch
    resources:
      - ingresses
  # OTel Collector — create/manage the gen-ai-trace-collector CR for per-namespace trace routing
  - apiGroups:
      - opentelemetry.io
    verbs:
      - get
      - list
      - create
      - update
      - delete
    resources:
      - opentelemetrycollectors
  - apiGroups:
      - authorization.k8s.io
    verbs:
      - create
    resources:
      - subjectaccessreviews
  # pgvector auto-provisioning (RHOAIENG-68914)
  # create is broad (resourceNames cannot restrict it in k8s RBAC).
  # get/update/delete are scoped to the deterministic pgvector resource names.
  - apiGroups:
      - ""
    verbs:
      - create
    resources:
      - secrets
      - services
      - persistentvolumeclaims
      - configmaps
  - apiGroups:
      - ""
    verbs:
      - get
      - update
      - delete
    resources:
      - secrets
      - services
      - persistentvolumeclaims
      - configmaps
    resourceNames:
      - genai-pgvector-credentials
      - genai-pgvector-init
      - genai-pgvector-storage
      - genai-pgvector
  - apiGroups:
      - apps
    verbs:
      - create
    resources:
      - deployments
  - apiGroups:
      - apps
    verbs:
      - get
      - update
      - delete
    resources:
      - deployments
    resourceNames:
      - genai-pgvector
  - apiGroups:
      - networking.k8s.io
    verbs:
      - create
    resources:
      - networkpolicies
  - apiGroups:
      - networking.k8s.io
    verbs:
      - get
      - update
      - delete
    resources:
      - networkpolicies
    resourceNames:
      - genai-pgvector
  - apiGroups:
      - storage.k8s.io
    verbs:
      - list
    resources:
      - storageclasses
