apiVersion: tekton.dev/v1
kind: PipelineRun
# retrigger Konflux builds via commit due to problem with reruns in Konflux UI/annotations: https://redhat-internal.slack.com/archives/C04PZ7H0VA8/p1768991407327089
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/odh-dashboard?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "rhoai-3.3"
      && ( "./packages/model-registry/**".pathChanged() || ".tekton/odh-mod-arch-model-registry-v3-3-push.yaml".pathChanged() || "Dockerfile.konflux.modelregistry".pathChanged() )
  labels:
    appstudio.openshift.io/application: rhoai-v3-3
    appstudio.openshift.io/component: odh-mod-arch-model-registry-v3-3
    pipelines.appstudio.openshift.io/type: build
  name: odh-mod-arch-model-registry-v3-3-on-push
  namespace: rhoai-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: output-image
    value: quay.io/rhoai/odh-mod-arch-model-registry-rhel9:{{target_branch}}
  - name: rhoai-version
    value: "3.3.2"
  - name: dockerfile
    value: Dockerfile.konflux.modelregistry
  - name: path-context
    value: .
  - name: prefetch-input
    value: '[{"path":".","type":"npm"},{"path":"packages/model-registry/upstream/frontend","type":"npm"},{"path":"packages/model-registry/upstream/bff","type":"gomod"}]'
  - name: build-image-index
    value: true
  - name: build-platforms
    value:
    - linux/x86_64
    - linux/ppc64le
    - linux-m2xlarge/arm64
    - linux/s390x
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-mod-arch-model-registry-v3-3
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
