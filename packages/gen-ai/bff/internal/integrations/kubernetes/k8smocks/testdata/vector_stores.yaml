# This file gives sample gen-ai-aa-vector-stores configuration (it includes the data that'd be inlined inside the 'config.yaml' portion of the configmap), 
# with multiple vector store providers and registered vector stores

providers:
  vector_io:
    - provider_id: pgvector-provider
      provider_type: remote::pgvector
      config:
        host: pgvector.databases.svc.cluster.local
        port: 5432
        db: embeddings
        user: vectoruser
        distance_metric: COSINE
        vector_index:
          type: HNSW
          m: 16
          ef_construction: 64
        custom_gen_ai:
          credentials:
            secretRefs:
              - name: pgvector-credentials
                key: password

    - provider_id: qdrant-provider
      provider_type: remote::qdrant
      config:
        url: http://qdrant.vector.svc.cluster.local
        port: 6333
        grpc_port: 6334
        prefer_grpc: false
        custom_gen_ai:
          credentials:
            secretRefs:
              - name: qdrant-credentials
                key: api_key

    - provider_id: milvus-provider
      provider_type: remote::milvus
      config:
        uri: http://milvus.vector.svc.cluster.local:19530

    - provider_id: milvus-secure-provider
      provider_type: remote::milvus
      config:
        uri: http://milvus-secure.vector.svc.cluster.local:19530
        custom_gen_ai:
          credentials:
            secretRefs:
              - name: milvus-credentials
                key: token

registered_resources:
  vector_stores:
    - provider_id: pgvector-provider
      vector_store_id: vs_282695f8-7e3e-48da-abac-d81a0aa225a4
      embedding_model: ibm-granite/granite-embedding-125m-english
      embedding_dimension: 768
      vector_store_name: "Product Embeddings (PGVector)"
      metadata:
        description: "Product catalog embeddings for semantic search"

    - provider_id: qdrant-provider
      vector_store_id: vs_4c4b74e3-30ac-4e46-9057-213154f83dba
      embedding_model: ibm-granite/granite-embedding-125m-english
      embedding_dimension: 768
      vector_store_name: "Document Search (Qdrant)"
      metadata:
        description: "Document search index for internal knowledge base"

    - provider_id: milvus-provider
      vector_store_id: vs_a2607363-cea0-4d2a-8a93-7fb76863403b
      embedding_model: unknown-embedding-model
      embedding_dimension: 384
      vector_store_name: "Code Vector Store (Milvus)"
      metadata:
        description: "Code embeddings for repository search"

    - provider_id: milvus-secure-provider
      vector_store_id: vs_c9e12f45-3b67-4d89-a012-3b4567890cde
      embedding_model: ibm-granite/granite-embedding-125m-english
      embedding_dimension: 768
      vector_store_name: "Secure Knowledge Base (Milvus)"
      metadata:
        description: "Secure internal knowledge base with token auth"
