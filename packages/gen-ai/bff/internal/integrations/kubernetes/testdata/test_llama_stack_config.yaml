# Llama Stack Configuration
version: "2"
distro_name: rh
apis:
- responses
- file_processors
- files
- inference
- safety
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: vllm-inference-1
    provider_type: remote::vllm
    config:
      url: http://llama-32-3b-instruct-predictor.crimson-show.svc.cluster.local/v1
      max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
      api_token: ${env.VLLM_API_TOKEN:=fake}
      tls_verify: ${env.VLLM_TLS_VERIFY:=true}
  - provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
    config: {}
  - provider_id: maas-watsonx
    provider_type: remote::watsonx
    config:
      url: https://us-south.ml.cloud.ibm.com/ml/v1
      api_key: ${env.WATSONX_API_KEY:=fake-key}
  - provider_id: maas-vllm-inference-1
    provider_type: remote::vllm
    config:
      url: http://maas.apps.rosa.crimson-demo.g9ax.p3.openshiftapps.com/llm/facebook-opt-125m-simulated/v1
      max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
      api_token: ${env.VLLM_API_TOKEN_1:=fake}
      tls_verify: ${env.VLLM_TLS_VERIFY:=true}
  vector_io:
  - provider_id: milvus
    provider_type: inline::milvus
    config:
      db_path: /opt/app-root/src/.llama/distributions/rh/milvus.db
      persistence:
        namespace: vector_io::milvus
        backend: kv_default
  safety:
  - provider_id: trustyai_fms
    provider_type: remote::trustyai_fms
    module: llama_stack_provider_trustyai_fms==0.3.2
    config:
      orchestrator_url: ${env.FMS_ORCHESTRATOR_URL:=http://localhost}
      ssl_cert_path: ${env.FMS_SSL_CERT_PATH:=}
      shields: {}
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          namespace: agents
          backend: kv_default
        responses:
          table_name: responses
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
  eval: []
  file_processors:
  - provider_id: pypdf
    provider_type: inline::pypdf
    config: {}
  files:
  - provider_id: localfs-files
    provider_type: inline::localfs
    config:
      storage_dir: /opt/app-root/src/.llama/distributions/rh/files
      metadata_store:
        table_name: files_metadata
        backend: sql_default
  datasetio: []
  scoring: []
  tool_runtime:
  - provider_id: file-search
    provider_type: inline::file-search
    config: {}
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
    config: {}
metadata_store:
  type: sqlite
  db_path: /opt/app-root/src/.llama/distributions/rh/registry.db
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: /opt/app-root/src/.llama/distributions/rh/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: /opt/app-root/src/.llama/distributions/rh/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
    conversations:
      table_name: openai_conversations
      backend: sql_default
vector_stores:
  default_provider_id: milvus
  default_embedding_model:
    provider_id: sentence-transformers
    model_id: ibm-granite/granite-embedding-125m-english
registered_resources:
  models:
    - metadata:
        embedding_dimension: 768
      model_id: granite-embedding-125m
      provider_id: sentence-transformers
      provider_model_id: ibm-granite/granite-embedding-125m-english
      model_type: embedding
    - metadata:
        display_name: llama-32-3b-instruct
      model_id: llama-32-3b-instruct
      provider_id: vllm-inference-1
      model_type: llm
    - metadata:
        display_name: granite-3.1-8b-instruct
      model_id: granite-3.1-8b-instruct
      provider_id: maas-watsonx
      model_type: llm
    - metadata: {}
      model_id: facebook/opt-125m
      provider_id: maas-vllm-inference-1
      model_type: llm
  shields: []
  vector_stores: []
  datasets: []
  scoring_fns: []
  benchmarks: []
external_providers_dir: /opt/app-root/.llama/providers.d
server:
  port: 8321


