openapi: '3.0.3'
info:
  title: 'Gen AI REST API'
  version: '1.0.0'
  description: 'REST API for Gen AI Backend for Frontend (BFF) using OpenAI SDK v2.4.0'
  license:
    name: 'Apache 2.0'
    url: 'https://www.apache.org/licenses/LICENSE-2.0'
servers:
  - url: 'http://localhost:8080'
    description: 'Local development server'

# Global security requirement - all endpoints require Bearer token by default
security:
  - Bearer: []

paths:
  # =============================================================================
  # UTILITY ENDPOINTS
  # =============================================================================

  /healthcheck:
    summary: BFF service health check
    description: >-
      Health check endpoint to verify BFF service availability. This is a local service check
      and does not validate external Llama Stack connectivity.
    get:
      tags:
        - HealthCheck
      responses:
        '200':
          $ref: '#/components/responses/HealthCheckResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: healthcheck
      summary: BFF Health Check
      description: Returns BFF service status and version information.
      security: []

  /gen-ai/api/v1/namespaces:
    summary: List Kubernetes cluster namespaces
    description: >-
      Lists all namespaces in the Kubernetes cluster.
      Returns namespace information including name and display name.
      Requires valid Kubernetes authentication token.
    get:
      tags:
        - Kubernetes
      security:
        - Bearer: []
      responses:
        '200':
          $ref: '#/components/responses/NamespacesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: listNamespaces
      summary: List All Namespaces
      description: Gets a list of all namespaces in the Kubernetes cluster.

  /gen-ai/api/v1/code-exporter:
    summary: Export Python code for Llama Stack integration
    description: >-
      Generates Python code based on provided configuration parameters.
      Creates code templates for client configuration and integration.
      Requires namespace parameter for proper multi-tenant isolation.
    post:
      tags:
        - CodeExporter
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace for the generated code
          required: true
          schema:
            type: string
            example: 'default'
      requestBody:
        required: true
        description: Code generation configuration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeExportRequest'
            example:
              clientName: 'my-llamastack-client'
              models: ['llama-3-2-3b-instruct', 'granite-embedding-125m']
              includeExamples: true
      responses:
        '200':
          $ref: '#/components/responses/CodeExportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: exportCode
      summary: Export Code
      description: Generates Python code for Llama Stack integration.

  /gen-ai/api/v1/user:
    summary: Get current user information
    description: >-
      Retrieves information about the currently authenticated user.
      Returns user details including identity and permissions.
    get:
      tags:
        - Identity
      security:
        - Bearer: []
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: getCurrentUser
      summary: Get Current User
      description: Returns information about the currently authenticated user.

  /gen-ai/api/v1/config:
    summary: Get BFF configuration
    description: >-
      Retrieves BFF application-level configuration that applies globally across all namespaces.
      Returns configuration flags that the UI needs to adapt behavior.
    get:
      tags:
        - Configuration
      security:
        - Bearer: []
      responses:
        '200':
          $ref: '#/components/responses/BFFConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: getBFFConfig
      summary: Get BFF Configuration
      description: Returns BFF application-level configuration settings.

  # =============================================================================
  # LLAMASTACK DISTRIBUTION (LSD) ENDPOINTS
  # =============================================================================

  /gen-ai/api/v1/lsd/models:
    summary: List available AI models
    description: >-
      Lists all available AI models from Llama Stack using OpenAI SDK.
      Returns models with their identifiers, creation timestamps, and ownership information.
      Requires namespace parameter for proper multi-tenant isolation.
    get:
      tags:
        - Models
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace to query for AI models
          required: true
          schema:
            type: string
            example: 'default'
      responses:
        '200':
          $ref: '#/components/responses/ModelsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: listModels
      summary: List All Models
      description: Gets a list of all available AI models from Llama Stack.

  /gen-ai/api/v1/lsd/status:
    summary: Get LlamaStack Distribution status
    description: >-
      Retrieves the status of LlamaStack Distribution (LSD) in the specified namespace.
      Returns LSD information including name, phase, version, and distribution configuration.
      Requires valid Kubernetes authentication token and namespace parameter.
    get:
      tags:
        - LlamaStackDistribution
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace to query for LSD resources
          required: true
          schema:
            type: string
            example: 'default'
      responses:
        '200':
          $ref: '#/components/responses/LlamaStackDistributionStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: getLlamaStackDistributionStatus
      summary: Get LSD Status
      description: Gets the status of LlamaStack Distribution in the specified namespace.

  /gen-ai/api/v1/lsd/install:
    summary: Install LlamaStack Distribution
    description: >-
      Installs a new LlamaStack Distribution (LSD) in the specified namespace with the provided models.
      Creates both the LSD custom resource and a ConfigMap containing the run.yaml configuration.
      The ConfigMap is configured with the specified models and their endpoints.
      Requires valid Kubernetes authentication token and namespace parameter.
    post:
      tags:
        - LlamaStackDistribution
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace where the LSD will be installed
          required: true
          schema:
            type: string
            example: 'default'
      requestBody:
        required: true
        description: Installation request with list of models to include
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlamaStackDistributionInstallRequest'
            example:
              models:
                - model_name: 'llama-3-2-3b-instruct'
                  model_source_type: 'namespace'
                - model_name: 'granite-embedding-125m'
                  model_source_type: 'maas'
      responses:
        '200':
          $ref: '#/components/responses/LlamaStackDistributionInstallResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: installLlamaStackDistribution
      summary: Install LSD
      description: Installs a new LlamaStack Distribution with the specified models.

  # =============================================================================
  # GUARDRAILS ENDPOINTS
  # =============================================================================

  /gen-ai/api/v1/guardrails/status:
    summary: Get GuardrailsOrchestrator status
    description: >-
      Retrieves the status of GuardrailsOrchestrator CR in the specified namespace.
      Returns information including name, phase, and conditions.
      Requires valid Kubernetes authentication token and namespace parameter.
    get:
      tags:
        - Guardrails
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace to query for GuardrailsOrchestrator resources
          required: true
          schema:
            type: string
            example: 'default'
      responses:
        '200':
          $ref: '#/components/responses/GuardrailsStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: getGuardrailsStatus
      summary: Get Guardrails Status
      description: Gets the status of GuardrailsOrchestrator in the specified namespace.

  /gen-ai/api/v1/nemo-guardrails/init:
    summary: Initialize NemoGuardrails resources
    description: >-
      Creates a placeholder ConfigMap and NemoGuardrails CR in the specified namespace.
      The actual model, prompts, and API key are supplied at request time via inline
      config in each guardrail/checks call — no per-model K8s resources are needed.
    post:
      tags:
        - NemoGuardrails
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace in which to create NemoGuardrails resources
          required: true
          schema:
            type: string
            example: 'default'
      responses:
        '200':
          $ref: '#/components/responses/NemoGuardrailsInitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: initNemoGuardrails
      summary: Initialize NemoGuardrails
      description: >-
        Creates a placeholder ConfigMap and NemoGuardrails CR. One-time setup —
        returns 400 if NemoGuardrails is already initialised in the namespace.

  /gen-ai/api/v1/nemo-guardrails/status:
    summary: Get NemoGuardrails status
    description: >-
      Returns the phase and readiness of the NemoGuardrails CR in the specified namespace.
    get:
      tags:
        - NemoGuardrails
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace to query for the NemoGuardrails CR
          required: true
          schema:
            type: string
            example: 'default'
      responses:
        '200':
          $ref: '#/components/responses/NemoGuardrailsStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: getNemoGuardrailsStatus
      summary: Get NemoGuardrails Status
      description: Returns the phase and readiness of the NemoGuardrails CR in the namespace.

  # =============================================================================
  # AI AVAILABLE ASSETS (AAA) ENDPOINTS
  # =============================================================================

  /gen-ai/api/v1/aaa/models:
    summary: List AI Available Assets models
    description: >-
      Lists all available AI Available Assets models from Kubernetes InferenceServices.
      Returns models with their serving runtime, API protocol, version, and status information.
      Requires namespace parameter for proper multi-tenant isolation.
    get:
      tags:
        - AIAssets
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace to query for AI Assets models
          required: true
          schema:
            type: string
            example: 'genai-lls'
      responses:
        '200':
          $ref: '#/components/responses/AAModelsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: listAAModels
      summary: List AI Available Assets Models
      description: Gets a list of all available AI Available Assets models from Kubernetes InferenceServices.

  /gen-ai/api/v1/models/external:
    summary: Manage external model endpoints
    description: >-
      Register and manage OpenAI-compatible external model endpoints for use in Gen AI Studio.
      Creates a ConfigMap entry and Kubernetes Secret for secure API key storage.
      Supports custom endpoints, including public external APIs and cluster-local URLs.
      Requires namespace parameter for proper multi-tenant isolation.
    post:
      tags:
        - ExternalModels
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace where the external model will be registered
          required: true
          schema:
            type: string
            example: 'llm'
      requestBody:
        required: true
        description: External model configuration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalModelRequest'
            example:
              model_id: 'gpt-4o'
              model_display_name: 'GPT-4 Optimized'
              base_url: 'https://api.openai.com/v1'
              secret_value: 'sk-your-api-key-here'
              use_cases: 'Classification, Text Generation'
              model_type: 'llm'
      responses:
        '201':
          $ref: '#/components/responses/ExternalModelCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Access denied - user does not have permission to create models in this namespace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: createExternalModel
    delete:
      summary: Delete an external model endpoint
      description: >-
        Deletes an external model endpoint by removing its entry from the ConfigMap and deleting its associated Secret.
        This operation permanently removes the external model registration.
        Requires namespace parameter for proper multi-tenant isolation.
      tags:
        - ExternalModels
      security:
        - Bearer: []
      parameters:
        - name: model_id
          in: query
          description: Model ID to delete (supports slashes, e.g. 'openai/gpt-4o' or 'ollama/llama3.2:3b')
          required: true
          schema:
            type: string
            example: 'gpt-4o'
        - name: namespace
          in: query
          description: Kubernetes namespace where the external model is registered
          required: true
          schema:
            type: string
            example: 'llm'
      responses:
        '204':
          description: External model successfully deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Access denied - user does not have permission to delete models in this namespace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: External model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: deleteExternalModel

  /gen-ai/api/v1/models/external/verify:
    summary: Verify external model endpoint
    description: >-
      Verifies that an external model endpoint is accessible, properly authenticated, and OpenAI-compatible.
      Tests the connection by sending a minimal request to the endpoint and validating the response format.
      This is a stateless operation that does not create any resources.
    post:
      tags:
        - ExternalModels
      security:
        - Bearer: []
      requestBody:
        required: true
        description: External model verification request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyExternalModelRequest'
            example:
              model_id: 'gpt-4o'
              base_url: 'https://api.openai.com/v1'
              secret_value: 'sk-test-key'
              model_type: 'llm'
      responses:
        '200':
          description: External model verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VerifyExternalModelResponse'
              example:
                data:
                  success: true
                  message: 'External model verified successfully'
                  response_time_ms: 523
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials - API key is incorrect or unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: 'UNAUTHORIZED'
                      message:
                        type: string
                        example: 'API key is invalid or unauthorized'
        '408':
          description: Request timeout - endpoint did not respond in time
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: 'TIMEOUT'
                      message:
                        type: string
                        example: 'Request timed out connecting to external model'
        '503':
          description: Connection failed - could not reach the endpoint
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: 'CONNECTION_FAILED'
                      message:
                        type: string
                        example: 'Request to https://api.example.com/v1/chat/completions returned HTTP 404. The endpoint may not exist or the base URL may be incorrect.'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: verifyExternalModel
      summary: Verify External Model
      description: Tests external model endpoint connectivity, authentication, and OpenAI compatibility.

  # =============================================================================
  # MODEL AS A SERVICE (MAAS) ENDPOINTS
  # =============================================================================

  /gen-ai/api/v1/maas/models:
    summary: List available MaaS models
    description: >-
      Lists all available models from MaaS (Model as a Service).
      Returns models with their identifiers, creation timestamps, ownership information, ready status, and service URLs.
      Requires namespace parameter for proper multi-tenant isolation.
    get:
      tags:
        - MaaS
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace for MaaS operations
          required: true
          schema:
            type: string
            example: 'default'
      responses:
        '200':
          description: Successful response with MaaS models list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: 'list'
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: 'llama-2-7b-chat'
                        object:
                          type: string
                          example: 'model'
                        created:
                          type: integer
                          format: int64
                          example: 1672531200
                        owned_by:
                          type: string
                          example: 'model-namespace'
                        ready:
                          type: boolean
                          example: true
                        url:
                          type: string
                          example: 'https://llama-2-7b-chat.apps.example.openshift.com/v1'
                        display_name:
                          type: string
                          description: Human-readable display name for the model
                          example: 'Llama 2 7B Chat'
                        description:
                          type: string
                          description: Detailed description of the model and its capabilities
                          example: 'Meta Llama 2 7B model fine-tuned for conversational AI and chat applications'
                        usecase:
                          type: string
                          description: Primary use cases for the model
                          example: 'Chat, Question answering'
                        model_type:
                          type: string
                          description: Type of the model
                          enum:
                            - llm
                            - embedding
                          example: 'llm'
                        subscriptions:
                          type: array
                          description: >-
                            Subscriptions that provide access to this model.
                            Each entry's name field is passed as the subscription field when minting ephemeral API keys for inference.
                          items:
                            $ref: '#/components/schemas/SubscriptionInfo'
                          example:
                            - name: basic-subscription
                              displayName: Basic Tier
                            - name: premium-subscription
                              displayName: Premium Tier
                              description: Premium subscription with higher rate limits
                      required:
                        - id
                        - object
                        - created
                        - owned_by
                        - ready
                        - url
                required:
                  - object
                  - data
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: listMaaSModels
      summary: List All MaaS Models
      description: Gets a list of all available models from MaaS service.

  /gen-ai/api/v1/maas/tokens:
    summary: Manage MaaS ephemeral API keys
    description: >-
      Issue new ephemeral API keys and revoke existing tokens for MaaS service authentication.
      All keys created through Gen AI Studio are ephemeral (short-lived, max 1h TTL)
      and are excluded from the MaaS API key list by default.
      Requires namespace parameter for proper multi-tenant isolation.
    post:
      tags:
        - MaaS
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace for MaaS token operations
          required: true
          schema:
            type: string
            example: 'default'
      summary: Issue Ephemeral API Key
      description: >-
        Create an ephemeral API key for MaaS authentication. The BFF always
        creates ephemeral keys (max 1h TTL), which are excluded from the
        MaaS API key list by default.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Optional name for the key. If omitted, the MaaS service assigns a name automatically.
                description:
                  type: string
                  description: Optional description for the key.
                expiresIn:
                  type: string
                  description: Expiration duration (e.g., "30m", "1h"). Defaults to 1h, max 1h for ephemeral keys.
                  default: '1h'
                  example: '1h'
                  pattern: '^[0-9]+(m|h)$'
                ephemeral:
                  type: boolean
                  description: Always set to true by the BFF. Callers cannot override this value. Ephemeral keys have a 1h max TTL and are hidden from the API key list.
                  readOnly: true
                  default: true
                subscription:
                  type: string
                  description: >-
                    Optional MaaS subscription name to bind the ephemeral API key to.
                    When provided, the key is scoped to this subscription.
                    When omitted, the user's highest-priority accessible subscription is used by MaaS.
                  example: 'premium-subscription'
            example:
              expiresIn: '1h'
              subscription: 'premium-subscription'
      responses:
        '201':
          description: Ephemeral API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      key:
                        type: string
                        description: Generated API key (shown only once)
                        example: 'sk-oai-...'
                      expiresAt:
                        type: string
                        description: Key expiration timestamp in RFC3339 format
                        example: '2026-03-23T15:00:00Z'
                    required:
                      - key
              example:
                data:
                  key: 'sk-oai-...'
                  expiresAt: '2026-03-23T15:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: issueMaaSToken
    delete:
      tags:
        - MaaS
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace for MaaS token operations
          required: true
          schema:
            type: string
            example: 'default'
      summary: Revoke All Tokens
      description: Invalidate all tokens for the current user. This will break any applications currently using those tokens.
      responses:
        '204':
          description: All tokens revoked successfully (no content)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: revokeAllMaaSTokens

  # =============================================================================
  # INTER-BFF COMMUNICATION ENDPOINTS
  # =============================================================================

  /gen-ai/api/v1/bff/maas/tokens:
    summary: Manage MaaS BFF tokens via inter-BFF communication
    description: >-
      Issue new ephemeral tokens and revoke existing tokens by communicating with
      the MaaS BFF service. This uses inter-BFF communication for playground session
      token management, allowing Gen-AI playground to request tokens from the MaaS BFF
      without direct cluster access.
    post:
      tags:
        - Inter-BFF
        - MaaS
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace for token operations
          required: true
          schema:
            type: string
            example: 'default'
      summary: Issue Token via MaaS BFF
      description: >-
        Request a new ephemeral token from the MaaS BFF service. The token is issued
        by calling the MaaS BFF's token endpoint, which handles the actual token
        creation logic. This endpoint is used for playground session authentication.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expiration:
                  type: string
                  description: Token time-to-live in Go duration format (ns, us, ms, s, m, h).
                  default: '4h'
                  example: '30m'
                  pattern: '^[0-9]+(ns|us|ms|s|m|h)$'
            example:
              expiration: '30m'
      responses:
        '201':
          description: Token created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Generated JWT token for MaaS API authentication
                        example: 'eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...'
                      expiresAt:
                        type: integer
                        format: int64
                        description: Token expiration timestamp as Unix timestamp
                        example: 1735406400
                    required:
                      - token
                      - expiresAt
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: MaaS BFF service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: issueBFFMaaSToken
    delete:
      tags:
        - Inter-BFF
        - MaaS
      security:
        - Bearer: []
      parameters:
        - name: namespace
          in: query
          description: Kubernetes namespace for token operations
          required: true
          schema:
            type: string
            example: 'default'
      summary: Revoke All Tokens via MaaS BFF
      description: >-
        Revoke all tokens for the current user by calling the MaaS BFF service.
        This is useful for invalidating playground session tokens.
      responses:
        '204':
          description: All tokens revoked successfully (no content)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: MaaS BFF service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalServerError'
      operationId: revokeAllBFFMaaSTokens

