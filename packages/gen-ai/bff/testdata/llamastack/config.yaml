version: 2
distro_name: bff-test
apis:
- responses
- file_processors
- files
- inference
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: ${env.TEST_LLAMA_STACK_PROVIDER}
    provider_type: remote::${env.TEST_LLAMA_STACK_PROVIDER}
    config:
      api_key: ${env.GEMINI_API_KEY}
  vector_io:
  - provider_id: milvus
    provider_type: inline::milvus
    config:
      db_path: ${env.SQLITE_STORE_DIR}/milvus.db
      persistence:
        namespace: vector_io::milvus
        backend: kv_default
  file_processors:
  - provider_id: pypdf
    provider_type: inline::pypdf
    config: {}
  files:
  - provider_id: localfs-files
    provider_type: inline::localfs
    config:
      storage_dir: ${env.SQLITE_STORE_DIR}/files
      metadata_store:
        table_name: files_metadata
        backend: sql_default
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          namespace: agents
          backend: kv_default
        responses:
          table_name: responses
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
  tool_runtime:
  - provider_id: file-search
    provider_type: inline::file-search
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default
    connectors:
      namespace: connectors
      backend: kv_default
registered_resources:
  models:
  - model_id: ${env.TEST_LLAMA_STACK_MODEL_ID}
    model_type: llm
    provider_id: ${env.TEST_LLAMA_STACK_PROVIDER}
  - model_id: ${env.TEST_LLAMA_STACK_EMBEDDING_MODEL_ID}
    model_type: embedding
    provider_id: ${env.TEST_LLAMA_STACK_PROVIDER}
    metadata:
      embedding_dimension: ${env.TEST_LLAMA_STACK_EMBEDDING_DIMENSION}
  shields: []
  vector_stores: []
  datasets: []
  scoring_fns: []
  benchmarks: []
server:
  port: ${env.TEST_LLAMA_STACK_PORT}
vector_stores:
  default_provider_id: milvus
  default_embedding_model:
    provider_id: ${env.TEST_LLAMA_STACK_PROVIDER}
    model_id: ${env.TEST_LLAMA_STACK_EMBEDDING_MODEL_ID}
connectors: []
