apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workspaces-backend
spec:
  podSelector:
    matchLabels:
      app: workspaces-backend
      app.kubernetes.io/component: api
  ingress:
    - from:
        ## allow traffic from istio namespace, which is where the istio ingress gateway pods typically run
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - istio-system
  policyTypes:
    - Ingress
