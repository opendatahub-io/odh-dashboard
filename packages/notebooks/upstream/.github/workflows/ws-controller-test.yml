name: Controller - Build and Test

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - notebooks-v2
      - v*-branch
  pull_request:
    paths:
      - releasing/version/VERSION
      - workspaces/controller/**
      ## NOTE: we also test on changes to the backend as the backend depends on the controller
      - workspaces/backend/**
    branches:
      - main
      - notebooks-v2
      - v*-branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: workspaces/controller/go.mod
          check-latest: true
          cache-dependency-path: workspaces/controller/go.sum

      - ## NOTE: this will cause the porcelain check to fail if go.mod/go.sum are out of date
        name: Go Mod Tidy
        working-directory: workspaces/controller
        run: go mod tidy

      - name: Lint
        working-directory: workspaces/controller
        run: make lint

      - name: Build
        working-directory: workspaces/controller
        run: make build

      - name: Check if there are uncommitted file changes
        working-directory: workspaces/controller
        run: |
          clean=$(git status --porcelain)
          if [[ -z "$clean" ]]; then
              echo "Empty git status --porcelain: $clean"
          else
              echo "Uncommitted file changes detected: $clean"
              git diff
              exit 1
          fi

  image-build:
    needs: build
    uses: ./.github/workflows/ws-build-image.yml
    with:
      image_name: workspaces-controller
      build_file: ./workspaces/controller/Dockerfile
      build_context: ./workspaces/controller
      build_platforms: linux/amd64,linux/ppc64le,linux/arm64/v8
      tag_with_sha: true

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: workspaces/controller/go.mod
          check-latest: true
          cache-dependency-path: workspaces/controller/go.sum

      - name: Run unit tests
        working-directory: workspaces/controller
        run: make test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: ./testing/kind-1-35.yaml
          cluster_name: kind

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: workspaces/controller/go.mod
          check-latest: true
          cache-dependency-path: workspaces/controller/go.sum

      - name: Run e2e tests
        working-directory: workspaces/controller
        run: make test-e2e
