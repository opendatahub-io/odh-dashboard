openapi: 3.0.3
info:
  title: MLflow REST API
  version: 1.0.0
  description: REST API MLflow BFF
  license:
    name: Apache 2.0
    url: "https://www.apache.org/licenses/LICENSE-2.0"
servers:
  - url: "https://localhost:8080"
  - url: "http://localhost:8080"
paths:
  /healthcheck:
    summary: Path targeted for healthcheck purposes.
    description: >-
      The REST endpoint/path used to allow a healthcheck update.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/HealthCheckResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: healthcheck
      summary: HealthCheck
      description: HealthCheck endpoint.
  /api/v1/namespaces:
    summary: Path used to get available namespaces.
    description: >-
      The REST endpoint/path used to list available namespaces.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/NamespacesResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getNamespaces
      summary: Get Available Namespaces
      description: Returns available namespaces in the cluster.
  /api/v1/experiments:
    summary: Path used to list MLflow experiments.
    description: >-
      The REST endpoint/path used to list MLflow experiments from the tracking server.
    get:
      tags:
        - MLflowOperation
      parameters:
        - $ref: "#/components/parameters/workspace"
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
          description: Token for paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
          description: Maximum number of experiments to return (must be a positive integer).
        - name: filter
          in: query
          required: false
          schema:
            type: string
          description: Filter expression (e.g. "name = 'my-experiment'").
      responses:
        "200":
          $ref: "#/components/responses/ExperimentsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: listMLflowExperiments
      summary: List MLflow Experiments
      description: Returns a paginated list of experiments from the MLflow tracking server.
  /api/v1/status:
    summary: Path used to check MLflow availability status.
    description: >-
      Reports whether the BFF has successfully discovered an MLflow CR in the cluster.
    get:
      tags:
        - MLflowOperation
      responses:
        "200":
          $ref: "#/components/responses/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getStatus
      summary: Get MLflow status
      description: Returns whether MLflow is configured and available.
  /api/v1/prompts:
    summary: List or register MLflow prompts.
    description: >-
      List all registered prompts from the MLflow Prompt Registry, or register a new prompt.
    get:
      tags:
        - PromptOperation
      parameters:
        - $ref: "#/components/parameters/workspace"
        - name: filter_name
          in: query
          required: false
          schema:
            type: string
            example: pet
          description: Filter prompts by name prefix.
      responses:
        "200":
          $ref: "#/components/responses/PromptsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: listPrompts
      summary: List All Prompts
      description: >-
        Returns all prompts from the user's workspace and any configured global
        namespaces. Each prompt is annotated with a scope object indicating
        whether it is project-scoped or global. Pagination is not yet supported
        on this endpoint, all prompts are returned in a single response.
    post:
      tags:
        - PromptOperation
      parameters:
        - $ref: "#/components/parameters/workspace"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MLflowRegisterPromptRequest"
      responses:
        "201":
          $ref: "#/components/responses/PromptVersionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: registerPrompt
      summary: Register or Update Prompt
      description: >-
        Creates a new prompt or adds a new version to an existing prompt.
        Either messages (for chat prompts) or template (for text prompts) must be provided, but not both.

  /api/v1/prompts/{name}:
    summary: Load or delete a specific prompt.
    description: >-
      Load the full content of a specific prompt version or delete an entire prompt.
    get:
      tags:
        - PromptOperation
      parameters:
        - name: name
          in: path
          description: Prompt name
          required: true
          schema:
            type: string
            example: vet-appointment-dora
        - $ref: "#/components/parameters/workspace"
        - name: version
          in: query
          description: Specific version number to load (defaults to latest)
          required: false
          schema:
            type: integer
            minimum: 1
            example: 1
      responses:
        "200":
          $ref: "#/components/responses/PromptVersionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: loadPrompt
      summary: Load Prompt
      description: Loads a specific prompt version with full template or message content.
    delete:
      tags:
        - PromptOperation
      parameters:
        - name: name
          in: path
          description: Prompt name to delete
          required: true
          schema:
            type: string
            example: my-prompt
        - $ref: "#/components/parameters/workspace"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: deletePrompt
      summary: Delete Prompt
      description: Deletes an entire prompt and all its versions.

  /api/v1/prompts/{name}/versions:
    summary: List versions of a prompt.
    description: >-
      Lists all versions of a specific prompt with metadata.
    get:
      tags:
        - PromptOperation
      parameters:
        - name: name
          in: path
          description: Prompt name
          required: true
          schema:
            type: string
            example: vet-appointment-dora
        - $ref: "#/components/parameters/workspace"
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: Token for fetching the next page of results.
        - name: max_results
          in: query
          required: false
          schema:
            type: integer
            example: 10
          description: Maximum number of versions to return per page.
      responses:
        "200":
          $ref: "#/components/responses/PromptVersionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: listPromptVersions
      summary: List Prompt Versions
      description: Gets a list of all versions for a specific prompt.

  /api/v1/prompts/{name}/versions/{version}:
    summary: Delete a specific version of a prompt.
    delete:
      tags:
        - PromptOperation
      parameters:
        - name: name
          in: path
          description: Prompt name
          required: true
          schema:
            type: string
            example: my-prompt
        - name: version
          in: path
          description: Version number to delete
          required: true
          schema:
            type: integer
            minimum: 1
            example: 1
        - $ref: "#/components/parameters/workspace"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: deletePromptVersion
      summary: Delete Prompt Version
      description: Deletes a specific version of a prompt.

  /api/v1/user:
    summary: Path used to Retrieve a user based on the header.
    description: >-
      The REST endpoint/path used pass all the config information needed for the UI.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getConfig
      summary: Get configuration info
      description: Gets the configuration information needed for the UI [TBD]
components:
  schemas:
    HealthCheck:
      required:
        - status
        - system_info
      type: object
      properties:
        status:
          type: string
          example: healthy
        system_info:
          type: object
          required:
            - version
          properties:
            version:
              type: string
              example: 1.0.0
    Namespace:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: default
        displayName:
          type: string
          example: default
    Config:
      required:
        - userId
        - clusterAdmin
      type: object
      properties:
        userId:
          type: string
          example: user@example.com
        clusterAdmin:
          type: boolean
          example: true
    BaseResource:
      allOf:
        - $ref: "#/components/schemas/BaseResourceCreate"
        - type: object
          properties:
            id:
              format: int64
              description: Output only. The unique server generated id of the resource.
              type: string
              readOnly: true
            createTimeSinceEpoch:
              format: int64
              description: Output only. Create time of the resource in millisecond since epoch.
              type: string
              readOnly: true
            lastUpdateTimeSinceEpoch:
              format: int64
              description: |-
                Output only. Last update time of the resource since epoch in millisecond
                since epoch.
              type: string
              readOnly: true
    BaseResourceCreate:
      allOf:
        - $ref: "#/components/schemas/BaseResourceUpdate"
        - type: object
          properties:
            name:
              description: |-
                The client provided name of the artifact. This field is optional. If set,
                it must be unique among all the artifacts of the same artifact type within
                a database instance and cannot be changed once set.
              type: string
    BaseResourceUpdate:
      type: object
      properties:
        customProperties:
          description: User provided custom properties which are not defined by its type.
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MetadataValue"
        description:
          description: |-
            An optional description about the resource.
          type: string
        externalId:
          description: |-
            The external id that come from the clients' system. This field is optional.
            If set, it must be unique among all resources within a database instance.
          type: string

    MLflowExperiment:
      description: An MLflow experiment.
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique experiment identifier.
          example: "1"
        name:
          type: string
          description: Human-readable experiment name.
          example: my-training-experiment
        artifactLocation:
          type: string
          description: Location where artifacts for the experiment are stored.
          example: s3://my-bucket/experiments/1
        lifecycleStage:
          type: string
          description: Current lifecycle stage of the experiment (active or deleted).
          example: active
        tags:
          type: object
          additionalProperties:
            type: string
          description: Key-value tags associated with the experiment.
          example:
            team: ml-platform
        creationTime:
          type: string
          format: date-time
          description: Timestamp when the experiment was created.
        lastUpdateTime:
          type: string
          format: date-time
          description: Timestamp of the last update to the experiment.
    MLflowExperimentsResponse:
      description: Paginated list of MLflow experiments.
      type: object
      required:
        - experiments
      properties:
        experiments:
          type: array
          items:
            $ref: "#/components/schemas/MLflowExperiment"
        nextPageToken:
          type: string
          description: Token for retrieving the next page of results.
    PromptScopeType:
      description: Classifies a prompt's scope within the platform.
      type: string
      enum:
        - project
        - global
      example: project
    PromptScope:
      description: Identifies where a prompt lives and how it is scoped.
      type: object
      required:
        - type
        - namespace
      properties:
        type:
          $ref: "#/components/schemas/PromptScopeType"
        namespace:
          type: string
          description: The Kubernetes namespace where the prompt resides.
          example: my-project
    MLflowPrompt:
      description: A prompt from the MLflow Prompt Registry.
      type: object
      required:
        - name
        - latest_version
        - creation_timestamp
        - scope
      properties:
        name:
          type: string
          description: Unique name identifying the prompt.
          example: vet-appointment-dora
        description:
          type: string
          description: Human-readable description of the prompt.
          example: Schedule a veterinary appointment for Dora
        latest_version:
          type: integer
          description: Latest version number of the prompt.
          example: 2
        tags:
          type: object
          additionalProperties:
            type: string
          description: User-defined metadata tags.
          example:
            pet: dora
            category: health
        creation_timestamp:
          type: string
          format: date-time
          description: When the prompt was first created.
        scope:
          $ref: "#/components/schemas/PromptScope"
    MLflowPromptsResponse:
      description: List of MLflow prompts from project and global namespaces.
      type: object
      required:
        - prompts
      properties:
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/MLflowPrompt"
        failed_namespaces:
          type: array
          items:
            type: string
          description: Global namespace names that could not be queried (e.g., RBAC denied, timeout). Empty when all sources succeeded.
    MLflowMessage:
      description: A single message in a chat prompt.
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          description: "Message role (system, user, assistant)."
          example: user
        content:
          type: string
          description: "Message content, may contain {{variable}} placeholders."
          example: "Hello {{name}}"
    MLflowRegisterPromptRequest:
      description: Request body for creating or updating a prompt.
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "Prompt name (creates new or adds version to existing)."
          example: my-prompt
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MLflowMessage"
          description: "Chat messages (for chat prompts, mutually exclusive with template)."
        template:
          type: string
          description: "Text template (for text prompts, mutually exclusive with messages)."
          example: "Hello {{name}}, welcome to {{place}}!"
        commit_message:
          type: string
          description: Version commit message.
          example: initial version
        tags:
          type: object
          additionalProperties:
            type: string
          description: Metadata tags.
        create_only:
          type: boolean
          description: "If true, fails with 409 if a prompt with this name already exists."
    MLflowPromptVersion:
      description: A full prompt version with content.
      type: object
      required:
        - name
        - version
        - created_at
        - updated_at
      properties:
        name:
          type: string
          description: Prompt name.
          example: vet-appointment-dora
        version:
          type: integer
          description: Version number.
          example: 2
        template:
          type: string
          description: Text template content (for text prompts).
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MLflowMessage"
          description: Chat messages (for chat prompts).
        commit_message:
          type: string
          description: Version commit message.
        aliases:
          type: array
          items:
            type: string
          description: Aliases pointing to this version.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Metadata tags.
        created_at:
          type: string
          format: date-time
          description: When this version was created.
        updated_at:
          type: string
          format: date-time
          description: When this version was last updated.
    MLflowPromptVersionMeta:
      description: Version metadata without full content.
      type: object
      required:
        - version
        - created_at
        - updated_at
      properties:
        version:
          type: integer
          description: Version number.
          example: 1
        commit_message:
          type: string
          description: Version commit message.
        aliases:
          type: array
          items:
            type: string
          description: Aliases pointing to this version.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Metadata tags.
        created_at:
          type: string
          format: date-time
          description: When this version was created.
        updated_at:
          type: string
          format: date-time
          description: When this version was last updated.
    MLflowPromptVersionsResponse:
      description: Paginated list of prompt versions.
      type: object
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/MLflowPromptVersionMeta"
        next_page_token:
          type: string
          description: Token for fetching the next page of results.
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: bad_request
          description: Application error code (e.g. bad_request, unauthorized, forbidden, not_found, conflict, service_unavailable, mlflow_error).
        message:
          type: string
          example: "Bad request"
          description: Human-readable error message.

    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/Error"
    MLflowStatus:
      description: MLflow availability status.
      type: object
      required:
        - configured
      properties:
        configured:
          type: boolean
          description: Whether the BFF has discovered a running MLflow CR in the cluster.
          example: true
    SortOrder:
      description: Supported sort direction for ordering result entities.
      enum:
        - ASC
        - DESC
      type: string
    OrderByField:
      description: Supported fields for ordering result entities.
      enum:
        - CREATE_TIME
        - LAST_UPDATE_TIME
        - Id
      type: string

  responses:
    HealthCheckResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthCheck"
      description: Successful health check response.
    NamespacesResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
            required:
              - data
      description: A response containing a list of available namespaces.
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: The specified resource was not found
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Bad Request parameters
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Unauthorized
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Unexpected internal server error
    ConfigResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                type: object
                description: Metadata about the response
              data:
                $ref: "#/components/schemas/Config"
      description: A response containing a list of Config entities.
    ExperimentsResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/MLflowExperimentsResponse"
            required:
              - data
      description: A response containing a paginated list of MLflow experiments.
    PromptsResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/MLflowPromptsResponse"
            required:
              - data
      description: A response containing the list of prompts.
    PromptVersionResponse:
      headers:
        Location:
          schema:
            type: string
          description: URI of the created prompt version (present on 201 responses).
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/MLflowPromptVersion"
            required:
              - data
      description: A response containing a single prompt version.
    PromptVersionsResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/MLflowPromptVersionsResponse"
            required:
              - data
      description: A response containing a paginated list of prompt versions.
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Forbidden - insufficient permissions
    Conflict:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Conflict - resource already exists
    BadGateway:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Bad gateway - unexpected error from the MLflow tracking server
    StatusResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MLflowStatus"
      description: MLflow availability status.
    ServiceUnavailable:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Service unavailable - MLflow server is not configured or reachable
    NoContent:
      description: Operation completed successfully with no response body.

  parameters:
    id:
      name: id
      description: The ID of resource.
      schema:
        type: string
      in: path
      required: true
    name:
      examples:
        name:
          value: entity-name
      name: name
      description: Name of entity to search.
      schema:
        type: string
      in: query
      required: false
    externalId:
      examples:
        externalId:
          value: "10"
      name: externalId
      description: External ID of entity to search.
      schema:
        type: string
      in: query
      required: false
    parentResourceId:
      examples:
        parentResourceId:
          value: "10"
      name: parentResourceId
      description: ID of the parent resource to use for search.
      schema:
        type: string
      in: query
      required: false
    pageSize:
      examples:
        pageSize:
          value: "100"
      name: pageSize
      description: Number of entities in each page.
      schema:
        type: string
      in: query
      required: false
    nextPageToken:
      name: nextPageToken
      description: Token to use to retrieve next page of results.
      schema:
        type: string
      in: query
      required: false
    orderBy:
      style: form
      explode: true
      examples:
        orderBy:
          value: Id
      name: orderBy
      description: Specifies the order by criteria for listing entities.
      schema:
        $ref: "#/components/schemas/OrderByField"
      in: query
      required: false
    sortOrder:
      style: form
      explode: true
      examples:
