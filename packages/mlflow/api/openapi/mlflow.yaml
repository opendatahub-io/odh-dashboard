openapi: 3.0.3
info:
  title: MLflow REST API
  version: 1.0.0
  description: REST API MLflow BFF
  license:
    name: Apache 2.0
    url: "https://www.apache.org/licenses/LICENSE-2.0"
servers:
  - url: "https://localhost:8080"
  - url: "http://localhost:8080"
paths:
  /healthcheck:
    summary: Path targeted for healthcheck purposes.
    description: >-
      The REST endpoint/path used to allow a healthcheck update.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/HealthCheckResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: healthcheck
      summary: HealthCheck
      description: HealthCheck endpoint.
  /api/v1/namespaces:
    summary: Path used to get available namespaces.
    description: >-
      The REST endpoint/path used to list available namespaces.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/NamespacesResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getNamespaces
      summary: Get Available Namespaces
      description: Returns available namespaces in the cluster.
  /api/v1/experiments:
    summary: Path used to list MLflow experiments.
    description: >-
      The REST endpoint/path used to list MLflow experiments from the tracking server.
    get:
      tags:
        - MLflowOperation
      parameters:
        - $ref: "#/components/parameters/workspace"
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
          description: Token for paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
          description: Maximum number of experiments to return (must be a positive integer).
        - name: filter
          in: query
          required: false
          schema:
            type: string
          description: Filter expression (e.g. "name = 'my-experiment'").
      responses:
        "200":
          $ref: "#/components/responses/ExperimentsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: listMLflowExperiments
      summary: List MLflow Experiments
      description: Returns a paginated list of experiments from the MLflow tracking server.
  /api/v1/user:
    summary: Path used to Retrieve a user based on the header.
    description: >-
      The REST endpoint/path used pass all the config information needed for the UI.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getConfig
      summary: Get configuration info
      description: Gets the configuration information needed for the UI [TBD]
components:
  schemas:
    HealthCheck:
      required:
        - status
        - system_info
      type: object
      properties:
        status:
          type: string
          example: healthy
        system_info:
          type: object
          required:
            - version
          properties:
            version:
              type: string
              example: 1.0.0
    Namespace:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: default
        displayName:
          type: string
          example: default
    Config:
      required:
        - userId
        - clusterAdmin
      type: object
      properties:
        userId:
          type: string
          example: user@example.com
        clusterAdmin:
          type: boolean
          example: true
    BaseResource:
      allOf:
        - $ref: "#/components/schemas/BaseResourceCreate"
        - type: object
          properties:
            id:
              format: int64
              description: Output only. The unique server generated id of the resource.
              type: string
              readOnly: true
            createTimeSinceEpoch:
              format: int64
              description: Output only. Create time of the resource in millisecond since epoch.
              type: string
              readOnly: true
            lastUpdateTimeSinceEpoch:
              format: int64
              description: |-
                Output only. Last update time of the resource since epoch in millisecond
                since epoch.
              type: string
              readOnly: true
    BaseResourceCreate:
      allOf:
        - $ref: "#/components/schemas/BaseResourceUpdate"
        - type: object
          properties:
            name:
              description: |-
                The client provided name of the artifact. This field is optional. If set,
                it must be unique among all the artifacts of the same artifact type within
                a database instance and cannot be changed once set.
              type: string
    BaseResourceUpdate:
      type: object
      properties:
        customProperties:
          description: User provided custom properties which are not defined by its type.
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MetadataValue"
        description:
          description: |-
            An optional description about the resource.
          type: string
        externalId:
          description: |-
            The external id that come from the clients' system. This field is optional.
            If set, it must be unique among all resources within a database instance.
          type: string

    MLflowExperiment:
      description: An MLflow experiment.
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique experiment identifier.
          example: "1"
        name:
          type: string
          description: Human-readable experiment name.
          example: my-training-experiment
        artifactLocation:
          type: string
          description: Location where artifacts for the experiment are stored.
          example: s3://my-bucket/experiments/1
        lifecycleStage:
          type: string
          description: Current lifecycle stage of the experiment (active or deleted).
          example: active
        tags:
          type: object
          additionalProperties:
            type: string
          description: Key-value tags associated with the experiment.
          example:
            team: ml-platform
        creationTime:
          type: string
          format: date-time
          description: Timestamp when the experiment was created.
        lastUpdateTime:
          type: string
          format: date-time
          description: Timestamp of the last update to the experiment.
    MLflowExperimentsResponse:
      description: Paginated list of MLflow experiments.
      type: object
      required:
        - experiments
      properties:
        experiments:
          type: array
          items:
            $ref: "#/components/schemas/MLflowExperiment"
        nextPageToken:
          type: string
          description: Token for retrieving the next page of results.
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: bad_request
          description: Application error code (e.g. bad_request, unauthorized, forbidden, not_found, conflict, service_unavailable, mlflow_error).
        message:
          type: string
          example: "Bad request"
          description: Human-readable error message.

    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/Error"
    SortOrder:
      description: Supported sort direction for ordering result entities.
      enum:
        - ASC
        - DESC
      type: string
    OrderByField:
      description: Supported fields for ordering result entities.
      enum:
        - CREATE_TIME
        - LAST_UPDATE_TIME
        - Id
      type: string

  responses:
    HealthCheckResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthCheck"
      description: Successful health check response.
    NamespacesResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
            required:
              - data
      description: A response containing a list of available namespaces.
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: The specified resource was not found
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Bad Request parameters
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Unauthorized
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Unexpected internal server error
    ConfigResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                type: object
                description: Metadata about the response
              data:
                $ref: "#/components/schemas/Config"
      description: A response containing a list of Config entities.
    ExperimentsResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/MLflowExperimentsResponse"
            required:
              - data
      description: A response containing a paginated list of MLflow experiments.
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Forbidden - insufficient permissions
    Conflict:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Conflict - resource already exists
    BadGateway:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Bad gateway - unexpected error from the MLflow tracking server
    ServiceUnavailable:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Service unavailable - MLflow server is not configured or reachable

  parameters:
    id:
      name: id
      description: The ID of resource.
      schema:
        type: string
      in: path
      required: true
    name:
      examples:
        name:
          value: entity-name
      name: name
      description: Name of entity to search.
      schema:
        type: string
      in: query
      required: false
    externalId:
      examples:
        externalId:
          value: "10"
      name: externalId
      description: External ID of entity to search.
      schema:
        type: string
      in: query
      required: false
    parentResourceId:
      examples:
        parentResourceId:
          value: "10"
      name: parentResourceId
      description: ID of the parent resource to use for search.
      schema:
        type: string
      in: query
      required: false
    pageSize:
      examples:
        pageSize:
          value: "100"
      name: pageSize
      description: Number of entities in each page.
      schema:
        type: string
      in: query
      required: false
    nextPageToken:
      name: nextPageToken
      description: Token to use to retrieve next page of results.
      schema:
        type: string
      in: query
      required: false
    orderBy:
      style: form
      explode: true
      examples:
        orderBy:
          value: Id
      name: orderBy
      description: Specifies the order by criteria for listing entities.
      schema:
        $ref: "#/components/schemas/OrderByField"
      in: query
      required: false
    sortOrder:
      style: form
      explode: true
      examples:
        sortOrder:
          value: DESC
      name: sortOrder
      description: "Specifies the sort order for listing entities, defaults to ASC."
      schema:
        $ref: "#/components/schemas/SortOrder"
      in: query
      required: false
    namespace:
      name: namespace
      description: The namespace to filter resources by.
      schema:
        type: string
      in: query
      required: false
    workspace:
      name: workspace
      description: The Kubernetes namespace where the MLflow tracking server is deployed (forwarded as X-MLFLOW-WORKSPACE header).
      schema:
        type: string
      in: query
      required: true

  securitySchemes:
    Bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Bearer JWT scheme
security:
  - Bearer: []
tags:
  - name: K8SOperation
    description: Operation performed in Kubernetes
  - name: MLflowOperation
    description: Operations performed against the MLflow tracking server