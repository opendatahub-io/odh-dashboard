          \ where train CSVs will be written.\n        label_column: Name of the label/target\
          \ column in the dataset.\n        sampled_test_dataset: Output dataset artifact\
          \ for the test split.\n        sampling_method: \"first_n_rows\", \"stratified\"\
          , or \"random\"; if None, derived from task_type.\n        task_type: \"\
          binary\", \"multiclass\", or \"regression\" (default); used when sampling_method\
          \ is None.\n        split_config: Split configuration dictionary. Available\
          \ keys: \"test_size\" (float), \"random_state\" (int), \"stratify\" (bool).\n\
          \        selection_train_size: Fraction of the train portion used for model\
          \ selection (default 0.3).\n\n    Raises:\n        ValueError: If sampling_method\
          \ or task_type is invalid, or if required parameters are missing.\n\n  \
          \  Returns:\n        NamedTuple: Contains sample config, split config, a\
          \ sample row, and paths to selection-train and extra-train CSVs.\n    \"\
          \"\"  # noqa: E501\n    import io\n    import logging\n    import os\n\n\
          \    import boto3\n    import pandas as pd\n\n    logger = logging.getLogger(__name__)\n\
          \n    MAX_SIZE_BYTES = 100 * 1024 * 1024  # 100 MB limit in bytes\n    PANDAS_CHUNK_SIZE\
          \ = 10000  # Rows per batch for streaming read\n    DEFAULT_RANDOM_STATE\
          \ = 42\n    VALID_SAMPLING_METHODS = {\"first_n_rows\", \"stratified\",\
          \ \"random\"}\n    VALID_TASK_TYPES = {\"binary\", \"multiclass\", \"regression\"\
          }\n\n    # Input validation\n    for param, value in (\n        (\"bucket_name\"\
          , bucket_name),\n        (\"file_key\", file_key),\n        (\"workspace_path\"\
          , workspace_path),\n        (\"label_column\", label_column),\n    ):\n\
          \        if not isinstance(value, str) or not value.strip():\n         \
          \   raise TypeError(f\"{param} must be a non-empty string.\")\n\n    if\
          \ task_type not in VALID_TASK_TYPES:\n        raise ValueError(f\"task_type\
          \ must be one of {VALID_TASK_TYPES}; got {task_type!r}.\")\n    if split_config\
          \ is not None and not isinstance(split_config, dict):\n        raise TypeError(\"\
          split_config must be a dictionary with possible keys test_size, random_state,\
          \ stratify.\")\n    if isinstance(split_config, dict):\n        test_size\
          \ = split_config.get(\"test_size\")\n        if test_size is not None and\
          \ (not isinstance(test_size, (int, float)) or test_size <= 0 or test_size\
          \ >= 1):\n            raise TypeError(\"split_config['test_size'] must be\
          \ a number in (0, 1) when provided.\")\n        random_state = split_config.get(\"\
          random_state\")\n        if random_state is not None and (not isinstance(random_state,\
          \ int)):\n            raise TypeError(\"split_config['random_state'] must\
          \ be an integer when provided.\")\n        stratify = split_config.get(\"\
          stratify\")\n        if stratify is not None and not isinstance(stratify,\
          \ bool):\n            raise TypeError(\"split_config['stratify'] must be\
          \ a boolean when provided.\")\n    if not isinstance(selection_train_size,\
          \ (int, float)):\n        raise TypeError(\"selection_train_size must be\
          \ a numerical value.\")\n    elif selection_train_size <= 0 or selection_train_size\
          \ >= 1:\n        raise ValueError(\"selection_train_size must be in a range\
          \ 0 to 1.\")\n\n    if sampling_method is None:\n        if task_type in\
          \ (\"binary\", \"multiclass\"):\n            sampling_method = \"stratified\"\
          \n        else:\n            sampling_method = \"random\"\n        logger.info(\"\
          Sampling method derived from task_type=%s: using %s\", task_type, sampling_method)\n\
          \    else:\n        if sampling_method not in VALID_SAMPLING_METHODS:\n\
          \            raise ValueError(\n                f\"sampling_method must\
          \ be one of {VALID_SAMPLING_METHODS} or None; got {sampling_method!r}.\"\
          \n            )\n        if sampling_method == \"stratified\" and task_type\
          \ not in (\"binary\", \"multiclass\"):\n            raise ValueError(\n\
          \                \"Stratified sampling is only available when task_type\
          \ is \"\n                \"'binary' or 'multiclass' (classification tasks).\
          \ \"\n                f\"Got task_type='{task_type}'.\"\n            )\n\
          \        logger.info(\"Performing sampling: method=%s\", sampling_method)\n\
          \n    def get_s3_client(verify=True):\n        \"\"\"Create and return an\
          \ S3 client using credentials from environment variables.\"\"\"\n      \
          \  access_key = os.environ.get(\"AWS_ACCESS_KEY_ID\")\n        secret_key\
          \ = os.environ.get(\"AWS_SECRET_ACCESS_KEY\")\n        endpoint_url = os.environ.get(\"\
          AWS_S3_ENDPOINT\")\n        region_name = os.environ.get(\"AWS_DEFAULT_REGION\"\
          )\n\n        if (access_key and not secret_key) or (secret_key and not access_key):\n\
          \            raise ValueError(\n                \"S3 credentials misconfigured:\
          \ AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must either \"\n         \
          \       \"both be set and non-empty, or both be unset. Check the Kubernetes\
          \ secret or environment configuration.\"\n            )\n        if not\
          \ access_key and not secret_key:\n            raise ValueError(\n      \
          \          \"S3 credentials missing: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY\
          \ must be provided via \"\n                \"a Kubernetes secret or environment\
          \ configuration when using s3:// dataset URIs.\"\n            )\n\n    \
          \    if not endpoint_url:\n            raise ValueError(\n             \
          \   \"S3 credentials missing: AWS_S3_ENDPOINT must be provided via \"\n\
          \                \"a Kubernetes secret or environment configuration.\"\n\
          \            )\n\n        return boto3.client(\n            \"s3\",\n  \
          \          endpoint_url=endpoint_url,\n            region_name=region_name,\n\
          \            aws_access_key_id=access_key,\n            aws_secret_access_key=secret_key,\n\
          \            verify=verify,\n        )\n\n    def _sample_first_n_rows(text_stream,\
          \ chunk_size, max_size_bytes):\n        \"\"\"Take rows from the start of\
          \ the stream until the size limit is reached.\"\"\"\n        chunk_list\
          \ = []\n        accumulated_size = 0\n\n        try:\n            for chunk_df\
          \ in pd.read_csv(text_stream, chunksize=chunk_size):\n                chunk_memory\
          \ = chunk_df.memory_usage(deep=True).sum()\n\n                if accumulated_size\
          \ + chunk_memory > max_size_bytes:\n                    remaining_bytes\
          \ = max_size_bytes - accumulated_size\n                    if remaining_bytes\
          \ <= 0:\n                        # No remaining budget; do not take any\
          \ more rows\n                        break\n                    bytes_per_row\
          \ = chunk_memory / len(chunk_df) if len(chunk_df) > 0 else 0\n         \
          \           if bytes_per_row > 0:\n                        rows_to_take\
          \ = int(remaining_bytes / bytes_per_row)\n                        if rows_to_take\
          \ > 0:\n                            chunk_df = chunk_df.head(rows_to_take)\n\
          \                            chunk_list.append(chunk_df)\n             \
          \       break\n\n                chunk_list.append(chunk_df)\n         \
          \       accumulated_size += chunk_memory\n\n                if accumulated_size\
          \ >= max_size_bytes:\n                    break\n        except Exception\
          \ as e:\n            if not chunk_list:\n                raise ValueError(f\"\
          Error reading CSV from S3: {str(e)}\") from e\n\n        return pd.concat(chunk_list,\
          \ ignore_index=True) if chunk_list else pd.DataFrame()\n\n    def _sample_stratified(text_stream,\
          \ chunk_size, max_size_bytes, label_column):\n        \"\"\"Merge batches\
          \ and subsample proportionally by target column to stay under the size limit.\"\
          \"\"\n        subsampled_data = None\n\n        try:\n            for chunk_df\
          \ in pd.read_csv(text_stream, chunksize=chunk_size):\n                if\
          \ label_column not in chunk_df.columns:\n                    raise ValueError(\n\
          \                        f\"Target column '{label_column}' not found in\
          \ the dataset. \"\n                        f\"Available columns: {list(chunk_df.columns)}\"\
          \n                    )\n                chunk_df = chunk_df.dropna(subset=[label_column])\n\
          \                if chunk_df.empty:\n                    continue\n\n  \
          \              combined_data = (\n                    pd.concat([subsampled_data,\
          \ chunk_df], ignore_index=True)\n                    if subsampled_data\
          \ is not None\n                    else chunk_df\n                )\n  \
          \              combined_memory = combined_data.memory_usage(deep=True).sum()\n\
          \n                if combined_memory <= max_size_bytes:\n              \
          \      subsampled_data = combined_data\n                else:\n        \
          \            sampling_frac = max_size_bytes / combined_memory\n        \
          \            subsampled_data = (\n                        combined_data.groupby(label_column,\
          \ group_keys=False)\n                        .apply(lambda x: x.sample(frac=sampling_frac,\
          \ random_state=DEFAULT_RANDOM_STATE))\n                        .reset_index(drop=True)\n\
          \                    )\n\n        except Exception as e:\n            logger.debug(\"\
          Error reading CSV and stratified sampling: %s\", e, exc_info=True)\n   \
          \         if subsampled_data is None or subsampled_data.empty:\n       \
          \         raise ValueError(f\"Error reading CSV from S3: {str(e)}\") from\
          \ e\n\n        if subsampled_data is None:\n            return pd.DataFrame()\n\
          \        return subsampled_data.sample(frac=1, random_state=DEFAULT_RANDOM_STATE).reset_index(drop=True)\n\
          \n    def _sample_random(text_stream, chunk_size, max_size_bytes):\n   \
          \     \"\"\"Iterate all batches, merge with accumulated data, randomly subsample\
          \ when over the limit.\"\"\"\n        subsampled_data = None\n\n       \
          \ try:\n            for chunk_df in pd.read_csv(text_stream, chunksize=chunk_size):\n\
          \                data = (\n                    pd.concat([subsampled_data,\
          \ chunk_df], ignore_index=True)\n                    if subsampled_data\
          \ is not None\n                    else chunk_df\n                )\n  \
          \              combined_memory = data.memory_usage(deep=True).sum()\n\n\
          \                if combined_memory <= max_size_bytes:\n               \
          \     subsampled_data = data\n                else:\n                  \
          \  sampling_frac = max_size_bytes / combined_memory\n                  \
          \  subsampled_data = data.sample(frac=sampling_frac, random_state=DEFAULT_RANDOM_STATE).reset_index(\n\
          \                        drop=True\n                    )\n\n          \
          \  return subsampled_data if subsampled_data is not None else pd.DataFrame()\n\
          \n        except Exception as e:\n            if subsampled_data is None\
          \ or subsampled_data.empty:\n                raise ValueError(f\"Error reading\
