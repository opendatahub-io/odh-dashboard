          will have their signs FLIPPED and are shown as negative. # noqa: E501\n\
          \    # This is to ensure that a higher value always means a better model,\
          \ so users do not need to know about the metric's normal directionality\
          \ when interpreting the leaderboard. # noqa: E501\n    leaderboard_df =\
          \ pd.DataFrame(results).sort_values(by=eval_metric, ascending=False)\n \
          \   n = len(leaderboard_df)\n    leaderboard_df.index = pd.RangeIndex(start=1,\
          \ stop=n + 1, name=\"rank\")\n\n    html_table = _build_leaderboard_table(leaderboard_df)\n\
          \n    best_model_name = leaderboard_df.iloc[0][\"model\"]\n    template_path\
          \ = Path(embedded_artifact.path) / \"leaderboard_html_template.html\"\n\
          \    html_content = _build_leaderboard_html(\n        template_path=template_path,\n\
          \        table_html=html_table,\n        eval_metric=eval_metric,\n    \
          \    best_model_name=best_model_name,\n        num_models=len(leaderboard_df),\n\
          \    )\n    with open(html_artifact.path, \"w\", encoding=\"utf-8\") as\
          \ f:\n        f.write(html_content)\n\n    html_artifact.metadata[\"data\"\
          ] = leaderboard_df.to_dict()\n    html_artifact.metadata[\"display_name\"\
          ] = \"automl_leaderboard\"\n    return NamedTuple(\"outputs\", best_model=str)(best_model=best_model_name)\n\
          \n"
        image: quay.io/rhoai/odh-automl-rhel9:rhoai-3.4
        resources:
          cpuRequest: 1.0
          memoryRequest: 4.294967296
          resourceCpuRequest: '1'
          resourceMemoryRequest: 4Gi
pipelineInfo:
  description: 'End-to-end AutoGluon tabular training pipeline implementing a two-stage
    approach: first builds and selects top-performing models on sampled data, then
    refits them on the full dataset. The pipeline loads data from S3, splits it into
    train/test sets, trains multiple AutoGluon models using ensembling (stacking and
    bagging), selects the top N performers, refits each on the complete training data
    sequentially, and finally evaluates all refitted models to generate a comprehensive
    leaderboard with performance metrics.'
  name: autogluon-tabular-training-pipeline
root:
  dag:
    tasks:
      autogluon-models-training:
        cachingOptions: {}
        componentRef:
          name: comp-autogluon-models-training
        dependentTasks:
        - automl-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: automl-data-loader
          parameters:
            extra_train_data_path:
              taskOutputParameter:
                outputParameterKey: extra_train_data_path
                producerTask: automl-data-loader
            label_column:
              componentInputParameter: label_column
            pipeline_name:
              runtimeValue:
                constant: '{{$.pipeline_job_resource_name}}'
            run_id:
              runtimeValue:
                constant: '{{$.pipeline_job_uuid}}'
            sample_row:
              taskOutputParameter:
                outputParameterKey: sample_row
                producerTask: automl-data-loader
            sampling_config:
              taskOutputParameter:
                outputParameterKey: sample_config
                producerTask: automl-data-loader
            split_config:
              taskOutputParameter:
                outputParameterKey: split_config
                producerTask: automl-data-loader
            task_type:
              componentInputParameter: task_type
            top_n:
              componentInputParameter: top_n
            train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: automl-data-loader
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: autogluon-models-training
      automl-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-automl-data-loader
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: train_data_bucket_name
            file_key:
              componentInputParameter: train_data_file_key
            label_column:
              componentInputParameter: label_column
            task_type:
              componentInputParameter: task_type
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: automl-data-loader
      leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - autogluon-models-training
        inputs:
          artifacts:
            models_artifact:
              taskOutputArtifact:
                outputArtifactKey: models_artifact
                producerTask: autogluon-models-training
          parameters:
            eval_metric:
              taskOutputParameter:
                outputParameterKey: eval_metric
                producerTask: autogluon-models-training
        taskInfo:
          name: leaderboard-evaluation
  inputDefinitions:
    parameters:
      label_column:
        description: Name of the target/label column in the dataset.
        parameterType: STRING
      task_type:
        description: '"binary", "multiclass", or "regression"; drives metrics and
          model types.'
        parameterType: STRING
      top_n:
        defaultValue: 3.0
        description: 'Number of top models to select and refit (default: 3); positive
          integer from range [1, 10].'
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_data_bucket_name:
        description: S3-compatible bucket name containing the tabular data file.
        parameterType: STRING
      train_data_file_key:
        description: S3 object key of the CSV file (features and target column).
        parameterType: STRING
      train_data_secret_name:
        description: Kubernetes secret name with S3 credentials (AWS_ACCESS_KEY_ID,
          AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION).
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-automl-data-loader:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: train_data_secret_name
    pipelineConfig:
      workspace:
        kubernetes:
          pvcSpecPatch:
            accessModes:
            - ReadWriteOnce
        size: 12Gi
