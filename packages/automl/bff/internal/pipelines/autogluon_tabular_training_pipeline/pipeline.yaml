          \    models_artifact.path /\n          <model_name>_FULL /\n           \
          \ metrics / metrics.json\n            predictor / predictor.pkl\n      \
          \      notebooks / automl_predictor_notebook.ipynb\n\n    ``models_artifact.metadata[\"\
          model_names\"]`` must contain the list of\n    refitted model display names\
          \ (e.g. ``[\"LightGBM_BAG_L1_FULL\", ...]``).\n\n    Args:\n        models_artifact:\
