          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef automl_data_loader(  # noqa: D417\n    file_key: str,\n    bucket_name:\
          \ str,\n    workspace_path: str,\n    label_column: str,\n    sampled_test_dataset:\
          \ dsl.Output[dsl.Dataset],\n    component_status: dsl.Output[dsl.Artifact],\n\
          \    sampling_method: Optional[str] = None,\n    task_type: str = \"regression\"\
          ,\n    split_config: Optional[dict] = None,\n    selection_train_size: float\
          \ = 0.3,\n) -> NamedTuple(\n    \"outputs\",\n    sample_config=dict,\n\
          \    split_config=dict,\n    sample_row=str,\n    models_selection_train_data_path=str,\n\
          \    extra_train_data_path=str,\n):\n    \"\"\"Automl Data Loader component.\n\
          \n    Loads tabular (CSV) data from S3 in batches, sampling up to 100 MB\
          \ of data,\n    then splits the sampled data into test, selection-train,\
          \ and extra-train sets.\n\n    The component reads data in chunks to efficiently\
          \ handle large files without\n    loading the entire dataset into memory\
          \ at once. After sampling, it performs\n    a two-stage split:\n\n    1.\
          \ **Primary split** (default 80/20): separates a *test set* (20%, written\
          \ to\n       the ``sampled_test_dataset`` S3 artifact) from the *train portion*\
          \ (80%).\n\n    2. **Secondary split** (default 30/70 of the train portion):\
          \ produces\n       ``models_selection_train_dataset.csv`` (30%, used for\
          \ model selection) and\n       ``extra_train_dataset.csv`` (70%, passed\
          \ to ``refit_full`` as extra data).\n       Both are written to the PVC\
          \ workspace under ``{workspace_path}/datasets/``.\n\n    For **regression**\
          \ tasks the split is random; for **binary** and **multiclass**\n    tasks\
          \ the split is **stratified** by the label column by default.\n\n    Rows\
          \ with a missing label (NaN / empty in ``label_column``) are dropped after\
          \ load\n    and before splitting, so regression runs do not propagate null\
          \ targets into splits\n    or the ``sample_row`` JSON (stratified sampling\
          \ already dropped per chunk; this\n    applies the same rule to random and\
          \ first-n-rows paths).\n\n    After cleansing (infinity replacement, duplicate\
          \ removal, and label drop), at least\n    **100** valid records must remain;\
          \ otherwise the component fails with a clear error\n    so downstream AutoML\
          \ training does not run on datasets too small to split reliably.\n\n   \
          \ After sampling, **+/- infinity** values in the frame are replaced with\
          \ **NaN** (same\n    idea as AutoAI ``loadXy``), then **full-row duplicates**\
          \ are dropped before the\n    label drop and train/test split.\n\n    Authentication\
          \ uses AWS-style credentials provided via environment variables\n    (e.g.\
          \ from a Kubernetes secret).\n\n    Args:\n        file_key: S3 object key\
          \ of the CSV file.\n        bucket_name: S3 bucket name containing the file.\n\
          \        workspace_path: PVC workspace directory where train CSVs will be\
          \ written.\n        label_column: Name of the label/target column in the\
          \ dataset.\n        sampled_test_dataset: Output dataset artifact for the\
          \ test split.\n        component_status: Output artifact containing stage-level\
          \ progress tracking for this component.\n        sampling_method: \"first_n_rows\"\
          , \"stratified\", or \"random\"; if None, derived from task_type.\n    \
          \    task_type: \"binary\", \"multiclass\", or \"regression\" (default);\
          \ used when sampling_method is None.\n        split_config: Split configuration\
          \ dictionary. Available keys: \"test_size\" (float), \"random_state\" (int),\
          \ \"stratify\" (bool).\n        selection_train_size: Fraction of the train\
          \ portion used for model selection (default 0.3).\n\n    Raises:\n     \
          \   ValueError: If sampling_method or task_type is invalid, if required\
          \ parameters are missing,\n            or if fewer than 100 valid records\
          \ remain after data cleansing.\n\n    Returns:\n        NamedTuple: Contains\
          \ sample config, split config, a sample row, and paths to selection-train\
          \ and extra-train CSVs.\n    \"\"\"  # noqa: E501\n    import io\n    import\
          \ logging\n    import math\n    import os\n\n    import boto3\n    import\
          \ pandas as pd\n\n    logger = logging.getLogger(__name__)\n\n    MAX_SIZE_BYTES\
          \ = 100 * 1024 * 1024  # 100 MB limit in bytes\n    MIN_VALID_RECORDS_AFTER_CLEANSING\
          \ = 100\n    PANDAS_CHUNK_SIZE = 10000  # Rows per batch for streaming read\n\
          \    DEFAULT_RANDOM_STATE = 42\n    VALID_SAMPLING_METHODS = {\"first_n_rows\"\
          , \"stratified\", \"random\"}\n    VALID_TASK_TYPES = {\"binary\", \"multiclass\"\
          , \"regression\"}\n\n    # Input validation\n    for param, value in (\n\
          \        (\"bucket_name\", bucket_name),\n        (\"file_key\", file_key),\n\
          \        (\"workspace_path\", workspace_path),\n        (\"label_column\"\
          , label_column),\n    ):\n        if not isinstance(value, str) or not value.strip():\n\
          \            raise TypeError(f\"{param} must be a non-empty string.\")\n\
          \n    if task_type not in VALID_TASK_TYPES:\n        raise ValueError(f\"\
          task_type must be one of {VALID_TASK_TYPES}; got {task_type!r}.\")\n   \
          \ if split_config is not None and not isinstance(split_config, dict):\n\
          \        raise TypeError(\"split_config must be a dictionary with possible\
          \ keys test_size, random_state, stratify.\")\n    if isinstance(split_config,\
          \ dict):\n        test_size = split_config.get(\"test_size\")\n        if\
          \ test_size is not None and (not isinstance(test_size, (int, float)) or\
          \ test_size <= 0 or test_size >= 1):\n            raise TypeError(\"split_config['test_size']\
          \ must be a number in (0, 1) when provided.\")\n        random_state = split_config.get(\"\
          random_state\")\n        if random_state is not None and (not isinstance(random_state,\
          \ int)):\n            raise TypeError(\"split_config['random_state'] must\
          \ be an integer when provided.\")\n        stratify = split_config.get(\"\
          stratify\")\n        if stratify is not None and not isinstance(stratify,\
          \ bool):\n            raise TypeError(\"split_config['stratify'] must be\
          \ a boolean when provided.\")\n    if not isinstance(selection_train_size,\
          \ (int, float)):\n        raise TypeError(\"selection_train_size must be\
          \ a numerical value.\")\n    elif selection_train_size <= 0 or selection_train_size\
          \ >= 1:\n        raise ValueError(\"selection_train_size must be in a range\
          \ 0 to 1.\")\n\n    from kfp_components.components.training.automl.shared.component_status\
          \ import ComponentStatusTracker\n\n    # Initialize status tracker\n   \
          \ status = ComponentStatusTracker(component_status.path, \"automl_data_loader\"\
          )\n    with status:\n        # Stage: validate_inputs\n        status.record(\"\
          validate_inputs\", \"started\")\n        # Validation happens inline below\n\
          \        status.record(\"validate_inputs\", \"completed\")\n\n        if\
          \ sampling_method is None:\n            if task_type in (\"binary\", \"\
          multiclass\"):\n                sampling_method = \"stratified\"\n     \
          \       else:\n                sampling_method = \"random\"\n          \
          \  logger.info(\"Sampling method derived from task_type=%s: using %s\",\
          \ task_type, sampling_method)\n        else:\n            if sampling_method\
          \ not in VALID_SAMPLING_METHODS:\n                raise ValueError(\n  \
          \                  f\"sampling_method must be one of {VALID_SAMPLING_METHODS}\
          \ or None; got {sampling_method!r}.\"\n                )\n            if\
          \ sampling_method == \"stratified\" and task_type not in (\"binary\", \"\
          multiclass\"):\n                raise ValueError(\n                    \"\
          Stratified sampling is only available when task_type is \"\n           \
          \         \"'binary' or 'multiclass' (classification tasks). \"\n      \
          \              f\"Got task_type='{task_type}'.\"\n                )\n  \
          \          logger.info(\"Performing sampling: method=%s\", sampling_method)\n\
          \n        def get_s3_client(verify=True):\n            \"\"\"Create and\
