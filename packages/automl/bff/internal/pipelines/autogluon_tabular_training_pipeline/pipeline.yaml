# PIPELINE DEFINITION
# Name: autogluon-tabular-training-pipeline
# Description: End-to-end AutoGluon tabular training pipeline implementing a two-stage approach: first builds and selects top-performing models on sampled data, then refits them on the full dataset. The pipeline loads data from S3, splits it into train/test sets, trains multiple AutoGluon models using ensembling (stacking and bagging), selects the top N performers, refits each on the complete training data sequentially, and finally evaluates all refitted models to generate a comprehensive leaderboard with performance metrics.
# Inputs:
#    label_column: str
#    task_type: str
#    top_n: int [Default: 3.0]
#    train_data_bucket_name: str
#    train_data_file_key: str
#    train_data_secret_name: str
components:
  comp-autogluon-models-training:
    executorLabel: exec-autogluon-models-training
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Dataset artifact (CSV) used for leaderboard ranking and evaluation.
      parameters:
        extra_train_data_path:
          defaultValue: ''
          description: Optional path to extra training CSV passed to ``refit_full``.
          isOptional: true
          parameterType: STRING
        label_column:
          description: Target/label column name in train and test datasets.
          parameterType: STRING
        pipeline_name:
          description: Pipeline run name; last dash-segment stripped for the notebook.
          parameterType: STRING
        run_id:
          description: Pipeline run ID written into the generated notebook.
          parameterType: STRING
        sample_row:
          description: JSON array of row dicts for the notebook example input; label
            column is stripped.
          parameterType: STRING
        sampling_config:
          description: Data sampling config stored in artifact metadata.
          isOptional: true
          parameterType: STRUCT
        split_config:
          description: Data split config stored in artifact metadata.
          isOptional: true
          parameterType: STRUCT
        task_type:
          description: 'ML task type: ``"binary"``, ``"multiclass"``, or ``"regression"``.'
          parameterType: STRING
        top_n:
          description: Number of top models to select and refit (1-10).
          parameterType: NUMBER_INTEGER
        train_data_path:
          description: Path to the selection-train CSV on the PVC workspace.
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory; predictor saved at ``workspace_path/autogluon_predictor``.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        models_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        eval_metric:
          parameterType: STRING
  comp-automl-data-loader:
    executorLabel: exec-automl-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: S3 bucket name containing the file.
          parameterType: STRING
        file_key:
          description: S3 object key of the CSV file.
          parameterType: STRING
        label_column:
          description: Name of the label/target column in the dataset.
          parameterType: STRING
        sampling_method:
          description: '"first_n_rows", "stratified", or "random"; if None, derived
            from task_type.'
          isOptional: true
          parameterType: STRING
        selection_train_size:
          defaultValue: 0.3
          description: Fraction of the train portion used for model selection (default
            0.3).
          isOptional: true
          parameterType: NUMBER_DOUBLE
        split_config:
          description: 'Split configuration dictionary. Available keys: "test_size"
            (float), "random_state" (int), "stratify" (bool).'
          isOptional: true
          parameterType: STRUCT
        task_type:
          defaultValue: regression
          description: '"binary", "multiclass", or "regression" (default); used when
            sampling_method is None.'
          isOptional: true
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory where train CSVs will be written.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        extra_train_data_path:
          parameterType: STRING
        models_selection_train_data_path:
          parameterType: STRING
        sample_config:
          parameterType: STRUCT
        sample_row:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: 'Combined Model artifact from ``autogluon_models_training``

            with ``metadata["model_names"]`` and per-model subdirectories.'
      parameters:
        eval_metric:
          description: 'Metric name for ranking (e.g. ``"accuracy"``, ``"root_mean_squared_error"``);

            leaderboard sorted descending (AutoGluon uses higher-is-better convention).'
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-autogluon-models-training:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - autogluon_models_training
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\n__KFP_EMBEDDED_ARCHIVE_B64 = ''\n\
          \nimport base64 as __kfp_b64\nimport io as __kfp_io\nimport os as __kfp_os\n\
          import sys as __kfp_sys\nimport tarfile as __kfp_tarfile\nimport tempfile\
          \ as __kfp_tempfile\n\n# Extract embedded archive at import time to ensure\
          \ sys.path and globals are set\n__kfp_tmpdir = __kfp_tempfile.TemporaryDirectory()\n\
          __KFP_EMBEDDED_ASSET_DIR = __kfp_tmpdir.name\ntry:\n    __kfp_bytes = __kfp_b64.b64decode(__KFP_EMBEDDED_ARCHIVE_B64.encode('ascii'))\n\
          \    with __kfp_tarfile.open(fileobj=__kfp_io.BytesIO(__kfp_bytes), mode='r:gz')\
          \ as __kfp_tar:\n        __kfp_tar.extractall(path=__KFP_EMBEDDED_ASSET_DIR)\n\
          except Exception as __kfp_e:\n    raise RuntimeError(f'Failed to extract\
          \ embedded archive: {__kfp_e}')\n\n# Always prepend the extracted directory\
          \ to sys.path for import resolution\nif __KFP_EMBEDDED_ASSET_DIR not in\
          \ __kfp_sys.path:\n    __kfp_sys.path.insert(0, __KFP_EMBEDDED_ASSET_DIR)\n\
          \n\n\n\ndef autogluon_models_training(\n    label_column: str,\n    task_type:\
          \ str,\n    top_n: int,\n    train_data_path: str,\n    test_data: dsl.Input[dsl.Dataset],\n\
          \    workspace_path: str,\n    pipeline_name: str,\n    run_id: str,\n \
          \   sample_row: str,\n    models_artifact: dsl.Output[dsl.Model],\n    notebooks:\
          \ dsl.EmbeddedInput[dsl.Dataset],\n    sampling_config: Optional[dict] =\
          \ None,\n    split_config: Optional[dict] = None,\n    extra_train_data_path:\
          \ str = \"\",\n) -> NamedTuple(\"outputs\", eval_metric=str):\n    \"\"\"\
          Train AutoGluon models, select the top N, and refit each on the full dataset.\n\
          \n    This component combines the model selection and full-refit stages\
          \ into a single\n    step. It trains a TabularPredictor on sampled data,\
          \ ranks all models on the test\n    set, then refits each of the top N models\
          \ on the full training data in a single\n    ``refit_full`` call. Post-refit\
          \ work (predict, evaluate, feature importance,\n    confusion matrix, notebook\
          \ generation) runs concurrently across all top-N models\n    via ``ThreadPoolExecutor``.\
          \ The deployment clone (``set_model_best`` +\n    ``clone_for_deployment``)\
          \ is serialized afterward because it mutates predictor\n    state. All artifacts\
          \ are written under a single output artifact so the pipeline\n    does not\
          \ require a ParallelFor loop. Each model directory contains a ``model.json``\n\
          \    file with model metadata (name, location, metrics).\n\n    Args:\n\
          \        label_column: Target/label column name in train and test datasets.\n\
          \        task_type: ML task type: ``\"binary\"``, ``\"multiclass\"``, or\
          \ ``\"regression\"``.\n        top_n: Number of top models to select and\
          \ refit (1-10).\n        train_data_path: Path to the selection-train CSV\
          \ on the PVC workspace.\n        test_data: Dataset artifact (CSV) used\
          \ for leaderboard ranking and evaluation.\n        workspace_path: PVC workspace\
          \ directory; predictor saved at ``workspace_path/autogluon_predictor``.\n\
          \        pipeline_name: Pipeline run name; last dash-segment stripped for\
          \ the notebook.\n        run_id: Pipeline run ID written into the generated\
          \ notebook.\n        sample_row: JSON array of row dicts for the notebook\
          \ example input; label column is stripped.\n        models_artifact: Output\
          \ Model artifact containing all refitted model subdirectories.\n       \
          \ notebooks: Embedded notebook templates injected by the KFP runtime.\n\
          \        sampling_config: Data sampling config stored in artifact metadata.\n\
          \        split_config: Data split config stored in artifact metadata.\n\
          \        extra_train_data_path: Optional path to extra training CSV passed\
          \ to ``refit_full``.\n\n    Returns:\n        NamedTuple with ``eval_metric``\
          \ (the metric used for ranking, e.g. ``\"r2\"`` or ``\"accuracy\"``).\n\n\
          \    Raises:\n        TypeError: If any required string parameter is empty\
          \ or configs have wrong types.\n        ValueError: If ``task_type`` is\
          \ invalid, ``top_n`` is out of range, ``sample_row``\n            is not\
          \ a JSON list, or ``problem_type`` is unsupported for notebook generation.\n\
          \        FileNotFoundError: If train/test data or predictor paths cannot\
          \ be found.\n    \"\"\"  # noqa: E501\n    import json\n    import logging\n\
          \    import math\n    import shutil\n    from concurrent.futures import\
          \ ThreadPoolExecutor\n    from pathlib import Path\n\n    import pandas\
          \ as pd\n    from autogluon.tabular import TabularPredictor\n\n    VALID_TASK_TYPES\
          \ = {\"binary\", \"multiclass\", \"regression\"}\n    TOP_N_MAX = 10\n\n\
          \    # Input parameters validation\n    if not isinstance(label_column,\
          \ str) or not label_column.strip():\n        raise TypeError(\"label_column\
          \ must be a non-empty string.\")\n    if task_type not in VALID_TASK_TYPES:\n\
          \        raise ValueError(f\"task_type must be one of {VALID_TASK_TYPES};\
          \ got {task_type!r}.\")\n    if not train_data_path or not isinstance(train_data_path,\
          \ str) or not train_data_path.strip():\n        raise TypeError(\"train_data_path\
          \ must be a non-empty string.\")\n    if not workspace_path or not isinstance(workspace_path,\
          \ str) or not workspace_path.strip():\n        raise TypeError(\"workspace_path\
          \ must be a non-empty string.\")\n    if top_n <= 0 or top_n > TOP_N_MAX:\n\
          \        raise ValueError(f\"top_n must be an integer in the range (0, {TOP_N_MAX}];\
          \ got {top_n}.\")\n    for param, value in (\n        (\"pipeline_name\"\
          , pipeline_name),\n        (\"run_id\", run_id),\n        (\"sample_row\"\
          , sample_row),\n    ):\n        if not isinstance(value, str) or not value.strip():\n\
          \            raise TypeError(f\"{param} must be a non-empty string.\")\n\
          \    if sampling_config is not None and not isinstance(sampling_config,\
          \ dict):\n        raise TypeError(\"sampling_config must be a dictionary\
          \ or None.\")\n    if split_config is not None and not isinstance(split_config,\
          \ dict):\n        raise TypeError(\"split_config must be a dictionary or\
          \ None.\")\n\n    sampling_config = sampling_config or {}\n    split_config\
          \ = split_config or {}\n\n    try:\n        sample_row_list = json.loads(sample_row)\n\
          \    except json.JSONDecodeError as e:\n        raise TypeError(f\"sample_row\
          \ must be valid JSON array: {e}\") from e\n    if not isinstance(sample_row_list,\
          \ list):\n        raise ValueError(\"sample_row must be a JSON array list\
          \ of row objects.\")\n\n    logger = logging.getLogger(__name__)\n\n   \
          \ DEFAULT_PRESET = \"medium_quality\"\n    DEFAULT_TIME_LIMIT = 30 * 60\
          \  # 30 minutes\n\n    # 1. models selection stage\n\n    train_data_df\
          \ = pd.read_csv(train_data_path)\n    test_data_df = pd.read_csv(test_data.path)\n\
          \    extra_train_df = pd.read_csv(extra_train_data_path) if extra_train_data_path.strip()\
          \ else None\n\n    eval_metric = \"r2\" if task_type == \"regression\" else\
          \ \"accuracy\"\n\n    predictor_path = Path(workspace_path) / \"autogluon_predictor\"\
          \n    predictor = TabularPredictor(\n        problem_type=task_type,\n \
          \       label=label_column,\n        eval_metric=eval_metric,\n        path=predictor_path,\n\
          \        verbosity=2,\n    ).fit(\n        train_data=train_data_df,\n \
          \       num_stack_levels=1,\n        num_bag_folds=4,\n        use_bag_holdout=True,\n\
          \        holdout_frac=0.2,\n        time_limit=DEFAULT_TIME_LIMIT,\n   \
          \     presets=DEFAULT_PRESET,\n    )\n\n    # Select top N models\n    leaderboard\
          \ = predictor.leaderboard(test_data_df)\n    logger.info(\"Leaderboard:\\\
          n\\n %s\", leaderboard.head(top_n).to_string())\n    top_models = leaderboard.head(top_n)[\"\
          model\"].values.tolist()\n\n    model_config = {\n        \"preset\": DEFAULT_PRESET,\n\
          \        \"eval_metric\": eval_metric,\n        \"time_limit\": DEFAULT_TIME_LIMIT,\n\
          \    }\n\n    def retrieve_pipeline_name(name: str) -> str:\n        \"\"\
          \"Strip the last dash-separated segment (run id / suffix) from a pipeline\
          \ name.\"\"\"\n        if not name:\n            return name\n        name\
          \ = name.rstrip(\"-\")\n        if \"-\" not in name:\n            return\
          \ name\n        tokens = name.split(\"-\")\n        return \"-\".join(tokens[:-1])\
          \ if len(tokens) > 1 else tokens[0]\n\n    pipeline_name_trimmed = retrieve_pipeline_name(pipeline_name)\n\
          \n    # Strip label column from sample row \u2014- same for all models\n\
          \    sample_row_formatted = [\n        {col: value for col, value in row.items()\
          \ if col != predictor.label} for row in sample_row_list\n    ]\n\n    problem_type\
          \ = predictor.problem_type\n    match problem_type:\n        case \"regression\"\
          :\n            notebook_file = \"regression_notebook.ipynb\"\n        case\
          \ \"binary\" | \"multiclass\":\n            notebook_file = \"classification_notebook.ipynb\"\
          \n        case _:\n            raise ValueError(f\"Invalid problem type:\
          \ {problem_type}\")\n\n    model_names_full = [m + \"_FULL\" for m in top_models]\n\
          \n    # 2. models refit stage\n\n    # Clone once to PVC (same filesystem\
          \ as predictor_path) to avoid S3 FUSE file-dropping\n    # during shutil.copytree\
          \ inside predictor.clone().\n    work_path = predictor_path.parent / \"\
          refit_work\"\n    predictor_clone = predictor.clone(path=work_path, return_clone=True,\
          \ dirs_exist_ok=True)\n\n    # Refit all top models in a single call:  AutoGluon\
          \ resolves stacking dependencies internally.\n    predictor_clone.refit_full(model=top_models,\
          \ train_data_extra=extra_train_df)\n\n    if problem_type in {\"binary\"\
          , \"multiclass\"}:\n        from autogluon.core.metrics import confusion_matrix\
          \ as ag_confusion_matrix\n\n    def replace_placeholder_in_notebook(notebook,\
          \ replacements):\n        for cell in notebook.get(\"cells\", []):\n   \
          \         if cell.get(\"cell_type\") != \"code\":\n                continue\n\
          \            new_source = []\n            for line in cell.get(\"source\"\
          , []):\n                for placeholder, value in replacements.items():\n\
          \                    line = line.replace(placeholder, value)\n         \
          \       new_source.append(line)\n            cell[\"source\"] = new_source\n\
          \        return notebook\n\n    def _process_model(model_name_full: str)\
          \ -> tuple[str, dict]:\n        \"\"\"Compute metrics and write metric files\
          \ + notebook for one refitted model.\n\n        Safe to run concurrently\
          \ across models: only reads from the shared predictor\n        and test\
          \ data, and writes to isolated per-model directories under\n        models_artifact.path.\
          \ Does NOT call set_model_best / clone_for_deployment,\n        which mutate\
          \ predictor state and must stay sequential.\n\n        Returns (model_name_full,\
          \ eval_results).\n        \"\"\"\n        output_path = Path(models_artifact.path)\
          \ / model_name_full\n\n        predictions = predictor_clone.predict(test_data_df,\
          \ model=model_name_full)\n        eval_results = predictor_clone.evaluate_predictions(\n\
          \            y_true=test_data_df[predictor.label],\n            y_pred=predictions,\n\
          \        )\n        feature_importance = predictor_clone.feature_importance(\n\
          \            test_data_df, model=model_name_full, subsample_size=2000\n\
          \        )\n\n        # Filter NaN/Inf which break Protobuf Struct serialization\n\
          \        eval_results = {\n            k: float(v) if hasattr(v, \"item\"\
          ) else v\n            for k, v in eval_results.items()\n            if not\
          \ (isinstance(v, float) and (math.isnan(v) or math.isinf(v)))\n        }\n\
          \n        (output_path / \"metrics\").mkdir(parents=True, exist_ok=True)\n\
          \        with (output_path / \"metrics\" / \"metrics.json\").open(\"w\"\
          ) as f:\n            json.dump(eval_results, f)\n        with (output_path\
          \ / \"metrics\" / \"feature_importance.json\").open(\"w\") as f:\n     \
          \       json.dump(feature_importance.to_dict(), f)\n\n        if problem_type\
          \ in {\"binary\", \"multiclass\"}:\n            confusion_matrix_res = ag_confusion_matrix(\n\
          \                solution=test_data_df[predictor.label],\n             \
          \   prediction=predictions,\n                output_format=\"pandas_dataframe\"\
          ,\n            )\n            with (output_path / \"metrics\" / \"confusion_matrix.json\"\
          ).open(\"w\") as f:\n                json.dump(confusion_matrix_res.to_dict(),\
          \ f)\n\n        with (Path(notebooks.path) / notebook_file).open(\"r\",\
          \ encoding=\"utf-8\") as f:\n            notebook = json.load(f)\n     \
          \   replacements = {\n            \"<REPLACE_RUN_ID>\": run_id,\n      \
          \      \"<REPLACE_PIPELINE_NAME>\": pipeline_name_trimmed,\n           \
          \ \"<REPLACE_MODEL_NAME>\": model_name_full,\n            \"<REPLACE_SAMPLE_ROW>\"\
          : str(sample_row_formatted),\n        }\n        notebook = replace_placeholder_in_notebook(notebook,\
          \ replacements)\n        notebook_path = output_path / \"notebooks\"\n \
          \       notebook_path.mkdir(parents=True, exist_ok=True)\n        with (notebook_path\
          \ / \"automl_predictor_notebook.ipynb\").open(\"w\", encoding=\"utf-8\"\
          ) as f:\n            json.dump(notebook, f)\n\n        return model_name_full,\
          \ eval_results\n\n    # Phase A: metrics + notebooks \u2014 all models run\
          \ concurrently.\n    with ThreadPoolExecutor(max_workers=len(model_names_full))\
          \ as executor:\n        futures = [executor.submit(_process_model, name)\
          \ for name in model_names_full]\n        eval_results_by_model = dict(f.result()\
          \ for f in futures)\n\n    # Phase B: clone for deployment \u2014 sequential\
          \ because set_model_best mutates predictor state.\n    for model_name_full\
          \ in model_names_full:\n        output_path = Path(models_artifact.path)\
          \ / model_name_full\n        predictor_clone.set_model_best(model=model_name_full,\
          \ save_trainer=True)\n        predictor_clone.clone_for_deployment(path=output_path\
          \ / \"predictor\", dirs_exist_ok=True)\n\n    shutil.rmtree(work_path, ignore_errors=True)\n\
          \n    # Build ordered models_metadata (preserves top-N ranking order).\n\
          \    models_metadata = []\n    for model_name_full in model_names_full:\n\
          \        eval_results = eval_results_by_model[model_name_full]\n       \
          \ model_metadata = {\n            \"name\": model_name_full,\n         \
          \   \"location\": {\n                \"model_directory\": model_name_full,\n\
          \                \"predictor\": str(Path(model_name_full) / \"predictor\"\
          ),\n                \"notebook\": str(Path(model_name_full) / \"notebooks\"\
          \ / \"automl_predictor_notebook.ipynb\"),\n            },\n            \"\
          metrics\": {\n                \"test_data\": eval_results,\n           \
          \ },\n        }\n        models_metadata.append(model_metadata)\n      \
          \  with (Path(models_artifact.path) / model_name_full / \"model.json\").open(\"\
          w\", encoding=\"utf-8\") as f:\n            json.dump(model_metadata, f,\
          \ indent=2)\n\n    # Serialize as a JSON string and parse back in downstream\
          \ components.\n    models_artifact.metadata[\"model_names\"] = json.dumps(model_names_full)\n\
          \    models_artifact.metadata[\"context\"] = {\n        \"data_config\"\
          : {\n            \"sampling_config\": sampling_config,\n            \"split_config\"\
          : split_config,\n        },\n        \"task_type\": problem_type,\n    \
          \    \"label_column\": predictor.label,\n        \"model_config\": model_config,\n\
          \        \"models\": models_metadata,\n    }\n\n    return NamedTuple(\"\
          outputs\", eval_metric=str)(eval_metric=str(predictor.eval_metric))\n\n"
        image: quay.io/rhoai/odh-automl-rhel9:rhoai-3.4
        resources:
          cpuRequest: 4.0
          memoryRequest: 17.179869184
          resourceCpuRequest: '4'
          resourceMemoryRequest: 16Gi
    exec-automl-data-loader:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - automl_data_loader
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef automl_data_loader(  # noqa: D417\n    file_key: str,\n    bucket_name:\
          \ str,\n    workspace_path: str,\n    label_column: str,\n    sampled_test_dataset:\
          \ dsl.Output[dsl.Dataset],\n    sampling_method: Optional[str] = None,\n\
          \    task_type: str = \"regression\",\n    split_config: Optional[dict]\
          \ = None,\n    selection_train_size: float = 0.3,\n) -> NamedTuple(\n  \
          \  \"outputs\",\n    sample_config=dict,\n    split_config=dict,\n    sample_row=str,\n\
          \    models_selection_train_data_path=str,\n    extra_train_data_path=str,\n\
          ):\n    \"\"\"Automl Data Loader component.\n\n    Loads tabular (CSV) data\
          \ from S3 in batches, sampling up to 100 MB of data,\n    then splits the\
          \ sampled data into test, selection-train, and extra-train sets.\n\n   \
          \ The component reads data in chunks to efficiently handle large files without\n\
          \    loading the entire dataset into memory at once. After sampling, it\
          \ performs\n    a two-stage split:\n\n    1. **Primary split** (default\
          \ 80/20): separates a *test set* (20%, written to\n       the ``sampled_test_dataset``\
          \ S3 artifact) from the *train portion* (80%).\n\n    2. **Secondary split**\
          \ (default 30/70 of the train portion): produces\n       ``models_selection_train_dataset.csv``\
          \ (30%, used for model selection) and\n       ``extra_train_dataset.csv``\
          \ (70%, passed to ``refit_full`` as extra data).\n       Both are written\
          \ to the PVC workspace under ``{workspace_path}/datasets/``.\n\n    For\
          \ **regression** tasks the split is random; for **binary** and **multiclass**\n\
          \    tasks the split is **stratified** by the label column by default.\n\
          \n    Authentication uses AWS-style credentials provided via environment\
          \ variables\n    (e.g. from a Kubernetes secret).\n\n    Args:\n       \
          \ file_key: S3 object key of the CSV file.\n        bucket_name: S3 bucket\
