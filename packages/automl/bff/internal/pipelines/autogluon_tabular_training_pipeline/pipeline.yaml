        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef publish_component_stage_map(\n    pipeline_id: str,\n    run_id:\
          \ str,\n    component_stage_map: dsl.Output[dsl.Artifact],\n) -> None:\n\
          \    \"\"\"Publish the component-to-stage-to-step map for dashboard consumption.\n\
          \n    Reads the static JSON template from the package (``run_status_templates/pipelines/``)\n\
          \    and publishes it as a KFP artifact. Dashboards use this map to show\
          \ expected\n    components, stages, and steps before pipeline execution\
          \ begins.\n\n    Args:\n        pipeline_id: Pipeline identifier matching\
          \ the template filename\n            (e.g. ``autogluon-tabular-training-pipeline``).\n\
          \        run_id: KFP run ID for tracking (from ``dsl.PIPELINE_JOB_ID_PLACEHOLDER``).\n\
          \        component_stage_map: Output artifact containing the component-to-stage-to-step\
          \ map.\n\n    Raises:\n        FileNotFoundError: If the template for ``pipeline_id``\
          \ is missing or empty.\n        ValueError: If ``pipeline_id`` or ``run_id``\
          \ is empty.\n\n    Example:\n        map_task = publish_component_stage_map(\n\
          \            pipeline_id=\"autogluon-tabular-training-pipeline\",\n    \
          \        run_id=dsl.PIPELINE_JOB_ID_PLACEHOLDER,\n        )\n    \"\"\"\n\
          \    import json\n    from datetime import UTC, datetime\n    from pathlib\
          \ import Path\n\n    from kfp_components.components.training.automl.shared.run_status\
          \ import (\n        load_pipeline_run_status_manifest,\n    )\n\n    if\
          \ not isinstance(pipeline_id, str) or not pipeline_id.strip():\n       \
          \ raise ValueError(\"pipeline_id must be a non-empty string\")\n    if not\
          \ isinstance(run_id, str) or not run_id.strip():\n        raise ValueError(\"\
          run_id must be a non-empty string\")\n\n    stage_map = load_pipeline_run_status_manifest(pipeline_id)\n\
          \    # Legacy templates may include an empty initial_document shell; not\
          \ part of the stage map.\n    stage_map.pop(\"initial_document\", None)\n\
          \    if not stage_map.get(\"components\"):\n        raise FileNotFoundError(\n\
          \            f\"Component stage map not found or empty for pipeline_id='{pipeline_id}'.\
          \ \"\n            \"Ensure run_status_templates/pipelines/<pipeline_id>.json\
          \ is packaged in the AutoML image.\"\n        )\n\n    stage_map[\"kfp_run_id\"\
          ] = run_id\n    stage_map[\"published_at\"] = datetime.now(UTC).isoformat().replace(\"\
          +00:00\", \"Z\")\n\n    output_path = Path(component_stage_map.path)\n \
          \   output_path.mkdir(parents=True, exist_ok=True)\n\n    output_file =\
          \ output_path / \"component_stage_map.json\"\n    with output_file.open(\"\
          w\", encoding=\"utf-8\") as f:\n        json.dump(stage_map, f, indent=2)\n\
          \n    component_stage_map.metadata[\"display_name\"] = \"Component Stage\
          \ Map\"\n    component_stage_map.metadata[\"pipeline_id\"] = pipeline_id\n\
          \    component_stage_map.metadata[\"component_count\"] = len(stage_map.get(\"\
          components\", []))\n\n    component_count = len(stage_map.get(\"components\"\
          , []))\n    stage_count = sum(len(c.get(\"stages\", [])) for c in stage_map.get(\"\
          components\", []))\n    print(f\"Published component stage map for pipeline_id='{pipeline_id}':\"\
          )\n    print(f\"  - Components: {component_count}\")\n    print(f\"  - Total\
          \ stages: {stage_count}\")\n    print(f\"  - Published to: {output_file}\"\
          )\n\n"
        image: quay.io/opendatahub/odh-automl:odh-stable
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.5
          memoryLimit: 1.073741824
          memoryRequest: 0.536870912
          resourceCpuLimit: '1'
          resourceCpuRequest: '0.5'
          resourceMemoryLimit: 1Gi
          resourceMemoryRequest: 512Mi
pipelineInfo:
  description: AutoML tabular training pipeline for building high-quality models on
    structured data with minimal effort. Powered by AutoGluon, it automates discovery,
    ensembling, and selection, then refits top candidates for maximum accuracy. Delivers
    production-ready predictors, clear metrics, and a ranked leaderboard to choose
    the best deployment option.
  name: autogluon-tabular-training-pipeline
root:
  dag:
    tasks:
      autogluon-models-training:
        cachingOptions: {}
        componentRef:
          name: comp-autogluon-models-training
        dependentTasks:
        - automl-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: automl-data-loader
          parameters:
            eval_metric:
              componentInputParameter: eval_metric
            extra_train_data_path:
              taskOutputParameter:
                outputParameterKey: extra_train_data_path
                producerTask: automl-data-loader
            label_column:
              componentInputParameter: label_column
            pipeline_name:
              runtimeValue:
                constant: '{{$.pipeline_job_resource_name}}'
            positive_class:
              componentInputParameter: positive_class
            run_id:
              runtimeValue:
                constant: '{{$.pipeline_job_uuid}}'
            sample_row:
              taskOutputParameter:
                outputParameterKey: sample_row
                producerTask: automl-data-loader
            sampling_config:
              taskOutputParameter:
                outputParameterKey: sample_config
                producerTask: automl-data-loader
            split_config:
              taskOutputParameter:
                outputParameterKey: split_config
                producerTask: automl-data-loader
            task_type:
              componentInputParameter: task_type
            top_n:
              componentInputParameter: top_n
            train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: automl-data-loader
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: autogluon-models-training
      automl-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-automl-data-loader
        dependentTasks:
        - publish-component-stage-map
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: train_data_bucket_name
            file_key:
              componentInputParameter: train_data_file_key
            label_column:
              componentInputParameter: label_column
            task_type:
              componentInputParameter: task_type
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: automl-data-loader
      leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - autogluon-models-training
        inputs:
          artifacts:
            models_artifact:
              taskOutputArtifact:
                outputArtifactKey: models_artifact
                producerTask: autogluon-models-training
          parameters:
            eval_metric:
              taskOutputParameter:
                outputParameterKey: eval_metric
                producerTask: autogluon-models-training
        taskInfo:
          name: leaderboard-evaluation
      publish-component-stage-map:
        cachingOptions: {}
        componentRef:
          name: comp-publish-component-stage-map
        inputs:
          parameters:
            pipeline_id:
              runtimeValue:
                constant: autogluon-tabular-training-pipeline
            run_id:
              runtimeValue:
                constant: '{{$.pipeline_job_uuid}}'
        taskInfo:
          name: publish-component-stage-map
  inputDefinitions:
    parameters:
      eval_metric:
        defaultValue: ''
        description: Metric used for model ranking. Empty string (default) is resolved
          by the component to "r2" for regression and "accuracy" for binary and multiclass
          classification.
        isOptional: true
        parameterType: STRING
      label_column:
        description: Name of the target/label column in the dataset.
        parameterType: STRING
      positive_class:
        description: Optional label value for the positive class in binary classification.
          Defaults to the second unique class after sorting label values.
        isOptional: true
        parameterType: STRING
      task_type:
        description: '"binary", "multiclass", or "regression"; drives metrics and
          model types.'
        parameterType: STRING
      top_n:
        defaultValue: 3.0
        description: 'Number of top models to select and refit (default: 3); positive
          integer from range [1, 10].'
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_data_bucket_name:
        description: S3-compatible bucket name containing the tabular data file.
        parameterType: STRING
      train_data_file_key:
        description: S3 object key of the CSV file (features and target column).
        parameterType: STRING
      train_data_secret_name:
        description: Kubernetes secret name with S3 credentials (AWS_ACCESS_KEY_ID,
          AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION).
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-automl-data-loader:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: train_data_secret_name
    pipelineConfig:
      workspace:
        kubernetes:
          pvcSpecPatch:
            accessModes:
            - ReadWriteOnce
        size: 12Gi
