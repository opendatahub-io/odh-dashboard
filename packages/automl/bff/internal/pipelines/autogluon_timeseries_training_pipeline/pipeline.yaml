pipelineInfo:
  description: End-to-end AutoGluon time series forecasting pipeline. Loads time series
    data from S3 in TimeSeriesDataFrame format (item_id, timestamp, target), trains
    multiple AutoGluon TimeSeries models (local statistical and global deep learning),
    ranks them by the chosen eval metric, and produces a leaderboard and the top N
    trained predictors for deployment. Supports optional known covariates and configurable
    prediction_length.
  name: autogluon-timeseries-training-pipeline
root:
  dag:
    tasks:
      autogluon-timeseries-models-selection:
        cachingOptions: {}
        componentRef:
          name: comp-autogluon-timeseries-models-selection
        dependentTasks:
        - timeseries-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: timeseries-data-loader
          parameters:
            id_column:
              componentInputParameter: id_column
            known_covariates_names:
              componentInputParameter: known_covariates_names
            prediction_length:
              componentInputParameter: prediction_length
            target:
              componentInputParameter: target
            timestamp_column:
              componentInputParameter: timestamp_column
            top_n:
              componentInputParameter: top_n
            train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: timeseries-data-loader
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: autogluon-timeseries-models-selection
      for-loop-1:
        componentRef:
          name: comp-for-loop-1
        dependentTasks:
        - autogluon-timeseries-models-selection
        - timeseries-data-loader
        inputs:
          artifacts:
            pipelinechannel--timeseries-data-loader-sampled_test_dataset:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: timeseries-data-loader
          parameters:
            pipelinechannel--autogluon-timeseries-models-selection-model_config:
              taskOutputParameter:
                outputParameterKey: model_config
                producerTask: autogluon-timeseries-models-selection
            pipelinechannel--autogluon-timeseries-models-selection-predictor_path:
              taskOutputParameter:
                outputParameterKey: predictor_path
                producerTask: autogluon-timeseries-models-selection
            pipelinechannel--autogluon-timeseries-models-selection-top_models:
              taskOutputParameter:
                outputParameterKey: top_models
                producerTask: autogluon-timeseries-models-selection
            pipelinechannel--timeseries-data-loader-extra_train_data_path:
              taskOutputParameter:
                outputParameterKey: extra_train_data_path
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-data-loader-models_selection_train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-data-loader-sample_config:
              taskOutputParameter:
                outputParameterKey: sample_config
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-data-loader-sample_rows:
              taskOutputParameter:
                outputParameterKey: sample_rows
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-data-loader-split_config:
              taskOutputParameter:
                outputParameterKey: split_config
                producerTask: timeseries-data-loader
        iteratorPolicy:
          parallelismLimit: 2
        parameterIterator:
          itemInput: pipelinechannel--autogluon-timeseries-models-selection-top_models-loop-item
          items:
            inputParameter: pipelinechannel--autogluon-timeseries-models-selection-top_models
        taskInfo:
          name: for-loop-1
      timeseries-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-timeseries-data-loader
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: train_data_bucket_name
            file_key:
              componentInputParameter: train_data_file_key
            id_column:
              componentInputParameter: id_column
            target:
              componentInputParameter: target
            timestamp_column:
              componentInputParameter: timestamp_column
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: timeseries-data-loader
      timeseries-leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-timeseries-leaderboard-evaluation
        dependentTasks:
        - autogluon-timeseries-models-selection
        - for-loop-1
        inputs:
          artifacts:
            models:
              taskOutputArtifact:
                outputArtifactKey: pipelinechannel--autogluon-timeseries-models-full-refit-model_artifact
                producerTask: for-loop-1
          parameters:
            eval_metric:
              taskOutputParameter:
                outputParameterKey: eval_metric_name
                producerTask: autogluon-timeseries-models-selection
        taskInfo:
          name: timeseries-leaderboard-evaluation
  inputDefinitions:
    parameters:
      id_column:
        parameterType: STRING
      known_covariates_names:
        isOptional: true
        parameterType: LIST
      prediction_length:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      target:
        parameterType: STRING
      timestamp_column:
        parameterType: STRING
      top_n:
        defaultValue: 3.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_data_bucket_name:
        parameterType: STRING
      train_data_file_key:
        parameterType: STRING
      train_data_secret_name:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-timeseries-data-loader:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: train_data_secret_name
    pipelineConfig:
      workspace:
        kubernetes:
          pvcSpecPatch:
            accessModes:
            - ReadWriteOnce
        size: 12Gi
