# PIPELINE DEFINITION
# Name: autogluon-timeseries-training-pipeline
# Description: End-to-end AutoGluon time series forecasting pipeline. Loads time series data from S3 in TimeSeriesDataFrame format (item_id, timestamp, target), trains multiple AutoGluon TimeSeries models (local statistical and global deep learning), ranks them by the chosen eval metric, and produces a leaderboard and the top N trained predictors for deployment. Supports optional known covariates and configurable prediction_length.
# Inputs:
#    id_column: str
#    known_covariates_names: list
#    prediction_length: int [Default: 1.0]
#    target: str
#    timestamp_column: str
#    top_n: int [Default: 3.0]
#    train_data_bucket_name: str
#    train_data_file_key: str
#    train_data_secret_name: str
components:
  comp-autogluon-timeseries-models-full-refit:
    executorLabel: exec-autogluon-timeseries-models-full-refit
    inputDefinitions:
      artifacts:
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Test dataset artifact for evaluation.
      parameters:
        extra_train_data_path:
          description: Path to the extra train split CSV (later segment of the train
            portion).
          parameterType: STRING
        model_config:
          description: Model configuration from selection phase.
          parameterType: STRUCT
        model_name:
          description: Name of the model to refit.
          parameterType: STRING
        models_selection_train_data_path:
          description: 'Path to the model-selection train split CSV

            (earlier segment of the train portion).'
          parameterType: STRING
        pipeline_name:
          description: Pipeline name for metadata.
          parameterType: STRING
        predictor_path:
          description: Path to the predictor from selection phase.
          parameterType: STRING
        run_id:
          description: Pipeline run ID for metadata.
          parameterType: STRING
        sample_rows:
          description: Sample rows from test dataset as JSON string.
          parameterType: STRING
        sampling_config:
          description: Configuration used for data sampling.
          parameterType: STRUCT
        split_config:
          description: Configuration used for data splitting.
          parameterType: STRUCT
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-autogluon-timeseries-models-selection:
    executorLabel: exec-autogluon-timeseries-models-selection
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Test dataset artifact for evaluation.
      parameters:
        id_column:
          description: Name of the column identifying each time series (item_id).
          parameterType: STRING
        known_covariates_names:
          description: Optional list of known covariate column names.
          isOptional: true
          parameterType: LIST
        prediction_length:
          defaultValue: 1.0
          description: Forecast horizon (number of timesteps).
          isOptional: true
          parameterType: NUMBER_INTEGER
        target:
          description: Name of the target column to forecast.
          parameterType: STRING
        timestamp_column:
          description: Name of the timestamp/datetime column.
          parameterType: STRING
        top_n:
          description: Number of top models to select for refitting.
          parameterType: NUMBER_INTEGER
        train_data_path:
          description: Path to the selection training CSV file.
          parameterType: STRING
        workspace_path:
          description: Workspace directory where predictor will be saved.
          parameterType: STRING
    outputDefinitions:
      parameters:
        eval_metric_name:
          parameterType: STRING
        model_config:
          parameterType: STRUCT
        predictor_path:
          parameterType: STRING
        top_models:
          parameterType: LIST
  comp-for-loop-1:
    dag:
      outputs:
        artifacts:
          pipelinechannel--autogluon-timeseries-models-full-refit-model_artifact:
            artifactSelectors:
            - outputArtifactKey: model_artifact
              producerSubtask: autogluon-timeseries-models-full-refit
      tasks:
        autogluon-timeseries-models-full-refit:
          cachingOptions: {}
          componentRef:
            name: comp-autogluon-timeseries-models-full-refit
          inputs:
            artifacts:
              test_dataset:
                componentInputArtifact: pipelinechannel--timeseries-data-loader-sampled_test_dataset
            parameters:
              extra_train_data_path:
                componentInputParameter: pipelinechannel--timeseries-data-loader-extra_train_data_path
              model_config:
                componentInputParameter: pipelinechannel--autogluon-timeseries-models-selection-model_config
              model_name:
                componentInputParameter: pipelinechannel--autogluon-timeseries-models-selection-top_models-loop-item
              models_selection_train_data_path:
                componentInputParameter: pipelinechannel--timeseries-data-loader-models_selection_train_data_path
              pipeline_name:
                runtimeValue:
                  constant: '{{$.pipeline_job_resource_name}}'
              predictor_path:
                componentInputParameter: pipelinechannel--autogluon-timeseries-models-selection-predictor_path
              run_id:
                runtimeValue:
                  constant: '{{$.pipeline_job_uuid}}'
              sample_rows:
                componentInputParameter: pipelinechannel--timeseries-data-loader-sample_rows
              sampling_config:
                componentInputParameter: pipelinechannel--timeseries-data-loader-sample_config
              split_config:
                componentInputParameter: pipelinechannel--timeseries-data-loader-split_config
          taskInfo:
            name: autogluon-timeseries-models-full-refit
    inputDefinitions:
      artifacts:
        pipelinechannel--timeseries-data-loader-sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--autogluon-timeseries-models-selection-model_config:
          parameterType: STRUCT
        pipelinechannel--autogluon-timeseries-models-selection-predictor_path:
          parameterType: STRING
        pipelinechannel--autogluon-timeseries-models-selection-top_models:
          parameterType: LIST
        pipelinechannel--autogluon-timeseries-models-selection-top_models-loop-item:
          parameterType: STRING
        pipelinechannel--timeseries-data-loader-extra_train_data_path:
          parameterType: STRING
        pipelinechannel--timeseries-data-loader-models_selection_train_data_path:
          parameterType: STRING
        pipelinechannel--timeseries-data-loader-sample_config:
          parameterType: STRUCT
        pipelinechannel--timeseries-data-loader-sample_rows:
          parameterType: STRING
        pipelinechannel--timeseries-data-loader-split_config:
          parameterType: STRUCT
    outputDefinitions:
      artifacts:
        pipelinechannel--autogluon-timeseries-models-full-refit-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          isArtifactList: true
  comp-timeseries-data-loader:
    executorLabel: exec-timeseries-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: S3 bucket name containing the file.
          parameterType: STRING
        file_key:
          description: S3 object key of the CSV file containing time series data.
          parameterType: STRING
        id_column:
          description: Name of the column identifying each time series (item_id).
          parameterType: STRING
        selection_train_size:
          defaultValue: 0.3
          description: 'Fraction of train portion for model selection (default: 0.3).'
          isOptional: true
          parameterType: NUMBER_DOUBLE
        target:
          description: Name of the target column to forecast.
          parameterType: STRING
        timestamp_column:
          description: Name of the timestamp/datetime column.
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory where train CSVs will be written.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        extra_train_data_path:
          parameterType: STRING
        models_selection_train_data_path:
          parameterType: STRING
        sample_config:
          parameterType: STRUCT
        sample_rows:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
  comp-timeseries-leaderboard-evaluation:
    executorLabel: exec-timeseries-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: 'List of model artifacts from ``autogluon_timeseries_models_full_refit``

            collected via ``dsl.Collected``. Each artifact provides metrics and location

            metadata for one refitted model.'
          isArtifactList: true
      parameters:
        eval_metric:
          description: 'Metric name for ranking (e.g. ``"MASE"``, ``"WAPE"``);

            leaderboard is sorted descending (AutoGluon uses higher-is-better convention

            so metrics like MASE are negated - higher value means better model).'
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-autogluon-timeseries-models-full-refit:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - autogluon_timeseries_models_full_refit
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\n__KFP_EMBEDDED_ARCHIVE_B64 = ''\n\
          \nimport base64 as __kfp_b64\nimport io as __kfp_io\nimport os as __kfp_os\n\
          import sys as __kfp_sys\nimport tarfile as __kfp_tarfile\nimport tempfile\
          \ as __kfp_tempfile\n\n# Extract embedded archive at import time to ensure\
          \ sys.path and globals are set\n__kfp_tmpdir = __kfp_tempfile.TemporaryDirectory()\n\
          __KFP_EMBEDDED_ASSET_DIR = __kfp_tmpdir.name\ntry:\n    __kfp_bytes = __kfp_b64.b64decode(__KFP_EMBEDDED_ARCHIVE_B64.encode('ascii'))\n\
          \    with __kfp_tarfile.open(fileobj=__kfp_io.BytesIO(__kfp_bytes), mode='r:gz')\
          \ as __kfp_tar:\n        __kfp_tar.extractall(path=__KFP_EMBEDDED_ASSET_DIR)\n\
          except Exception as __kfp_e:\n    raise RuntimeError(f'Failed to extract\
          \ embedded archive: {__kfp_e}')\n\n# Always prepend the extracted directory\
          \ to sys.path for import resolution\nif __KFP_EMBEDDED_ASSET_DIR not in\
          \ __kfp_sys.path:\n    __kfp_sys.path.insert(0, __KFP_EMBEDDED_ASSET_DIR)\n\
          \n\n\n\ndef autogluon_timeseries_models_full_refit(\n    model_name: str,\n\
          \    test_dataset: dsl.Input[dsl.Dataset],\n    predictor_path: str,\n \
          \   sampling_config: dict,\n    split_config: dict,\n    model_config: dict,\n\
          \    pipeline_name: str,\n    run_id: str,\n    models_selection_train_data_path:\
          \ str,\n    extra_train_data_path: str,\n    sample_rows: str,\n    notebooks:\
          \ dsl.EmbeddedInput[dsl.Dataset],\n    model_artifact: dsl.Output[dsl.Model],\n\
          ):\n    \"\"\"Refit a single AutoGluon timeseries model on full training\
          \ data.\n\n    This component takes a model selected during the selection\
          \ phase and\n    refits it on the full training dataset (selection + extra\
          \ train data)\n    for improved performance. The refitted model is optimized\
          \ and saved\n    for deployment. Each model directory contains a ``model.json``\
          \ file\n    with model metadata (name, base model, location, metrics).\n\
          \n    Args:\n        model_name: Name of the model to refit.\n        test_dataset:\
          \ Test dataset artifact for evaluation.\n        predictor_path: Path to\
          \ the predictor from selection phase.\n        sampling_config: Configuration\
          \ used for data sampling.\n        split_config: Configuration used for\
          \ data splitting.\n        model_config: Model configuration from selection\
          \ phase.\n        pipeline_name: Pipeline name for metadata.\n        run_id:\
          \ Pipeline run ID for metadata.\n        models_selection_train_data_path:\
          \ Path to the model-selection train split CSV\n            (earlier segment\
          \ of the train portion).\n        extra_train_data_path: Path to the extra\
          \ train split CSV (later segment of the train portion).\n        sample_rows:\
          \ Sample rows from test dataset as JSON string.\n        model_artifact:\
          \ Output artifact for the refitted model.\n        notebooks: Embedded notebook\
          \ templates (injected by the runtime from the component's embedded_artifact_path).\n\
          \    \"\"\"\n    import json\n    import logging\n    import math\n    import\
          \ os\n    from pathlib import Path\n\n    import pandas as pd\n    from\
          \ autogluon.timeseries import TimeSeriesDataFrame, TimeSeriesPredictor\n\
          \    from autogluon.timeseries.metrics import AVAILABLE_METRICS\n    from\
          \ autogluon.timeseries.models.ensemble import AbstractTimeSeriesEnsembleModel\n\
          \n    logger = logging.getLogger(__name__)\n\n    logger.info(\"Timeseries\
          \ refit: model=%s\", model_name)\n\n    # Load the predictor from selection\
          \ phase\n    try:\n        predictor = TimeSeriesPredictor.load(predictor_path)\n\
          \    except Exception as e:\n        logger.error(\"Failed to load predictor:\
          \ %s\", e)\n        raise ValueError(f\"Could not load predictor from {predictor_path}:\
          \ {e}\") from e\n    logger.debug(\n        \"Loaded selection predictor\
          \ from %s; selection_train=%s extra_train=%s\",\n        predictor_path,\n\
          \        models_selection_train_data_path,\n        extra_train_data_path,\n\
          \    )\n\n    id_column = model_config.get(\"id_column\")\n    timestamp_column\
          \ = model_config.get(\"timestamp_column\")\n\n    selection_ts_df = TimeSeriesDataFrame.from_path(\n\
          \        path=models_selection_train_data_path,\n        id_column=id_column,\n\
          \        timestamp_column=timestamp_column,\n    )\n    extra_train_ts_df\
          \ = TimeSeriesDataFrame.from_path(\n        path=extra_train_data_path,\n\
          \        id_column=id_column,\n        timestamp_column=timestamp_column,\n\
          \    )\n    # Full train portion (excluding held-out test) = selection split\
          \ then extra split, in time order.\n    full_train_ts_df = TimeSeriesDataFrame(\n\
          \        pd.concat([selection_ts_df, extra_train_ts_df], axis=0),\n    )\n\
          \    test_ts_df = TimeSeriesDataFrame.from_path(\n        path=test_dataset.path,\n\
          \        id_column=id_column,\n        timestamp_column=timestamp_column,\n\
          \    )\n    logger.debug(\n        \"Train rows=%s (selection=%s extra=%s)\
          \ test rows=%s (id=%s ts=%s)\",\n        len(full_train_ts_df),\n      \
          \  len(selection_ts_df),\n        len(extra_train_ts_df),\n        len(test_ts_df),\n\
          \        id_column,\n        timestamp_column,\n    )\n\n    # Create model\
          \ output directory\n    model_name_full = f\"{model_name}_FULL\"\n    output_path\
          \ = Path(model_artifact.path) / model_name_full\n    output_path.mkdir(parents=True,\
          \ exist_ok=True)\n\n    # Save the predictor with the selected model\n \
          \   predictor_output = output_path / \"predictor\"\n\n    def is_ensemble_model(predictor,\
          \ model_name: str) -> bool:\n        \"\"\"Return True if the named model\
          \ is an ensemble.\"\"\"\n        model_type = predictor._trainer.get_model_attribute(model_name,\
          \ \"type\")\n        return issubclass(model_type, AbstractTimeSeriesEnsembleModel)\n\
          \n    is_ensemble = is_ensemble_model(predictor, model_name)\n\n    predictor_refit\
          \ = TimeSeriesPredictor(\n        prediction_length=model_config.get(\"\
          prediction_length\"),  # 7 days\n        path=predictor_output,\n      \
          \  target=model_config.get(\"target\"),\n        eval_metric=model_config.get(\"\
          eval_metric\", \"MASE\"),\n    )\n\n    hyperparams_option = \"ensemble_hyperparameters\"\
          \ if is_ensemble else \"hyperparameters\"\n    # TODO: Save model_hyperparams\
          \ in the output of the previous step & remove the predictor usage here\n\
          \    additional_fit_params = {hyperparams_option: {model_name: predictor.fit_summary()[\"\
          model_hyperparams\"][model_name]}}\n    logger.debug(\"Refit hyperparameters:\
          \ %s\", additional_fit_params)\n\n    predictor_refit.fit(\n        train_data=full_train_ts_df,\n\
          \        **additional_fit_params,\n        # exclude deep learning models\
          \ pretrained on large time series datasets\n        excluded_model_types=[\n\
          \            \"Chronos\",\n            \"Chronos2\",\n            \"Toto\"\
          ,\n        ],\n    )\n\n    try:\n        predictor_refit.save()\n    except\
          \ Exception as e:\n        logger.error(\"Failed to save predictor: %s\"\
          , e)\n        raise ValueError(f\"Could not save predictor to {predictor_output}:\
          \ {e}\") from e\n\n    try:\n        metrics = predictor_refit.evaluate(test_ts_df,\
          \ metrics=list(AVAILABLE_METRICS.keys()))\n    except Exception as e:\n\
          \        logger.error(\"Evaluation failed: %s\", e)\n        raise ValueError(f\"\
          Failed to evaluate model: {e}\") from e\n    logger.debug(\"Evaluation metrics:\
          \ %s\", metrics)\n\n    # Save additional metadata about the selected model\n\
          \    predictor_metadata = {\n        \"model_name\": model_name_full,\n\
          \        \"base_model\": model_name,\n        \"selected_model\": model_name,\n\
          \        \"prediction_length\": model_config.get(\"prediction_length\",\
          \ 1),\n        \"eval_metric\": model_config.get(\"eval_metric\", \"MASE\"\
          ),\n        \"target\": model_config.get(\"target\"),\n        \"id_column\"\
          : model_config.get(\"id_column\"),\n        \"timestamp_column\": model_config.get(\"\
          timestamp_column\"),\n    }\n\n    with open(predictor_output / \"predictor_metadata.json\"\
          , \"w\") as f:\n        json.dump(predictor_metadata, f, indent=2)\n\n \
          \   metrics_path = output_path / \"metrics\"\n    metrics_path.mkdir(parents=True,\
          \ exist_ok=True)\n\n    # Convert metrics to JSON-serializable format; drop\
          \ NaN/Inf which break Protobuf Struct serialization\n    metrics_dict =\
          \ {\n        k: float(v) if hasattr(v, \"item\") else v\n        for k,\
          \ v in metrics.items()\n        if not (isinstance(v, float) and (math.isnan(v)\
          \ or math.isinf(v)))\n    }\n\n    with open(metrics_path / \"metrics.json\"\
          , \"w\") as f:\n        json.dump(metrics_dict, f, indent=2)\n\n    # Notebook\
          \ generation\n\n    notebook_file = \"timeseries_notebook.ipynb\"\n\n  \
          \  with open(os.path.join(notebooks.path, notebook_file), \"r\", encoding=\"\
          utf-8\") as f:\n        notebook = json.load(f)\n\n        # Improved retrieve_pipeline_name:\
          \ trims only the run id or suffix\n        def retrieve_pipeline_name(pipeline_name:\
          \ str) -> str:\n            \"\"\"Attempts to infer the original pipeline\
          \ name from a name that may have a run id or suffix at the end.\n\n    \
          \        Removes only the last dash-separated element (the run id or variant),\n\
          \            handling trailing dashes gracefully to avoid dropping real\
          \ name segments.\n            If only a single element exists, returns as\
          \ is.\n            \"\"\"\n            if not pipeline_name:\n         \
          \       return pipeline_name\n            # Strip trailing dashes for robust\
          \ splitting\n            name = pipeline_name.rstrip(\"-\")\n          \
          \  if \"-\" not in name:\n                return name\n            tokens\
          \ = name.split(\"-\")\n            if len(tokens) <= 1:\n              \
          \  return tokens[0] if tokens else \"\"\n            return \"-\".join(tokens[:-1])\n\
          \n        pipeline_name = retrieve_pipeline_name(pipeline_name)\n\n    \
          \    # Replace <REPLACE_* placeholders (run id, pipeline name, model, sample\
          \ row, extra pip index, \u2026) in code cells. # noqa: E501\n        def\
          \ replace_placeholder_in_notebook(notebook, replacements):\n           \
          \ for cell in notebook.get(\"cells\", []):\n                if cell.get(\"\
          cell_type\") != \"code\":\n                    continue\n              \
          \  # Replace in every string of the source list\n                new_source\
          \ = []\n                for line in cell.get(\"source\", []):\n        \
          \            for placeholder, value in replacements.items():\n         \
          \               line = line.replace(placeholder, value)\n              \
          \      new_source.append(line)\n                cell[\"source\"] = new_source\n\
          \            return notebook\n\n        sample_row_list = json.loads(sample_rows)\n\
          \n        replacements = {\n            \"<REPLACE_RUN_ID>\": run_id,\n\
          \            \"<REPLACE_PIPELINE_NAME>\": pipeline_name,\n            \"\
          <REPLACE_MODEL_NAME>\": model_name_full,\n            \"<REPLACE_SAMPLE_ROW>\"\
          : str(sample_row_list),\n            \"<REPLACE_ID_COLUMN>\": model_config.get(\"\
          id_column\"),\n            \"<REPLACE_TIMESTAMP_COLUMN>\": model_config.get(\"\
          timestamp_column\"),\n            \"<REPLACE_KNOWN_COVARIATES_NAMES>\":\
          \ str(model_config.get(\"known_covariates_names\") or []),\n        }\n\
          \        notebook = replace_placeholder_in_notebook(notebook, replacements)\n\
          \n    notebook_path = output_path / \"notebooks\"\n    notebook_path.mkdir(parents=True,\
          \ exist_ok=True)\n    with (notebook_path / \"automl_predictor_notebook.ipynb\"\
          ).open(\"w\", encoding=\"utf-8\") as f:\n        json.dump(notebook, f)\n\
          \n    # Write model.json alongside predictor/, metrics/, notebooks/\n  \
          \  model_metadata = {\n        \"name\": model_name_full,\n        \"base_model\"\
          : model_name,\n        \"location\": {\n            \"model_directory\"\
          : model_name_full,\n            \"predictor\": f\"{model_name_full}/predictor\"\
          ,\n            \"metrics\": f\"{model_name_full}/metrics\",\n          \
          \  \"notebooks\": f\"{model_name_full}/notebooks\",\n        },\n      \
          \  \"metrics\": {\n            \"test_data\": metrics_dict,\n        },\n\
          \    }\n    with (output_path / \"model.json\").open(\"w\", encoding=\"\
          utf-8\") as f:\n        json.dump(model_metadata, f, indent=2)\n\n    #\
          \ Set artifact metadata\n    model_artifact.metadata[\"display_name\"] =\
          \ model_name_full\n    model_artifact.metadata[\"context\"] = {\n      \
          \  \"model_config\": model_config,\n        \"sampling_config\": sampling_config,\n\
          \        \"split_config\": split_config,\n        \"metrics\": {\"test_data\"\
          : metrics_dict},\n        \"location\": {\n            \"model_directory\"\
          : model_name_full,\n            \"predictor\": f\"{model_name_full}/predictor\"\
          ,\n            \"metrics\": f\"{model_name_full}/metrics\",\n          \
          \  \"notebooks\": f\"{model_name_full}/notebooks\",\n        },\n      \
          \  \"pipeline_info\": {\n            \"pipeline_name\": pipeline_name,\n\
          \            \"run_id\": run_id,\n        },\n    }\n\n    logger.info(\"\
          Timeseries refit done: %s (artifact under %s)\", model_name_full, output_path)\n\
          \n"
        image: quay.io/rhoai/odh-automl-rhel9:rhoai-3.4@sha256:ee8d0d339fb4e7d8f140fb680c9656ccff013fa5a5840ca8e01fdb9709568e57
        resources:
          cpuRequest: 2.0
          memoryRequest: 8.589934592
          resourceCpuRequest: '2'
          resourceMemoryRequest: 8Gi
    exec-autogluon-timeseries-models-selection:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - autogluon_timeseries_models_selection
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
