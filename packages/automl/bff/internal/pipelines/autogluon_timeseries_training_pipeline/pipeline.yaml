          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef timeseries_data_loader(\n    file_key: str,\n    bucket_name:\
          \ str,\n    workspace_path: str,\n    target: str,\n    id_column: str,\n\
          \    timestamp_column: str,\n    sampled_test_dataset: dsl.Output[dsl.Dataset],\n\
          \    component_status: dsl.Output[dsl.Artifact],\n    selection_train_size:\
          \ float = 0.3,\n) -> NamedTuple(\n    \"outputs\",\n    sample_config=dict,\n\
          \    split_config=dict,\n    sample_rows=str,\n    models_selection_train_data_path=str,\n\
          \    extra_train_data_path=str,\n):\n    \"\"\"Load and split timeseries\
          \ data from S3 for AutoGluon training.\n\n    This component loads time\
          \ series data from S3, samples it (up to 100 MB),\n    applies light **cleansing**\
          \ (replace ``+/-inf`` with NaN so AutoGluon can apply its\n    own missing-value\
          \ logic; require parseable timestamps and non-null ids; drop\n    exact\
          \ duplicate ``(id_column, timestamp_column)`` rows, keep last), then performs\
          \ a two-stage\n    **per-series temporal** split for efficient AutoGluon\
          \ training:\n    1. Primary split (default 80/20): for each distinct ``id_column``\
          \ value, the earliest\n       (1 - test_size) fraction of rows by ``timestamp_column``\
          \ goes to the train portion and\n       the remainder to the test set (so\
          \ every series with at least two rows contributes\n       holdout data;\
          \ single-row series stay in train only).\n    2. Secondary split (default\
          \ 30/70 of each series' train rows): early segment to\n       selection-train,\
          \ later segment to extra-train.\n\n    The test set is written to S3 artifact,\
          \ while train CSVs are written\n    to the PVC workspace for sharing across\
          \ pipeline steps.\n\n    After cleansing, at least **100** valid records\
          \ must remain; otherwise the component\n    fails with a clear error so\
          \ downstream AutoGluon training does not run on datasets too\n    small\
          \ to split reliably.\n\n    Args:\n        file_key: S3 object key of the\
          \ CSV file containing time series data.\n        bucket_name: S3 bucket\
          \ name containing the file.\n        workspace_path: PVC workspace directory\
          \ where train CSVs will be written.\n        target: Name of the target\
          \ column to forecast.\n        id_column: Name of the column identifying\
          \ each time series (item_id).\n        timestamp_column: Name of the timestamp/datetime\
          \ column.\n        sampled_test_dataset: Output dataset artifact for the\
          \ test split.\n        component_status: Output artifact containing stage-level\
          \ progress tracking for this component.\n        selection_train_size: Fraction\
          \ of train portion for model selection (default: 0.3).\n\n    Returns:\n\
          \        NamedTuple: sample_config, split_config, sample_rows, models_selection_train_data_path,\
          \ extra_train_data_path.\n    \"\"\"\n    import io\n    import logging\n\
          \    import os\n    from pathlib import Path\n\n    import boto3\n    import\
          \ pandas as pd\n\n    logger = logging.getLogger(__name__)\n\n    MAX_SIZE_BYTES\
          \ = 100 * 1024 * 1024  # 100 MB limit in bytes\n    MIN_VALID_RECORDS_AFTER_CLEANSING\
          \ = 100\n    PANDAS_CHUNK_SIZE = 10000  # Rows per batch for streaming read\n\
          \    DEFAULT_TEST_SIZE = 0.2\n\n    # Input validation\n    for param, value\
          \ in (\n        (\"bucket_name\", bucket_name),\n        (\"file_key\",\
          \ file_key),\n        (\"workspace_path\", workspace_path),\n        (\"\
          target\", target),\n        (\"id_column\", id_column),\n        (\"timestamp_column\"\
          , timestamp_column),\n    ):\n        if not isinstance(value, str) or not\
          \ value.strip():\n            raise ValueError(f\"{param} must be a non-empty\
          \ string.\")\n    if selection_train_size <= 0 or selection_train_size >=\
          \ 1:\n        raise ValueError(\"selection_train_size must be in a range\
          \ 0 to 1.\")\n\n    if file_key.startswith(\"/\") or file_key.endswith(\"\
          /\") or \"//\" in file_key:\n        raise ValueError(\"file_key must be\
          \ a valid S3 object key and must not start/end with '/' or contain '//'.\"\
          )\n\n    from kfp_components.components.training.automl.shared.component_status\
          \ import ComponentStatusTracker\n\n    status = ComponentStatusTracker(component_status.path,\
          \ \"timeseries_data_loader\")\n    with status:\n        status.record(\"\
          validate_inputs\", \"started\")\n        status.record(\"validate_inputs\"\
          , \"completed\")\n\n        def get_s3_client(verify=True):\n          \
          \  \"\"\"Create and return an S3 client using credentials from environment\
          \ variables.\"\"\"\n            access_key = os.environ.get(\"AWS_ACCESS_KEY_ID\"\
          )\n            secret_key = os.environ.get(\"AWS_SECRET_ACCESS_KEY\")\n\
          \            endpoint_url = os.environ.get(\"AWS_S3_ENDPOINT\")\n      \
          \      region_name = os.environ.get(\"AWS_DEFAULT_REGION\")\n\n        \
          \    if (access_key and not secret_key) or (secret_key and not access_key):\n\
          \                raise ValueError(\n                    \"S3 credentials\
          \ misconfigured: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must either\
          \ \"\n                    \"both be set and non-empty, or both be unset.\
          \ \"\n                    \"Check the Kubernetes secret or environment configuration.\"\
          \n                )\n            if not access_key and not secret_key:\n\
          \                raise ValueError(\n                    \"S3 credentials\
          \ missing: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be provided\
          \ via \"\n                    \"a Kubernetes secret or environment configuration\
          \ when using s3:// dataset URIs.\"\n                )\n\n            if\
          \ not endpoint_url:\n                raise ValueError(\n               \
          \     \"S3 credentials missing: AWS_S3_ENDPOINT must be provided via \"\n\
          \                    \"a Kubernetes secret or environment configuration.\"\
          \n                )\n\n            return boto3.client(\n              \
          \  \"s3\",\n                endpoint_url=endpoint_url,\n               \
          \ region_name=region_name,\n                aws_access_key_id=access_key,\n\
          \                aws_secret_access_key=secret_key,\n                verify=verify,\n\
          \            )\n\n        def load_timeseries_data_truncate(bucket_name,\
          \ file_key, max_size_bytes, chunk_size):\n            \"\"\"Load time series\
          \ CSV from S3, truncating to max_size_bytes while preserving order.\"\"\"\
          \n            from botocore.exceptions import SSLError\n\n            s3_client\
          \ = get_s3_client()\n            try:\n                response = s3_client.get_object(Bucket=bucket_name,\
          \ Key=file_key)\n            except SSLError:\n                logger.warning(\n\
          \                    \"SSL error when downloading s3://%s/%s, retrying with\
          \ verify=False\",\n                    bucket_name,\n                  \
          \  file_key,\n                )\n                no_verify_client = get_s3_client(verify=False)\n\
          \                response = no_verify_client.get_object(Bucket=bucket_name,\
          \ Key=file_key)\n            text_stream = io.TextIOWrapper(response[\"\
          Body\"], encoding=\"utf-8\")\n\n            chunk_list = []\n          \
          \  accumulated_size = 0\n            total_rows_read = 0\n\n           \
          \ try:\n                for chunk_df in pd.read_csv(text_stream, chunksize=chunk_size):\n\
          \                    chunk_memory = chunk_df.memory_usage(deep=True).sum()\n\
          \n                    if accumulated_size + chunk_memory > max_size_bytes:\n\
          \                        remaining_bytes = max_size_bytes - accumulated_size\n\
          \                        if remaining_bytes <= 0:\n                    \
          \        break\n                        bytes_per_row = chunk_memory / len(chunk_df)\
          \ if len(chunk_df) > 0 else 0\n                        if bytes_per_row\
          \ > 0:\n                            rows_to_take = int(remaining_bytes /\
          \ bytes_per_row)\n                            if rows_to_take > 0:\n   \
          \                             chunk_df = chunk_df.head(rows_to_take)\n \
          \                               chunk_list.append(chunk_df)\n          \
          \                      total_rows_read += len(chunk_df)\n              \
          \          break\n\n                    chunk_list.append(chunk_df)\n  \
          \                  accumulated_size += chunk_memory\n                  \
          \  total_rows_read += len(chunk_df)\n\n                    if accumulated_size\
          \ >= max_size_bytes:\n                        break\n\n            except\
          \ Exception as e:\n                if not chunk_list:\n                \
          \    raise ValueError(f\"Error reading CSV from S3: {str(e)}\") from e\n\
          \n            if not chunk_list:\n                raise ValueError(\"No\
          \ data was loaded from S3. The file may be empty or inaccessible.\")\n\n\
          \            logger.debug(\n                \"S3 chunk read: %s rows (~%.2f\
          \ MB)\",\n                total_rows_read,\n                accumulated_size\
          \ / (1024**2),\n            )\n            return pd.concat(chunk_list,\
          \ ignore_index=True)\n\n        def _clean_timeseries_dataframe(data, id_col,\
          \ ts_col, log):\n            \"\"\"Prepare panel data without dropping rows\
          \ for missing targets (AutoGluon handles NaNs).\n\n            Per time-series\
          \ practice, **do not** drop rows for null/NaN targets or non-finite values\n\
          \            after mapping ``+/-inf`` to NaN: removing observations creates\
          \ irregular grids and breaks frequency\n            inference unless callers\
          \ set ``freq`` explicitly. See AutoGluon TimeSeries missing-value\n    \
          \        handling per model family.\n\n            This step: replace ``+/-inf``\
          \ with NaN; parse timestamps and **fail** if any are invalid;\n        \
          \    **fail** if any ``id_col`` or timestamp is null; ``drop_duplicates``\
          \ on ``(id_col, ts_col)``\n            (keep last) only for true duplicate\
          \ keys.\n            \"\"\"\n            rows_in = len(data)\n         \
          \   if rows_in == 0:\n                return data\n\n            out = data.replace([float(\"\
          inf\"), float(\"-inf\")], float(\"nan\"))\n\n            # Detect and handle\
          \ numeric fractional year timestamps\n            ts_series = out[ts_col]\n\
          \            non_null_ts = ts_series[ts_series.notna()]\n\n            #\
          \ Check if all non-null timestamps are numeric\n            is_numeric =\
          \ pd.to_numeric(non_null_ts, errors=\"coerce\").notna().all() if len(non_null_ts)\
          \ > 0 else False\n\n            if is_numeric:\n                # Convert\
          \ to numeric\n                numeric_ts = pd.to_numeric(ts_series, errors=\"\
          coerce\")\n                non_null_numeric = numeric_ts[numeric_ts.notna()]\n\
          \n                # Check if values look like fractional years (reasonable\
          \ year range: 1800-2200)\n                if len(non_null_numeric) > 0:\n\
          \                    min_val = non_null_numeric.min()\n                \
          \    max_val = non_null_numeric.max()\n\n                    if 1800 <=\
          \ min_val <= 2200 and 1800 <= max_val <= 2200:\n                       \
          \ # Treat as fractional years - keep as numeric for sorting\n          \
          \              # AutoGluon will handle conversion when loading the data\n\
          \                        log.info(\n                            \"Timestamp\
          \ column %r contains numeric values in year range [%.2f, %.2f]; \"\n   \
          \                         \"treating as fractional years (kept as numeric\
          \ for sorting).\",\n                            ts_col,\n              \
          \              min_val,\n                            max_val,\n        \
          \                )\n                        out[ts_col] = numeric_ts\n \
          \                   else:\n                        # Numeric but not in\
          \ year range - likely Unix timestamps or invalid\n                     \
          \   raise ValueError(\n                            f\"Column {ts_col!r}\
          \ contains numeric values outside the fractional year range \"\n       \
          \                     f\"(1800-2200): min={min_val:.2f}, max={max_val:.2f}.\
          \ \"\n                            \"If these are Unix timestamps, convert\
          \ them to ISO date strings upstream. \"\n                            \"\
          If these are fractional years, ensure values are in a reasonable range.\"\
          \n                        )\n                else:\n                   \
          \ # All nulls, let pd.to_datetime handle it\n                    out[ts_col]\
          \ = pd.to_datetime(out[ts_col], errors=\"coerce\", utc=False)\n        \
          \    else:\n                # Not all numeric - use standard datetime parsing\n\
          \                out[ts_col] = pd.to_datetime(out[ts_col], errors=\"coerce\"\
          , utc=False)\n\n            if out[id_col].isna().any():\n             \
          \   raise ValueError(\n                    f\"Column {id_col!r} contains\
          \ null values. Fix the input data; do not drop rows here, \"\n         \
          \           \"as that can break regular frequency expected by AutoGluon\
          \ TimeSeries.\"\n                )\n            bad_ts = int(out[ts_col].isna().sum())\n\
          \            if bad_ts:\n                raise ValueError(\n           \
          \         f\"Column {ts_col!r} has {bad_ts} value(s) that could not be parsed\
          \ as datetimes. \"\n                    \"Fix the input data. Dropping those\
          \ rows would create irregular series and can break \"\n                \
          \    \"AutoGluon frequency inference (set TimeSeriesPredictor(freq=...)\
          \ or regularize upstream).\"\n                )\n\n            # Sort by\
          \ (id, timestamp) BEFORE deduplication so that keep=\"last\" means\n   \
          \         # \"keep the last row in chronological order\" (after sorting),\
          \ not \"keep the last row in file order\".\n            # This ensures we\
          \ retain the chronologically latest observation for each (id, timestamp)\
          \ pair.\n            out = out.sort_values(by=[id_col, ts_col])\n      \
          \      before_dedupe = len(out)\n            out = out.drop_duplicates(subset=[id_col,\
          \ ts_col], keep=\"last\")\n            dropped_dupes = before_dedupe - len(out)\n\
          \            if dropped_dupes:\n                log.info(\n            \
          \        \"Timeseries cleansing: dropped %s duplicate rows on (%s, %s),\
          \ keep=last.\",\n                    dropped_dupes,\n                  \
          \  id_col,\n                    ts_col,\n                )\n\n         \
          \   rows_out = len(out)\n            log.info(\"Timeseries cleansing: rows\
          \ in=%s out=%s (target NaNs retained for AutoGluon).\", rows_in, rows_out)\n\
          \            if rows_out == 0:\n                raise ValueError(\"After\
          \ removing duplicate (id, timestamp) pairs, the dataset has no rows left.\"\
          )\n\n            return out.reset_index(drop=True)\n\n        status.record(\n\
          \            \"read_and_sample\",\n            \"started\",\n          \
          \  source=f\"s3://{bucket_name}/{file_key}\",\n        )\n        df = load_timeseries_data_truncate(bucket_name,\
          \ file_key, MAX_SIZE_BYTES, PANDAS_CHUNK_SIZE)\n\n        required_columns\
          \ = {id_column, timestamp_column, target}\n        missing_columns = required_columns\
          \ - set(df.columns)\n        if missing_columns:\n            raise ValueError(\n\
          \                f\"Missing required columns in dataset: {missing_columns}.\
          \ Available columns: {list(df.columns)}\"\n            )\n\n        if len(df)\
          \ == 0:\n            raise ValueError(\n                \"The loaded dataset\
          \ has no data rows. Provide at least one row per time series \"\n      \
          \          f\"with columns {sorted(required_columns)}.\"\n            )\n\
          \n        status.record(\"read_and_sample\", \"completed\", rows=len(df))\n\
          \        status.record(\"cleanse\", \"started\")\n\n        df = _clean_timeseries_dataframe(df,\
          \ id_column, timestamp_column, logger)\n\n        n_valid = len(df)\n  \
          \      if n_valid < MIN_VALID_RECORDS_AFTER_CLEANSING:\n            raise\
          \ ValueError(\n                f\"After data cleansing, only {n_valid} valid\
          \ record(s) remain; \"\n                f\"at least {MIN_VALID_RECORDS_AFTER_CLEANSING}\
          \ are required for AutoML training. \"\n                \"Provide a larger\
          \ dataset or fix invalid timestamps, null ids, and duplicate keys.\"\n \
          \           )\n\n        status.record(\"cleanse\", \"completed\", rows=n_valid)\n\
          \        status.record(\"split\", \"started\")\n\n        # Create workspace\
          \ datasets directory\n        datasets_dir = Path(workspace_path) / \"datasets\"\
          \n        datasets_dir.mkdir(parents=True, exist_ok=True)\n\n        # Stable\
          \ ordering for downstream I/O (redundant if cleanse already sorted; kept\
          \ for clarity)\n        df = df.sort_values(by=[id_column, timestamp_column]).reset_index(drop=True)\n\
          \n        test_size = DEFAULT_TEST_SIZE\n\n        def _early_late_split(group:\
          \ pd.DataFrame, early_fraction: float) -> tuple[pd.DataFrame, pd.DataFrame]:\n\
          \            \"\"\"Split one series by time: first ``early_fraction`` of\
          \ rows (by time) vs remainder.\n\n            Ensures at least one row in\
          \ each side when len >= 2. A single-row series is kept\n            entirely\
          \ in the early (train/selection) part.\n            \"\"\"\n           \
          \ g = group.sort_values(by=timestamp_column)\n            n = len(g)\n \
          \           if n == 0:\n                return g.iloc[:0].copy(), g.iloc[:0].copy()\n\
          \            if n == 1:\n                return g.copy(), g.iloc[:0].copy()\n\
          \            split_idx = int(n * early_fraction)\n            split_idx\
          \ = max(1, min(split_idx, n - 1))\n            return g.iloc[:split_idx].copy(),\
          \ g.iloc[split_idx:].copy()\n\n        def _concat_sorted(parts: list, sort_by:\
          \ list) -> pd.DataFrame:\n            if not parts:\n                return\
          \ pd.DataFrame(columns=df.columns)\n            out = pd.concat(parts, ignore_index=True)\n\
          \            return out.sort_values(by=sort_by).reset_index(drop=True)\n\
          \n        train_parts: list = []\n        test_parts: list = []\n      \
          \  for _, series_df in df.groupby(id_column, sort=False):\n            tr,\
          \ te = _early_late_split(series_df, 1.0 - test_size)\n            train_parts.append(tr)\n\
          \            test_parts.append(te)\n\n        train_df = _concat_sorted(train_parts,\
          \ [id_column, timestamp_column])\n        test_df = _concat_sorted(test_parts,\
          \ [id_column, timestamp_column])\n\n        selection_parts: list = []\n\
          \        extra_parts: list = []\n        for _, series_train in train_df.groupby(id_column,\
          \ sort=False):\n            sel, ext = _early_late_split(series_train, selection_train_size)\n\
          \            selection_parts.append(sel)\n            extra_parts.append(ext)\n\
          \n        selection_train_df = _concat_sorted(selection_parts, [id_column,\
          \ timestamp_column])\n        extra_train_df = _concat_sorted(extra_parts,\
          \ [id_column, timestamp_column])\n\n        # Validate split outputs:\n\
          \        if len(train_df) == 0:\n            raise ValueError(\n       \
          \         \"Primary temporal split produced no train rows. The dataset may\
          \ be too small for \"\n                \"the configured splits. Add more\
          \ rows per time series, or reduce test_size \"\n                f\"(default\
          \ is {DEFAULT_TEST_SIZE}).\"\n            )\n        if len(selection_train_df)\
          \ == 0:\n            raise ValueError(\n                \"Secondary split\
          \ produced an empty selection-train dataset; \"\n                \"models_selection_train_dataset.csv\
          \ would be empty and downstream training would fail. \"\n              \
          \  \"Increase rows per time series and/or selection_train_size, or reduce\
          \ test_size so \"\n                \"each series has enough train rows for\
          \ the selection segment.\"\n            )\n\n        status.record(\n  \
          \          \"split\",\n            \"completed\",\n            test_size=test_size,\n\
          \            selection_train_size=selection_train_size,\n        )\n\n \
          \       # Save test dataset to artifact\n        test_df.to_csv(sampled_test_dataset.path,\
          \ index=False)\n\n        selection_path = datasets_dir / \"models_selection_train_dataset.csv\"\
          \n        extra_path = datasets_dir / \"extra_train_dataset.csv\"\n\n  \
          \      selection_train_df.to_csv(selection_path, index=False)\n        extra_train_df.to_csv(extra_path,\
          \ index=False)\n\n        logger.info(\n            \"Timeseries loader:\
          \ %s rows from s3://%s/%s; split selection=%s extra=%s test=%s\",\n    \
          \        len(df),\n            bucket_name,\n            file_key,\n   \
          \         len(selection_train_df),\n            len(extra_train_df),\n \
          \           len(test_df),\n        )\n\n        # Create sample config and\
          \ split config\n        sample_config = {\"sampling_method\": \"first_n_rows\"\
          , \"total_rows_loaded\": len(df), \"sampled_rows\": len(df)}\n\n       \
          \ split_config = {\n            \"test_size\": test_size,\n            \"\
          selection_train_size\": selection_train_size,\n        }\n\n        status.record(\"\
          write_outputs\", \"started\")\n        status.record(\"write_outputs\",\
          \ \"completed\")\n        component_status.metadata[\"display_name\"] =\
          \ \"Timeseries Data Loader Status\"\n\n        # Sample row for downstream\
          \ use (JSON string to avoid NaN issues)\n        sample_rows = test_df.tail(min(5,\
          \ len(test_df))).to_json(orient=\"records\")\n\n        return NamedTuple(\n\
          \            \"outputs\",\n            sample_config=dict,\n           \
          \ split_config=dict,\n            sample_rows=str,\n            models_selection_train_data_path=str,\n\
          \            extra_train_data_path=str,\n        )(\n            sample_config=sample_config,\n\
          \            split_config=split_config,\n            sample_rows=sample_rows,\n\
          \            models_selection_train_data_path=str(selection_path),\n   \
          \         extra_train_data_path=str(extra_path),\n        )\n\n"
        image: quay.io/opendatahub/odh-automl:odh-stable
        resources:
          cpuLimit: 32.0
          cpuRequest: 2.0
          memoryLimit: 68.719476736
          memoryRequest: 8.589934592
          resourceCpuLimit: '32'
          resourceCpuRequest: '2'
          resourceMemoryLimit: 64Gi
          resourceMemoryRequest: 8Gi
pipelineInfo:
  description: AutoML time series forecasting pipeline for building accurate, deployment-ready
    forecasters with minimal tuning. Powered by AutoGluon TimeSeries, it compares
    statistical and deep learning approaches, refits the best models, and delivers
    top predictors, back-testing insights, and a ranked leaderboard for model selection.
  name: autogluon-timeseries-training-pipeline
root:
  dag:
    tasks:
      autogluon-timeseries-models-training:
        cachingOptions: {}
        componentRef:
          name: comp-autogluon-timeseries-models-training
        dependentTasks:
        - timeseries-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: timeseries-data-loader
          parameters:
            eval_metric:
              componentInputParameter: eval_metric
            extra_train_data_path:
              taskOutputParameter:
                outputParameterKey: extra_train_data_path
                producerTask: timeseries-data-loader
            id_column:
              componentInputParameter: id_column
            known_covariates_names:
              componentInputParameter: known_covariates_names
            pipeline_name:
              runtimeValue:
                constant: '{{$.pipeline_job_resource_name}}'
            prediction_length:
              componentInputParameter: prediction_length
            run_id:
              runtimeValue:
                constant: '{{$.pipeline_job_uuid}}'
            sample_rows:
              taskOutputParameter:
                outputParameterKey: sample_rows
                producerTask: timeseries-data-loader
            sampling_config:
              taskOutputParameter:
                outputParameterKey: sample_config
                producerTask: timeseries-data-loader
            split_config:
              taskOutputParameter:
                outputParameterKey: split_config
                producerTask: timeseries-data-loader
            target:
              componentInputParameter: target
            timestamp_column:
              componentInputParameter: timestamp_column
            top_n:
              componentInputParameter: top_n
            train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: timeseries-data-loader
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: autogluon-timeseries-models-training
      leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - autogluon-timeseries-models-training
        inputs:
          artifacts:
            models_artifact:
              taskOutputArtifact:
                outputArtifactKey: models_artifact
                producerTask: autogluon-timeseries-models-training
          parameters:
            eval_metric:
              taskOutputParameter:
                outputParameterKey: eval_metric
                producerTask: autogluon-timeseries-models-training
        taskInfo:
          name: leaderboard-evaluation
      publish-component-stage-map:
        cachingOptions: {}
        componentRef:
          name: comp-publish-component-stage-map
        inputs:
          parameters:
            pipeline_id:
              runtimeValue:
                constant: autogluon-timeseries-training-pipeline
            run_id:
              runtimeValue:
                constant: '{{$.pipeline_job_uuid}}'
        taskInfo:
          name: publish-component-stage-map
      timeseries-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-timeseries-data-loader
        dependentTasks:
        - publish-component-stage-map
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: train_data_bucket_name
            file_key:
              componentInputParameter: train_data_file_key
            id_column:
              componentInputParameter: id_column
            target:
              componentInputParameter: target
            timestamp_column:
              componentInputParameter: timestamp_column
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: timeseries-data-loader
  inputDefinitions:
    parameters:
      eval_metric:
        defaultValue: MASE
        isOptional: true
        parameterType: STRING
      id_column:
        parameterType: STRING
      known_covariates_names:
        isOptional: true
        parameterType: LIST
      prediction_length:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      target:
        parameterType: STRING
      timestamp_column:
        parameterType: STRING
      top_n:
        defaultValue: 3.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_data_bucket_name:
        parameterType: STRING
      train_data_file_key:
        parameterType: STRING
      train_data_secret_name:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-timeseries-data-loader:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: train_data_secret_name
    pipelineConfig:
      workspace:
        kubernetes:
          pvcSpecPatch:
            accessModes:
            - ReadWriteOnce
        size: 12Gi
