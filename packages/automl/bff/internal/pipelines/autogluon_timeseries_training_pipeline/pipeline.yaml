        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef leaderboard_evaluation(\n    models_artifact: dsl.Input[dsl.Model],\n\
          \    eval_metric: str,\n    html_artifact: dsl.Output[dsl.HTML],\n    component_status:\
          \ dsl.Output[dsl.Artifact],\n) -> NamedTuple(\"outputs\", best_model=str):\n\
          \    \"\"\"Evaluate refitted AutoGluon models and generate a leaderboard.\n\
          \n    This component reads pre-computed metrics from a combined models artifact\n\
          \    produced by ``autogluon_models_training`` and generates an HTML-formatted\n\
          \    leaderboard ranking the models by their performance metric.\n\n   \
          \ The artifact layout expected under ``models_artifact.path``::\n\n    \
          \    models_artifact.path /\n          <model_name>_FULL /\n           \
          \ metrics / metrics.json\n            predictor / predictor.pkl\n      \
          \      notebooks / automl_predictor_notebook.ipynb\n\n    ``models_artifact.metadata[\"\
          model_names\"]`` must contain the list of\n    refitted model display names\
          \ (e.g. ``[\"LightGBM_BAG_L1_FULL\", ...]``).\n\n    Args:\n        models_artifact:\
          \ Combined Model artifact from ``autogluon_models_training``\n         \
          \   with ``metadata[\"model_names\"]`` and per-model subdirectories.\n \
          \       eval_metric: Metric name for ranking (e.g. ``\"accuracy\"``, ``\"\
          root_mean_squared_error\"``);\n            leaderboard sorted descending\
          \ (AutoGluon uses higher-is-better convention).\n        html_artifact:\
          \ Output artifact for the HTML-formatted leaderboard.\n        component_status:\
          \ Output artifact with stage progress (``component_status.json``).\n   \
          \         KFP creates this automatically when the component is used inside\
          \ a pipeline.\n\n    Raises:\n        FileNotFoundError: If any model metrics\
          \ path cannot be found.\n        KeyError: If ``metadata[\"model_names\"\
          ]`` is missing or metrics JSON lacks\n            the ``eval_metric`` key.\n\
          \n    Example:\n        from kfp import dsl\n        from components.training.automl.autogluon_leaderboard_evaluation\
          \ import (\n            leaderboard_evaluation\n        )\n\n        @dsl.pipeline(name=\"\
          model-evaluation-pipeline\")\n        def evaluation_pipeline(models_artifact):\n\
          \            # component_status is wired by KFP; callers do not pass it\
          \ explicitly.\n            leaderboard = leaderboard_evaluation(\n     \
          \           models_artifact=models_artifact,\n                eval_metric=\"\
          root_mean_squared_error\",\n            )\n            return leaderboard\n\
          \    \"\"\"  # noqa: E501\n    import importlib.resources\n    import json\n\
          \    import logging\n    from pathlib import Path\n\n    import pandas as\
          \ pd\n    from kfp_components.components.training.automl.shared.component_status\
          \ import ComponentStatusTracker\n    from kfp_components.components.training.automl.shared.leaderboard_utils\
          \ import (\n        _build_leaderboard_html,\n        _build_leaderboard_table,\n\
          \        _round_metrics,\n    )\n\n    # Initialize status tracker\n   \
          \ status = ComponentStatusTracker(component_status.path, \"leaderboard_evaluation\"\
          )\n    with status:\n        logger = logging.getLogger(__name__)\n\n  \
          \      # Stage: build_leaderboard\n        status.record(\"build_leaderboard\"\
          , \"started\")\n\n        # Input validation\n        if not isinstance(eval_metric,\
          \ str) or not eval_metric.strip():\n            raise TypeError(\"eval_metric\
          \ must be a non-empty string.\")\n        model_names_raw = models_artifact.metadata.get(\"\
          model_names\", \"[]\")\n        # KFP/MLMD serializes lists as JSON strings\
          \ to avoid the {\"list\": [...]} round-trip bug.\n        model_names =\
          \ json.loads(model_names_raw) if isinstance(model_names_raw, str) else list(model_names_raw)\n\
          \        if not model_names:\n            raise KeyError(\"models_artifact.metadata\
          \ must contain a non-empty 'model_names' list.\")\n\n        results = []\n\
          \        base_uri = models_artifact.uri.rstrip(\"/\")\n        for display_name\
          \ in model_names:\n            metrics_path = Path(models_artifact.path)\
          \ / display_name / \"metrics\" / \"metrics.json\"\n            if not metrics_path.exists():\n\
          \                logger.warning(\n                    \"Skipping model '%s':\
          \ no metrics/metrics.json found. \"\n                    \"The refit task\
          \ may have failed for this model.\",\n                    display_name,\n\
          \                )\n                continue\n            with metrics_path.open(\"\
          r\") as f:\n                eval_results = json.load(f)\n            model_uri\
          \ = f\"{base_uri}/{display_name}\"\n            predictor_uri = f\"{model_uri}/predictor\"\
          \n            notebook_uri = f\"{model_uri}/notebooks/automl_predictor_notebook.ipynb\"\
          \n            results.append(\n                {\n                    \"\
          model\": display_name,\n                    **_round_metrics(eval_results),\n\
          \                    \"notebook\": notebook_uri,\n                    \"\
          predictor\": predictor_uri,\n                }\n            )\n\n      \
          \  if not results:\n            raise ValueError(\n                \"No\
          \ valid model artifacts found. All models may have failed or produced no\
          \ metrics/metrics.json output.\"\n            )\n\n        # Notice: AutoGluon\
          \ follows the \"higher is better\" strategy for all metrics.\n        #\
          \ This means that some metrics\u2014like log_loss and root_mean_squared_error\u2014\
          will have their signs FLIPPED and are shown as negative. # noqa: E501\n\
          \        # This is to ensure that a higher value always means a better model,\
          \ so users do not need to know about the metric's normal directionality\
          \ when interpreting the leaderboard. # noqa: E501\n        leaderboard_df\
          \ = pd.DataFrame(results).sort_values(by=eval_metric, ascending=False)\n\
          \        n = len(leaderboard_df)\n        leaderboard_df.index = pd.RangeIndex(start=1,\
          \ stop=n + 1, name=\"rank\")\n\n        html_table = _build_leaderboard_table(leaderboard_df)\n\
          \n        best_model_name = leaderboard_df.iloc[0][\"model\"]\n        _template_ref\
          \ = (\n            importlib.resources.files(\"kfp_components.components.training.automl.shared\"\
          )\n            / \"leaderboard_html_template.html\"\n        )\n       \
          \ with importlib.resources.as_file(_template_ref) as template_path:\n  \
          \          html_content = _build_leaderboard_html(\n                template_path=template_path,\n\
          \                table_html=html_table,\n                eval_metric=eval_metric,\n\
          \                best_model_name=best_model_name,\n                num_models=len(leaderboard_df),\n\
          \            )\n        with open(html_artifact.path, \"w\", encoding=\"\
          utf-8\") as f:\n            f.write(html_content)\n\n        html_artifact.metadata[\"\
          data\"] = leaderboard_df.to_dict()\n        html_artifact.metadata[\"display_name\"\
          ] = \"automl_leaderboard\"\n        status.record(\n            \"build_leaderboard\"\
          ,\n            \"completed\",\n            best_model=best_model_name,\n\
          \            model_count=len(leaderboard_df),\n        )\n        component_status.metadata[\"\
          display_name\"] = \"Leaderboard Evaluation Status\"\n    return NamedTuple(\"\
          outputs\", best_model=str)(best_model=best_model_name)\n\n"
