          \ (or a one-time prompt), sets ``os.environ`` for the process when you\n\
          \    type a key at the prompt, then loops on questions until an empty line.\
          \ No secret file is written.\n    For TLS, the script honors ``REQUESTS_CA_BUNDLE``\
          \ / ``SSL_CERT_FILE`` for custom CA bundles\n    (e.g. corporate/private\
