        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef search_space_preparation(\n    test_data: dsl.Input[dsl.Artifact],\n\
          \    extracted_text: dsl.Input[dsl.Artifact],\n    search_space_prep_report:\
          \ dsl.Output[dsl.Artifact],\n    embedding_models: Optional[List] = None,\n\
          \    generation_models: Optional[List] = None,\n    metric: str = None,\n\
          ):\n    \"\"\"Runs an AutoRAG experiment's first phase which includes:\n\
          \n        - AutoRAG search space creation given the user's constraints,\n\
          \        - embedding and foundation models number limitation and initial\
          \ selection,\n\n    Generates a .yml-formatted report including results\
          \ of this experiment's phase.\n    For its exact content please refer to\
          \ the `search_space_prep_report_schema.yml` file.\n\n    Args:\n       \
          \ test_data: A path to a .json file containing questions and expected answers\
          \ that can be retrieved\n            from input documents. Necessary baseline\
          \ for calculating quality metrics of RAG pipeline.\n\n        extracted_text:\
          \ A path to either a single file or a folder of files. The document(s) will\
          \ be sampled\n            and used during the models selection process.\n\
          \n        search_space_prep_report: kfp-enforced argument specifying an\
          \ output artifact.\n            Provided by kfp backend automatically.\n\
          \n        embedding_models: List of embedding model identifiers to try out\
          \ in the experiment process.\n            This list, if too long, will undergo\
          \ models preselection (limiting).\n\n        generation_models: List of\
          \ generation model identifiers to try out in the experiment process.\n \
          \           This list, if too long, will undergo models preselection (limiting).\n\
          \n        metric: Quality metric to evaluate the intermediate RAG patterns.\n\
          \    \"\"\"\n    # ChromaDB (via ai4rag) requires sqlite3 >= 3.35; RHEL9\
          \ base image has older sqlite.\n    # Patch stdlib sqlite3 with pysqlite3-binary\
          \ before any ai4rag import.\n    import sys\n\n    try:\n        import\
          \ pysqlite3\n\n        sys.modules[\"sqlite3\"] = pysqlite3\n    except\
          \ ImportError:\n        pass\n\n    import logging\n    import os\n    import\
          \ ssl\n    from dataclasses import fields, is_dataclass\n    from pathlib\
          \ import Path\n\n    import httpx\n    import pandas as pd\n    import yaml\
          \ as yml\n    from ai4rag.core.experiment.benchmark_data import BenchmarkData\n\
          \    from ai4rag.core.experiment.mps import ModelsPreSelector\n    from\
          \ ai4rag.rag.embedding.base_model import BaseEmbeddingModel\n    from ai4rag.rag.foundation_models.base_model\
          \ import BaseFoundationModel\n    from ai4rag.search_space.prepare.prepare_search_space\
          \ import (\n        prepare_search_space_with_ogx,\n    )\n    from ai4rag.search_space.src.search_space\
          \ import AI4RAGSearchSpace\n    from langchain_core.documents import Document\n\
          \    from ogx_client import APIConnectionError as OGXAPIConnectionError\n\
          \    from ogx_client import OgxClient\n\n    _ssl_logger = logging.getLogger(__name__)\n\
          \n    def _is_ssl_error(exc: BaseException) -> bool:\n        \"\"\"Check\
          \ whether an exception (or its cause/context chain) is an SSL verification\
          \ failure.\"\"\"\n        seen = set()\n        current: BaseException |\
          \ None = exc\n        while current is not None and id(current) not in seen:\n\
          \            seen.add(id(current))\n            msg = str(current).upper()\n\
          \            if \"CERTIFICATE_VERIFY_FAILED\" in msg or \"SSL\" in msg:\n\
          \                return True\n            current = current.__cause__ or\
          \ current.__context__\n        return False\n\n    def _create_ogx_client(**kwargs)\
          \ -> OgxClient:\n        \"\"\"Create OgxClient, falling back to SSL-unverified\
          \ if self-signed cert detected.\"\"\"\n        client = OgxClient(**kwargs)\n\
          \        try:\n            client.models.list()\n        except (ssl.SSLCertVerificationError,\
          \ httpx.ConnectError, OGXAPIConnectionError) as exc:\n            if _is_ssl_error(exc):\n\
          \                _ssl_logger.warning(\"SSL verification failed for OgxClient\
          \ \u2014 retrying with verify=False. \")\n                client = OgxClient(\n\
          \                    **kwargs,\n                    http_client=httpx.Client(verify=False),\n\
          \                )\n            else:\n                raise\n        return\
          \ client\n\n    TOP_N_GENERATION_MODELS = 3\n    TOP_K_EMBEDDING_MODELS\
          \ = 2\n    METRIC = \"faithfulness\"\n    SAMPLE_SIZE = 5\n    SEED = 17\n\
          \    LANGUAGE_DETECTION_SAMPLE_SIZE = 10\n\n    # English-only names: KFP's\
          \ MySQL backend rejects multi-byte UTF-8 in\n    # PipelineRuntimeManifest,\
          \ so no non-ASCII literals in component source.\n    LANGUAGE_MAP: dict[str,\
          \ str] = {\n        \"ja\": \"Japanese\",\n        \"ko\": \"Korean\",\n\
          \        \"zh-cn\": \"Chinese\",\n        \"zh-tw\": \"Chinese\",\n    \
          \    \"en\": \"English\",\n        \"de\": \"German\",\n        \"fr\":\
          \ \"French\",\n        \"es\": \"Spanish\",\n        \"pt\": \"Portuguese\"\
          ,\n        \"it\": \"Italian\",\n        \"ru\": \"Russian\",\n        \"\
          ar\": \"Arabic\",\n        \"hi\": \"Hindi\",\n        \"th\": \"Thai\"\
          ,\n        \"vi\": \"Vietnamese\",\n        \"pl\": \"Polish\",\n      \
          \  \"nl\": \"Dutch\",\n        \"sv\": \"Swedish\",\n        \"cs\": \"\
          Czech\",\n        \"tr\": \"Turkish\",\n    }\n\n    def _detect_language_via_llm(\n\
          \        questions: list[str],\n        llm_client: OgxClient,\n       \
          \ allowed_generation_models: list[str] | None = None,\n    ) -> dict[str,\
          \ str] | None:\n        \"\"\"Detect the dominant language by asking an\
          \ LLM.\n\n        Sends a few sample questions to a generation model and\
          \ asks for the ISO 639-1 code.\n        Prefers models from allowed_generation_models\
          \ when provided.\n        Returns a dict with code/name, or None for English.\n\
          \        \"\"\"\n        sample_text = \"\\n\".join(f\"- {q}\" for q in\
          \ questions[:5])\n        valid_codes = \", \".join(sorted(LANGUAGE_MAP.keys()))\n\
          \n        try:\n            models_response = llm_client.models.list()\n\
          \            models_list = models_response.data if hasattr(models_response,\
          \ \"data\") else list(models_response)\n            registered_ids = {(m.identifier\
          \ if hasattr(m, \"identifier\") else str(m.id)) for m in models_list}\n\n\
          \            model_id = None\n            if allowed_generation_models:\n\
          \                for gm in allowed_generation_models:\n                \
          \    if gm in registered_ids:\n                        model_id = gm\n \
          \                       break\n            if not model_id:\n          \
          \      for m in models_list:\n                    if hasattr(m, \"model_type\"\
          ) and getattr(m, \"model_type\", \"\") == \"llm\":\n                   \
          \     model_id = m.identifier if hasattr(m, \"identifier\") else str(m.id)\n\
          \                        break\n            if not model_id:\n         \
          \       _ssl_logger.warning(\"No models available for LLM language detection.\"\
          )\n                return None\n\n            response = llm_client.chat.completions.create(\n\
          \                model=model_id,\n                messages=[\n         \
          \           {\n                        \"role\": \"system\",\n         \
          \               \"content\": (\n                            \"You are a\
          \ language detection assistant. \"\n                            \"Given\
          \ text samples, respond with ONLY the ISO 639-1 language code \"\n     \
          \                       f\"(one of: {valid_codes}). \"\n               \
          \             \"Nothing else \u2014 just the code.\"\n                 \
          \       ),\n                    },\n                    {\n            \
          \            \"role\": \"user\",\n                        \"content\": f\"\
          What language are these questions written in?\\n{sample_text}\",\n     \
          \               },\n                ],\n                max_completion_tokens=10,\n\
          \                temperature=0.0,\n            )\n            raw = response.choices[0].message.content.strip().lower().replace('\"\
          ', \"\").replace(\"'\", \"\")\n            detected_code = raw.split()[0]\
          \ if raw else None\n\n            if not detected_code:\n              \
          \  return None\n\n            name = LANGUAGE_MAP.get(detected_code)\n \
          \           if not name:\n                _ssl_logger.warning(\"LLM returned\
          \ unsupported language code: %s\", detected_code)\n                return\
          \ None\n            _ssl_logger.info(\"Language detected via LLM: %s (%s)\"\
          , detected_code, name)\n            return {\"code\": detected_code, \"\
          name\": name}\n\n        except Exception as exc:\n            _ssl_logger.warning(\"\
          LLM language detection failed: %s\", exc)\n            return None\n\n \
          \   def _detect_benchmark_language(df: pd.DataFrame, llm_client: OgxClient)\
          \ -> dict[str, str] | None:\n        \"\"\"Detect the dominant language\
          \ from benchmark questions.\n\n        Uses LLM via OGX for accurate detection\
          \ across all languages.\n        Returns a dict with code/name, or None\
          \ for English / on failure.\n        \"\"\"\n        questions = df[\"question\"\
          ].dropna().astype(str).tolist()\n        if not questions:\n           \
          \ return None\n\n        sample = questions[:LANGUAGE_DETECTION_SAMPLE_SIZE]\n\
          \        return _detect_language_via_llm(sample, llm_client, allowed_generation_models=generation_models)\n\
          \n    supported_metrics = [\"faithfulness\", \"answer_correctness\", \"\
          context_correctness\"]\n\n    if embedding_models:\n        if not isinstance(embedding_models,\
          \ list):\n            raise TypeError(\"embedding_models must be a list.\"\
          )\n        for i, m in enumerate(embedding_models):\n            if not\
          \ m:\n                raise TypeError(f\"embedding_models[{i}] must be a\
          \ non-empty string.\")\n\n    if generation_models:\n        if not isinstance(generation_models,\
          \ list):\n            raise TypeError(\"generation_models must be a list.\"\
          )\n        for i, m in enumerate(generation_models):\n            if not\
          \ m:\n                raise TypeError(f\"generation_models[{i}] must be\
          \ a non-empty string.\")\n\n    if metric and metric not in supported_metrics:\n\
          \        raise ValueError(f\"Metric {metric} is not supported. Supported\
          \ metrics are {supported_metrics}.\")\n\n    def load_as_langchain_doc(path:\
          \ str | Path) -> list[Document]:\n        \"\"\"Given path to a text-based\
          \ file or a folder thereof load everything to memory.\n\n        Args:\n\
          \            path: str | Path\n                A local path to either a\
          \ text file or a folder of text files.\n\n        Returns\":\n\n       \
          \ list[Document]\n            A list of langchain `Document` objects.\n\
          \        \"\"\"\n        if isinstance(path, str):\n            path = Path(path)\n\
          \n        documents = []\n        if path.is_dir():\n            for doc_path\
          \ in path.iterdir():\n                with doc_path.open(\"r\", encoding=\"\
          utf-8\") as doc:\n                    doc_id = doc_path.stem if doc_path.suffix\
          \ == \".md\" else doc_path.name\n                    documents.append(\n\
          \                        Document(\n                            page_content=doc.read(),\n\
          \                            metadata={\"document_id\": doc_id},\n     \
          \                   )\n                    )\n\n        elif path.is_file():\n\
          \            doc_id = path.stem if path.suffix == \".md\" else path.name\n\
          \            with path.open(\"r\", encoding=\"utf-8\") as doc:\n       \
          \         documents.append(Document(page_content=doc.read(), metadata={\"\
          document_id\": doc_id}))\n\n        return documents\n\n    def prepare_ai4rag_search_space()\
          \ -> AI4RAGSearchSpace:\n        \"\"\"Prepares search space for AI4RAG\
          \ experiment.\n\n        Returns:\n            AI4RAGSearchSpace\n     \
          \           Search space for AI4RAG experiment.\n        \"\"\"\n      \
          \  payload = {}\n        if generation_models:\n            payload[\"foundation_models\"\
          ] = [{\"model_id\": gm} for gm in generation_models]\n        if embedding_models:\n\
          \            payload[\"embedding_models\"] = [{\"model_id\": gm} for gm\
          \ in embedding_models]\n\n        return prepare_search_space_with_ogx(payload,\
          \ client=client)\n\n    def represent_model_instance(dumper, model: BaseFoundationModel\
          \ | BaseEmbeddingModel) -> yml.Node:\n        \"\"\"Helper method instructing\
          \ the yml.Dumper on how to serialize the *Model instances\"\"\"\n      \
          \  if isinstance(model, BaseEmbeddingModel):\n            type_ = \"embedding\"\
          \n        elif isinstance(model, BaseFoundationModel):\n            type_\
          \ = \"generation\"\n\n        params = model.params\n        if is_dataclass(params):\
          \  # OGX* model classes hold params as dataclass instances\n           \
          \ params = {\n                field.name: getattr(model.params, field.name)\n\
          \                for field in fields(model.params)\n                if getattr(model.params,\
          \ field.name)\n            }\n        elif hasattr(params, \"model_dump\"\
          ):  # Pydantic v2 models\n            params = params.model_dump(exclude_unset=True)\n\
          \        elif hasattr(params, \"dict\"):  # Pydantic v1 models\n       \
          \     params = params.dict(exclude_unset=True)\n\n        return dumper.represent_mapping(\"\
          !Model\", {model.model_id: params or {}, \"type_\": type_})\n\n    yml.add_multi_representer(BaseFoundationModel,\
          \ represent_model_instance, Dumper=yml.SafeDumper)\n    yml.add_multi_representer(BaseEmbeddingModel,\
          \ represent_model_instance, Dumper=yml.SafeDumper)\n\n    ogx_client_base_url\
          \ = os.environ.get(\"OGX_CLIENT_BASE_URL\", None)\n    ogx_client_api_key\
          \ = os.environ.get(\"OGX_CLIENT_API_KEY\", None)\n\n    if not ogx_client_base_url\
          \ or not ogx_client_api_key:\n        raise ValueError(\"OGX_CLIENT_BASE_URL\
          \ and OGX_CLIENT_API_KEY environment variables must be set.\")\n\n    client\
          \ = _create_ogx_client(base_url=ogx_client_base_url, api_key=ogx_client_api_key)\n\
          \n    search_space = prepare_ai4rag_search_space()\n\n    benchmark_df =\
          \ pd.read_json(Path(test_data.path))\n    detected_language = _detect_benchmark_language(benchmark_df,\
          \ llm_client=client)\n    benchmark_data = BenchmarkData(benchmark_df)\n\
          \    documents = load_as_langchain_doc(extracted_text.path)\n\n    if (\n\
          \        len(search_space[\"foundation_model\"].values) > TOP_N_GENERATION_MODELS\n\
          \        or len(search_space[\"embedding_model\"].values) > TOP_K_EMBEDDING_MODELS\n\
          \    ):\n        mps = ModelsPreSelector(\n            benchmark_data=benchmark_data.get_random_sample(n_records=SAMPLE_SIZE,\
          \ random_seed=SEED),\n            documents=documents,\n            foundation_models=search_space._search_space[\"\
          foundation_model\"].values,\n            embedding_models=search_space._search_space[\"\
          embedding_model\"].values,\n            metric=metric if metric else METRIC,\n\
          \        )\n        mps.evaluate_patterns()\n        selected_models = mps.select_models(\n\
          \            n_embedding_models=TOP_K_EMBEDDING_MODELS,\n            n_foundation_models=TOP_N_GENERATION_MODELS,\n\
          \        )\n        selected_models_names = {\n            \"foundation_model\"\
          : selected_models[\"foundation_models\"],\n            \"embedding_model\"\
          : selected_models[\"embedding_models\"],\n        }\n\n    else:\n     \
          \   selected_models_names = {\n            \"foundation_model\": search_space[\"\
          foundation_model\"].values,\n            \"embedding_model\": search_space[\"\
          embedding_model\"].values,\n        }\n\n    verbose_search_space_repr =\
          \ {\n        k: v.all_values()\n        for k, v in search_space._search_space.items()\n\
          \        if k not in (\"foundation_model\", \"embedding_model\")\n    }\n\
          \    verbose_search_space_repr |= selected_models_names\n\n    if detected_language:\n\
          \        verbose_search_space_repr[\"detected_language\"] = detected_language\n\
          \n    with open(search_space_prep_report.path, \"w\") as report_file:\n\
          \        yml.safe_dump(verbose_search_space_repr, report_file)\n\n"
        image: quay.io/opendatahub/odh-autorag:odh-stable
        resources:
