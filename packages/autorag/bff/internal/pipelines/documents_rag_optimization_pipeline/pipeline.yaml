          \        pass\n\n    s3_creds = {k: os.environ.get(k) for k in [\"AWS_ACCESS_KEY_ID\"\
          , \"AWS_SECRET_ACCESS_KEY\", \"AWS_S3_ENDPOINT\"]}\n    missing_creds =\
          \ [k for k, v in s3_creds.items() if v is None]\n\n    if missing_creds:\n\
          \        raise ValueError(\n            f\"Missing environment variable(s):\
          \ {missing_creds}. Check if kubernetes secret was configured properly.\"\
          \n        )\n\n    s3_creds[\"AWS_DEFAULT_REGION\"] = os.environ.get(\"\
          AWS_DEFAULT_REGION\")\n\n    def _make_s3_client(verify=True):\n       \
          \ return boto3.client(\n            \"s3\",\n            endpoint_url=s3_creds[\"\
          AWS_S3_ENDPOINT\"],\n            region_name=s3_creds[\"AWS_DEFAULT_REGION\"\
          ],\n            aws_access_key_id=s3_creds[\"AWS_ACCESS_KEY_ID\"],\n   \
          \         aws_secret_access_key=s3_creds[\"AWS_SECRET_ACCESS_KEY\"],\n \
          \           verify=verify,\n        )\n\n    s3_client = _make_s3_client()\n\
          \n    logger.info(\"Fetching test data from S3: bucket='%s', path='%s'.\"\
          , test_data_bucket_name, test_data_path)\n    try:\n        logger.info(\"\
          Downloading test data...\")\n        test_data_response = s3_client.get_object(Bucket=test_data_bucket_name,\
          \ Key=test_data_path)\n        logger.info(\"Download completed successfully.\"\
          )\n    except SSLError:\n        logger.warning(\"SSL error when downloading\
          \ %s, retrying with verify=False.\", test_data_path)\n        s3_client\
          \ = _make_s3_client(verify=False)\n        test_data_response = s3_client.get_object(Bucket=test_data_bucket_name,\
          \ Key=test_data_path)\n        logger.info(\"Download completed successfully\
          \ with verify=False.\")\n    except ClientError as e:\n        if e.response.get(\"\
          Error\", {}).get(\"Code\") in (\"404\", \"NoSuchKey\"):\n            raise\
          \ FileNotFoundError(\n                \"Test data object not found in S3.\
          \ bucket=%r, key=%r. \"\n                \"Check that test_data_key (pipeline\
          \ parameter) is the full object key to an existing JSON file.\"\n      \
          \          % (test_data_bucket_name, test_data_path)\n            ) from\
          \ e\n        else:\n            raise TestDataLoaderException(f\"Failed\
          \ to fetch {test_data_path}: {e}\") from e\n    except Exception as e:\n\
          \        raise TestDataLoaderException(f\"Failed to fetch {test_data_path}:\
          \ {e}\") from e\n\n    test_data_raw = test_data_response[\"Body\"].read().decode(\"\
          utf-8\")\n\n    try:\n        benchmark_data = json.loads(test_data_raw)\n\
          \    except JSONDecodeError as e:\n        raise TestDataLoaderException(\"\
          test_data_path must point to a valid JSON file.\") from e\n\n    if not\
          \ isinstance(benchmark_data, list):\n        raise TestDataLoaderException(\"\
          Test data file content must be a list with benchmark records.\")\n\n   \
          \ for idx, benchmark_record in enumerate(benchmark_data):\n        if not\
          \ isinstance(benchmark_record, dict):\n            raise TestDataLoaderException(\n\
          \                f\"Expected a dict at index {idx}, got {type(benchmark_record).__name__}:\
          \ {benchmark_record!r}\"\n            )\n        if set(benchmark_record.keys())\
          \ != benchmark_record_keys:\n            raise TestDataLoaderException(\n\
          \                f\"Incorrect or incomplete keys in test data record. \"\
          \n                f\"Make sure that each test data records contains following\
          \ keys: {benchmark_record_keys}.\"\n            )\n\n    if 0 < benchmark_sample_size\
          \ < len(benchmark_data) and isinstance(benchmark_data, list):\n        import\
          \ random\n\n        original_count = len(benchmark_data)\n        rng =\
          \ random.Random(42)\n        data = rng.sample(benchmark_data, benchmark_sample_size)\n\
          \        with open(test_data.path, \"w\", encoding=\"utf-8\") as f:\n  \
          \          json.dump(data, f, ensure_ascii=False, indent=2)\n        logger.info(\"\
          Sampled %d records from %d total.\", benchmark_sample_size, original_count)\n\
          \    else:\n        with open(test_data.path, \"w\", encoding=\"utf-8\"\
          ) as f:\n            json.dump(benchmark_data, f, ensure_ascii=False, indent=2)\n\
          \        record_count = len(benchmark_data)\n        logger.info(\"No sampling\
          \ applied; record count: %s.\", record_count)\n\n"
        image: quay.io/opendatahub/odh-autorag:odh-stable
