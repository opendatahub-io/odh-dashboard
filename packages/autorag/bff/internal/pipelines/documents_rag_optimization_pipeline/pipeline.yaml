# PIPELINE DEFINITION
# Name: documents-rag-optimization-pipeline
# Description: Automated system for building and optimizing Retrieval-Augmented Generation (RAG) applications
# Inputs:
#    embeddings_models: list
#    generation_models: list
#    input_data_bucket_name: str
#    input_data_key: str [Default: '']
#    input_data_secret_name: str
#    llama_stack_secret_name: str
#    llama_stack_vector_io_provider_id: str
#    optimization_max_rag_patterns: int [Default: 8.0]
#    optimization_metric: str [Default: 'faithfulness']
#    test_data_bucket_name: str
#    test_data_key: str
#    test_data_secret_name: str
components:
  comp-documents-discovery:
    executorLabel: exec-documents-discovery
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: Optional input artifact containing test data for sampling.
          isOptional: true
      parameters:
        input_data_bucket_name:
          description: S3 (or compatible) bucket containing input data.
          parameterType: STRING
        input_data_path:
          defaultValue: ''
          description: Path to folder with input documents within the bucket.
          isOptional: true
          parameterType: STRING
        sampling_enabled:
          defaultValue: true
          description: Whether to enable sampling or not.
          isOptional: true
          parameterType: BOOLEAN
        sampling_max_size:
          defaultValue: 1.0
          description: Maximum size of sampled documents (in gigabytes).
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        discovered_documents:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        rag_patterns:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: 'Path to the directory of RAG patterns; each subdir contains

            pattern.json (pattern_name, indexing_params, rag_params, scores,

            execution_time, final_score).'
      parameters:
        optimization_metric:
          defaultValue: faithfulness
          description: 'Name of the metric used to rank patterns (e.g. faithfulness,

            answer_correctness, context_correctness). Shown in the leaderboard

            subtitle. Defaults to "faithfulness".'
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
  comp-prepare-responses-api-requests:
    executorLabel: exec-prepare-responses-api-requests
    inputDefinitions:
      artifacts:
        rag_patterns:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: Local path to the ``rag_patterns`` directory (same layout as
            ``leaderboard_evaluation``).
    outputDefinitions:
      artifacts:
        responses_api_artifacts:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-rag-templates-optimization:
    executorLabel: exec-rag-templates-optimization
    inputDefinitions:
      artifacts:
        extracted_text:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: A path pointing to a folder containg extracted texts from input
            documents.
        search_space_prep_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: 'A path pointing to a .yml file containig short

            report on the experiment''s first phase (search space preparation).'
        test_data:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: A path pointing to test data used for evaluating RAG pattern
            quality.
      parameters:
        chat_model_token:
          description: Optional API token for the chat model endpoint. Omit if deployment
            has no auth.
          isOptional: true
          parameterType: STRING
        chat_model_url:
          description: 'Inference endpoint URL for the chat/generation model (OpenAI-compatible).

            Required for in-memory scenario.'
          isOptional: true
          parameterType: STRING
        embedding_model_token:
          description: Optional API token for the embedding model endpoint. Omit if
            no auth.
          isOptional: true
          parameterType: STRING
        embedding_model_url:
          description: Inference endpoint URL for the embedding model. Required for
            in-memory scenario.
          isOptional: true
          parameterType: STRING
        input_data_key:
          defaultValue: ''
          description: A path to documents dir within a bucket used as an input to
            AI4RAG experiment.
          isOptional: true
          parameterType: STRING
        llama_stack_vector_io_provider_id:
          description: Vector I/O provider identifier as registered in llama-stack.
          isOptional: true
          parameterType: STRING
        optimization_settings:
          description: Additional settings customising the experiment.
          isOptional: true
          parameterType: STRUCT
        test_data_key:
          description: Path to the benchmark JSON file in object storage used by generated
            notebooks.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        rag_patterns:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: 'Folder containing all generated RAG patterns (each subdir:
            pattern.json,

            indexing_notebook.ipynb, inference_notebook.ipynb).'
  comp-search-space-preparation:
    executorLabel: exec-search-space-preparation
    inputDefinitions:
      artifacts:
        extracted_text:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: 'A path to either a single file or a folder of files. The document(s)
            will be sampled

            and used during the models selection process.'
        test_data:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: 'A path to a .json file containing questions and expected answers
            that can be retrieved

            from input documents. Necessary baseline for calculating quality metrics
            of RAG pipeline.'
      parameters:
        chat_model_token:
          description: API token for the chat model endpoint.
          isOptional: true
          parameterType: STRING
        chat_model_url:
          description: Base URL for the chat/generation model API.
          isOptional: true
          parameterType: STRING
        embedding_model_token:
          description: API token for the embedding model endpoint.
          isOptional: true
          parameterType: STRING
        embedding_model_url:
          description: Base URL for the embedding model API.
          isOptional: true
          parameterType: STRING
        embeddings_models:
          description: 'List of embedding model identifiers to try out in the experiment
            process.

            This list, if too long, will undergo models preselection (limiting).'
          isOptional: true
          parameterType: LIST
        generation_models:
          description: 'List of generation model identifiers to try out in the experiment
            process.

            This list, if too long, will undergo models preselection (limiting).'
          isOptional: true
          parameterType: LIST
        metric:
          description: Quality metric to evaluate the intermediate RAG patterns.
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        search_space_prep_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-test-data-loader:
    executorLabel: exec-test-data-loader
    inputDefinitions:
      parameters:
        test_data_bucket_name:
          description: 'S3 (or compatible) bucket that contains the test

            data file.'
          parameterType: STRING
        test_data_path:
          description: S3 object key to the JSON test data file.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-text-extraction:
    executorLabel: exec-text-extraction
    inputDefinitions:
      artifacts:
        documents_descriptor:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
          description: 'Input artifact containing

            documents_descriptor.json with bucket, prefix, and documents list.'
      parameters:
        error_tolerance:
          description: "Fraction of documents (0.0\u20131.0) allowed to fail without\n\
            raising an error. None (the default) means zero tolerance \u2014 any failure\n\
            raises immediately after all documents are processed. 0.1 means up to\n\
            10 % of documents may fail. Exceeding the threshold raises RuntimeError\n\
            with a summary of up to 10 failing documents."
          isOptional: true
          parameterType: NUMBER_DOUBLE
        max_extraction_workers:
          description: 'Number of parallel worker processes used for text

            extraction. Each worker loads a full docling DocumentConverter into memory

            (ONNX models, layout detection, etc.), so this should be kept low to avoid

            out-of-memory issues. Defaults to 4. Set to None to use all available
            CPU

            cores. Set to 1 to disable parallelism.'
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        extracted_text:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-documents-discovery:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - documents_discovery
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef documents_discovery(\n    input_data_bucket_name: str,\n    input_data_path:\
          \ str = \"\",\n    test_data: dsl.Input[dsl.Artifact] = None,\n    sampling_enabled:\
          \ bool = True,\n    sampling_max_size: float = 1,\n    discovered_documents:\
          \ dsl.Output[dsl.Artifact] = None,\n):\n    \"\"\"Documents discovery component.\n\
          \n    Lists available documents from S3, performs sampling if applied and\
          \ writes a JSON manifest\n    (documents_descriptor.json) with metadata.\
          \ Does not download document contents.\n\n    Args:\n        input_data_bucket_name:\
          \ S3 (or compatible) bucket containing input data.\n        input_data_path:\
          \ Path to folder with input documents within the bucket.\n        test_data:\
          \ Optional input artifact containing test data for sampling.\n        sampling_enabled:\
          \ Whether to enable sampling or not.\n        sampling_max_size: Maximum\
          \ size of sampled documents (in gigabytes).\n        discovered_documents:\
          \ Output artifact containing the documents descriptor JSON file.\n\n   \
          \ Environment variables (required when run with pipeline secret injection):\n\
          \        AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION.\n\
          \    \"\"\"\n    import json\n    import logging\n    import os\n    import\
          \ sys\n    from math import inf\n\n    import boto3\n\n    logger = logging.getLogger(\"\
          Document Loader component logger\")\n    logger.setLevel(logging.INFO)\n\
          \    handler = logging.StreamHandler(sys.stdout)\n    logger.addHandler(handler)\n\
          \n    DOCUMENTS_DESCRIPTOR_FILENAME = \"documents_descriptor.json\"\n  \
          \  SUPPORTED_EXTENSIONS = {\".pdf\", \".docx\", \".pptx\", \".md\", \".html\"\
          , \".txt\"}\n    MAX_SIZE_BYTES = float(inf)\n\n    if sampling_enabled:\n\
          \        MAX_SIZE_BYTES = float(sampling_max_size) * 1024**3\n\n    def\
          \ get_test_data_docs_names() -> list[str]:\n        if test_data is None:\n\
          \            return []\n        with open(test_data.path, \"r\") as f:\n\
          \            benchmark = json.load(f)\n\n        docs_names = []\n     \
          \   for question in benchmark:\n            docs_names.extend(question[\"\
          correct_answer_document_ids\"])\n\n        return docs_names\n\n    \"\"\
          \"Validate S3 credentials, list objects, sample, and write JSON descriptor.\"\
          \"\"\n    from botocore.exceptions import SSLError\n\n    s3_creds = {\n\
          \        k: os.environ.get(k)\n        for k in [\"AWS_ACCESS_KEY_ID\",\
          \ \"AWS_SECRET_ACCESS_KEY\", \"AWS_S3_ENDPOINT\", \"AWS_DEFAULT_REGION\"\
          ]\n    }\n    for k, v in s3_creds.items():\n        if v is None:\n   \
          \         raise ValueError(\"%s environment variable not set. Check if kubernetes\
          \ secret was configured properly\" % k)\n\n    def _make_s3_client(verify=True):\n\
          \        return boto3.client(\n            \"s3\",\n            endpoint_url=s3_creds[\"\
          AWS_S3_ENDPOINT\"],\n            region_name=s3_creds[\"AWS_DEFAULT_REGION\"\
          ],\n            aws_access_key_id=s3_creds[\"AWS_ACCESS_KEY_ID\"],\n   \
          \         aws_secret_access_key=s3_creds[\"AWS_SECRET_ACCESS_KEY\"],\n \
          \           verify=verify,\n        )\n\n    try:\n        s3_client = _make_s3_client()\n\
          \        contents = s3_client.list_objects_v2(\n            Bucket=input_data_bucket_name,\n\
          \            Prefix=input_data_path,\n        ).get(\"Contents\", [])\n\
          \    except SSLError:\n        logger.warning(\n            \"SSL error\
          \ when listing objects in s3://%s/%s, retrying with verify=False\",\n  \
          \          input_data_bucket_name,\n            input_data_path,\n     \
          \   )\n        s3_client = _make_s3_client(verify=False)\n        contents\
          \ = s3_client.list_objects_v2(\n            Bucket=input_data_bucket_name,\n\
          \            Prefix=input_data_path,\n        ).get(\"Contents\", [])\n\n\
          \    supported_files = [c for c in contents if c[\"Key\"].endswith(tuple(SUPPORTED_EXTENSIONS))]\n\
          \    if not supported_files:\n        raise Exception(\"No supported documents\
          \ found.\")\n\n    test_data_docs_names = get_test_data_docs_names()\n \
          \   if test_data_docs_names:\n        supported_files.sort(key=lambda c:\
          \ c[\"Key\"] not in test_data_docs_names)\n\n    total_size = 0\n    selected\
          \ = []\n    for file in supported_files:\n        if total_size + file[\"\
          Size\"] > MAX_SIZE_BYTES:\n            continue\n        selected.append(file)\n\
          \        total_size += file[\"Size\"]\n\n    documents = []\n    for file_info\
          \ in selected:\n        key = file_info[\"Key\"]\n        size_bytes = file_info[\"\
          Size\"]\n        documents.append(\n            {\n                \"key\"\
          : key,\n                \"size_bytes\": size_bytes,\n            }\n   \
          \     )\n    if not documents:\n        raise ValueError(\n            \"\
          No documents to process. Check that the bucket/prefix is correct and contains\
          \ supported files.\"\n        )\n\n    descriptor = {\n        \"bucket\"\
          : input_data_bucket_name,\n        \"prefix\": input_data_path,\n      \
          \  \"documents\": documents,\n        \"total_size_bytes\": total_size,\n\
          \        \"count\": len(documents),\n    }\n\n    logger.info(\"Documents\
          \ descriptor content %s\", descriptor)\n\n    os.makedirs(discovered_documents.path,\
          \ exist_ok=True)\n    descriptor_path = os.path.join(discovered_documents.path,\
          \ DOCUMENTS_DESCRIPTOR_FILENAME)\n    with open(descriptor_path, \"w\")\
          \ as f:\n        json.dump(descriptor, f, indent=2)\n\n    logger.info(\"\
          Documents descriptor written to %s\", descriptor_path)\n\n"
        image: registry.redhat.io/rhoai/odh-autorag-rhel9@sha256:152c98afbf558367807d9dc0bd0a203a71936476039c7130eeecc079d0605cf2
        resources:
          cpuRequest: 2.0
          memoryRequest: 8.589934592
          resourceCpuRequest: '2'
          resourceMemoryRequest: 8Gi
    exec-leaderboard-evaluation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - leaderboard_evaluation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef leaderboard_evaluation(\n    rag_patterns: dsl.InputPath(dsl.Artifact),\n\
          \    html_artifact: dsl.Output[dsl.HTML],\n    optimization_metric: str\
          \ = \"faithfulness\",\n):\n    \"\"\"Build an HTML leaderboard artifact\
          \ from RAG pattern evaluation results.\n\n    Reads pattern.json from each\
          \ subdirectory of rag_patterns (produced by\n    rag_templates_optimization)\
          \ and generates a single HTML table: Pattern_Name,\n    mean_* metrics (e.g.\
          \ mean_answer_correctness, mean_faithfulness), then\n    config columns\
          \ (chunking.*, embeddings.model_id, retrieval.* including\n    search_mode\
          \ (\"hybrid\" | \"vector\" per ai4rag), ranker_strategy,\n    generation.model_id).\
          \ Writes the HTML to html_artifact.path.\n\n    Args:\n        rag_patterns:\
          \ Path to the directory of RAG patterns; each subdir contains\n        \
          \    pattern.json (pattern_name, indexing_params, rag_params, scores,\n\
          \            execution_time, final_score).\n        html_artifact: Output\
          \ HTML artifact; the leaderboard table is written to\n            html_artifact.path\
          \ (single file).\n        optimization_metric: Name of the metric used to\
          \ rank patterns (e.g. faithfulness,\n            answer_correctness, context_correctness).\
          \ Shown in the leaderboard\n            subtitle. Defaults to \"faithfulness\"\
          .\n    \"\"\"\n    import html\n    import json\n    from pathlib import\
          \ Path\n\n    # Fallback keys when ai4rag uses different structure (embedding\
          \ vs embeddings, flat keys)\n    _config_column_fallbacks = {\n        \"\
          embeddings.model_id\": (\"embedding_model\", \"embedding.model_id\"),\n\
          \        \"generation.model_id\": (\"foundation_model\",),\n    }\n\n  \
          \  def _get_nested(params: dict, key: str):\n        \"\"\"Resolve dotted\
          \ key from flat or nested dict (e.g. chunking.method).\"\"\"\n        if\
          \ not params:\n            return None\n        if key in params:\n    \
          \        return params[key]\n        parts = key.split(\".\", 1)\n     \
          \   if len(parts) == 2:\n            outer = params.get(parts[0])\n    \
          \        if isinstance(outer, dict):\n                return outer.get(parts[1])\n\
          \        return None\n\n    def _get_config_value(merged: dict, col: str):\n\
          \        \"\"\"Get config column value, with fallbacks for ai4rag structure\
          \ (embedding vs embeddings, flat keys).\"\"\"\n        val = _get_nested(merged,\
          \ col)\n        if val is not None:\n            return val\n        fallbacks\
          \ = _config_column_fallbacks.get(col)\n        if not fallbacks:\n     \
          \       return None\n        for fallback in fallbacks:\n            if\
          \ \".\" in fallback:\n                val = _get_nested(merged, fallback)\n\
          \            else:\n                val = merged.get(fallback) if merged\
          \ else None\n            if val is not None:\n                return val\n\
          \        return None\n\n    def _merge_params(indexing_params: dict, rag_params:\
          \ dict) -> dict:\n        merged = dict(indexing_params or {})\n       \
          \ merged.update(rag_params or {})\n        return merged\n\n    def _settings_from_rag_pattern(e:\
          \ dict) -> dict | None:\n        \"\"\"Build leaderboard config dict from\
          \ rag_pattern.settings (legacy nested schema).\"\"\"\n        rp = (e.get(\"\
          rag_pattern\") or {}).get(\"settings\")\n        if not rp:\n          \
          \  return None\n        return {\n            \"chunking\": rp.get(\"chunking\"\
          ) or {},\n            \"embeddings\": {\"model_id\": (rp.get(\"embedding\"\
          ) or {}).get(\"model_id\")},\n            \"retrieval\": {\n           \
          \     \"method\": rp.get(\"method\"),\n                \"number_of_chunks\"\
          : rp.get(\"number_of_chunks\"),\n            },\n            \"generation\"\
          : {\"model_id\": (rp.get(\"generation\") or {}).get(\"model_id\")},\n  \
          \      }\n\n    def _normalize_flat_settings(settings: dict | None) -> dict\
          \ | None:\n        \"\"\"Build leaderboard config dict from flat pattern.json\
          \ settings (embedding, retrieval).\"\"\"\n        if not settings:\n   \
          \         return None\n        emb = settings.get(\"embedding\") or settings.get(\"\
          embeddings\") or {}\n        gen = settings.get(\"generation\") or {}\n\
          \        # Support nested (embedding.model_id) or flat (embedding_model\
          \ from ai4rag) keys\n        emb_model_id = emb.get(\"model_id\") if isinstance(emb,\
          \ dict) else None\n        if emb_model_id is None and isinstance(settings.get(\"\
          embedding_model\"), str):\n            emb_model_id = settings.get(\"embedding_model\"\
          )\n        gen_model_id = gen.get(\"model_id\") if isinstance(gen, dict)\
          \ else None\n        if gen_model_id is None and isinstance(settings.get(\"\
          foundation_model\"), str):\n            gen_model_id = settings.get(\"foundation_model\"\
          )\n        return {\n            \"chunking\": settings.get(\"chunking\"\
          ) or {},\n            \"embeddings\": {\"model_id\": emb_model_id},\n  \
          \          \"retrieval\": settings.get(\"retrieval\") or {},\n         \
          \   \"generation\": {\"model_id\": gen_model_id},\n        }\n\n    def\
          \ _metric_to_mean_key(metric: str) -> str:\n        return \"mean_\" + metric\n\
          \n    def _metric_display_name(metric: str) -> str:\n        \"\"\"Format\
          \ metric name for display (e.g. answer_correctness -> answer correctness).\"\
          \"\"\n        if not metric:\n            return \"optimization metric\"\
          \n        return metric.replace(\"_\", \" \").strip()\n\n    def _header_two_lines(label:\
          \ str) -> str:\n        \"\"\"Split header by '.'; if second part has multiple\
          \ words, split at last space to allow narrower column.\"\"\"\n        if\
          \ \".\" in label:\n            parts = label.split(\".\", 1)\n         \
          \   line1 = parts[0]\n            line2 = parts[1].replace(\"_\", \" \"\
          ) if len(parts) > 1 else \"\"\n            if line2:\n                if\
          \ \" \" in line2:\n                    last_space = line2.rfind(\" \")\n\
          \                    line2a = line2[:last_space]\n                    line2b\
          \ = line2[last_space + 1 :]\n                    return html.escape(line1)\
          \ + \"<br>\" + html.escape(line2a) + \"<br>\" + html.escape(line2b)\n  \
          \              return html.escape(line1) + \"<br>\" + html.escape(line2)\n\
          \        return html.escape(label.replace(\"_\", \" \"))\n\n    def _build_leaderboard_html(\n\
          \        header_row: str,\n        table_body: str,\n        best_pattern_name:\
          \ str,\n        num_patterns: int,\n        eval_metric: str,\n        colgroup_html:\
          \ str = \"\",\n    ) -> str:\n        \"\"\"Build a styled HTML document\
          \ for the RAG leaderboard (aligned with AutoML leaderboard style).\"\"\"\
          \n        metric_label = html.escape(_metric_display_name(eval_metric))\n\
          \        return f\"\"\"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta\
          \ charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width,\
          \ initial-scale=1\">\n  <title>RAG Patterns Leaderboard</title>\n  <style>\n\
          \    :root {{\n      --bg: #0f1419;\n      --surface: #1a2332;\n      --surface-hover:\
          \ #243044;\n      --border: #2d3a4f;\n      --text: #e6edf3;\n      --text-muted:\
          \ #8b949e;\n      --accent: #58a6ff;\n      --accent-dim: #388bfd66;\n \
          \     --gold: #f0b429;\n      --silver: #a8b2c1;\n      --bronze: #c9a227;\n\
          \      --success: #3fb950;\n      --radius: 12px;\n      --font: 'Segoe\
          \ UI', system-ui, -apple-system, sans-serif;\n    }}\n    * {{\n      box-sizing:\
