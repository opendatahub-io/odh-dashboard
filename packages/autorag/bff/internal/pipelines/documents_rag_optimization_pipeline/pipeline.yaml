          \ -> str:\n        \"\"\"Placeholder user message in the JSON; interactive\
          \ script overwrites at runtime.\"\"\"\n        return RESPONSES_BODY_DEFAULT_QUESTION\n\
          \n    def _language_instruction_from_user_message(user_message_text: object)\
