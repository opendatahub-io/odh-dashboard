          \        if \"language of the question\" in lowered:\n            return\
          \ default_language_instruction\n        if \"same language\" in lowered\
          \ and \"question\" in lowered:\n            return default_language_instruction\n\
          \        return \"\"\n\n    def _normalize_system_message_for_file_search(system_message_text:\
