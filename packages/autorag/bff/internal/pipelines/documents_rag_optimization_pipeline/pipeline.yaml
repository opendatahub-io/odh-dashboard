          \ shipped to the executor).\n\n    The generated body matches OpenAI-compatible\
          \ ``POST /v1/responses`` (see OpenAI's\n    `Migrate to the Responses API\
          \ <https://developers.openai.com/api/docs/guides/migrate-to-responses>`__\n\
          \    and Llama Stack's ``POST /v1/responses``): ``model``, ``input``, ``stream``,\
          \ ``store``,\n    ``metadata`` (string values only), optional ``instructions``,\
          \ and optional ``tools`` /\n    ``file_search`` when a collection name is\
          \ set, plus ``tool_choice`` forcing file search\n    and ``include: [\"\
          file_search_call.results\"]`` to return file-search hits in the response.\n\
          \    Replace\n    ``vector_store_ids`` with Llama Stack--registered vector\
          \ store identifiers if your deployment\n    does not use the collection\
