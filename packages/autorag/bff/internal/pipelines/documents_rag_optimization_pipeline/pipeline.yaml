          \n        mapping[\"OGX_CLIENT_BASE_URL\"] = (os.environ.get(\"OGX_CLIENT_BASE_URL\"\
          ) or \"\").strip()\n\n        return mapping\n\n    def generate_notebook_from_templates(\n\
