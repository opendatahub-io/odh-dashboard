          , \"{document}\"),\n                    \"user_message_text\": generation.get(\n\
          \                        \"user_message_text\",\n                      \
          \  (\n                            \"\\n\\nContext:\\n{reference_documents}:\\\
          n\\nQuestion: {question}. \\nAgain, please answer \"\n                 \
          \           \"the question based on the context provided only. If the context\
          \ is not related to \"\n                            \"the question, just\
          \ say you cannot answer. Respond exclusively in the language of \"\n   \
          \                         \"the question.\"\n                        ),\n\
          \                    ),\n                    \"system_message_text\": _build_system_message(\n\
          \                        generation.get(\"system_message_text\"),\n    \
          \                    detected_language,\n                    ),\n      \
          \              **({\"detected_language\": detected_language} if detected_language\
          \ else {}),\n                },\n                \"responses_template\"\
          : {\n                    \"model\": generation_model_id,\n             \
          \       \"stream\": False,  # Not supported yet\n                    \"\
          store\": False,  # OGX-client default (but ResponsesAPI default is True)\n\
          \                    \"input\": \"<user_query_placeholder>\",\n        \
          \            \"instructions\": _build_system_message(generation.get(\"system_message_text\"\
          ), detected_language),\n                    \"tools\": [{\"type\": \"file_search\"\
          , \"vector_store_ids\": [evaluation_result.collection]}],\n            \
          \        \"include\": [\"file_search_call.results\"],\n                },\n\
          \            },\n        }\n\n        if search_mode == \"hybrid\" and ranker_strategy\
          \ == \"rrf\":\n            ranking_options = {\"impact_factor\": ranker_k}\n\
          \            pattern[\"settings\"][\"responses_template\"][\"tools\"][0][\"\
          ranking_options\"] = ranking_options\n        elif search_mode == \"hybrid\"\
          \ and ranker_strategy == \"weighted\":\n            ranking_options = {\"\
          alpha\": ranker_alpha}\n            pattern[\"settings\"][\"responses_template\"\
          ][\"tools\"][0][\"ranking_options\"] = ranking_options\n\n        return\
          \ pattern\n\n    evaluations_list = list(rag_exp.results.evaluations)\n\
          \    max_combinations = getattr(rag_exp.results, \"max_combinations\", len(evaluations_list))\
          \ or 24\n\n    rag_patterns.metadata[\"name\"] = \"rag_patterns_artifact\"\
          \n    rag_patterns.metadata[\"uri\"] = rag_patterns.uri\n    rag_patterns.metadata[\"\
          metadata\"] = {\"patterns\": []}\n    for i, eval in enumerate(evaluations_list):\n\
          \        patt_dir = rag_patterns_dir / eval.pattern_name\n        patt_dir.mkdir(parents=True,\
          \ exist_ok=True)\n\n        pattern_data = _build_pattern_json(eval, iteration=i,\
          \ max_combinations=max_combinations)\n        generate_notebook_from_templates(\n\
          \            \"ogx_indexing\",\n            pattern_data,\n            Path(patt_dir,\
          \ \"indexing.ipynb\"),\n            input_data_key=input_data_key,\n   \
          \     )\n\n        generate_notebook_from_templates(\n            \"ogx_inference\"\
          ,\n            pattern_data,\n            Path(patt_dir, \"inference.ipynb\"\
          ),\n            test_data_key=test_data_key,\n        )\n\n        # Flat\
          \ schema: scores = per-metric aggregates (mean, ci_low, ci_high); final_score\n\
          \        pattern_data[\"scores\"] = (getattr(eval, \"scores\", None) or\
          \ {}).get(\"scores\") or {}\n        pattern_data[\"final_score\"] = getattr(eval,\
          \ \"final_score\", None)\n        rag_patterns.metadata[\"metadata\"][\"\
          patterns\"].append(pattern_data)\n        with (patt_dir / \"pattern.json\"\
          ).open(\"w+\", encoding=\"utf-8\") as pattern_details:\n            json_dump(pattern_data,\
          \ pattern_details, indent=2)\n\n        template_context = {\n         \
          \   \"responses_template\": pattern_data[\"settings\"][\"responses_template\"\
          ],\n        }\n        with (Path(embedded_artifact.path) / \"script_templates\"\
          \ / \"create_model_response.py.templ\").open(\n            \"r\", encoding=\"\
          utf-8\"\n        ) as f:\n            model_responses_templ = Template(f.read())\n\
          \            with (patt_dir / \"create_model_response.py\").open(\"w+\"\
          , encoding=\"utf-8\") as ff:\n                ff.write(model_responses_templ.substitute(template_context))\n\
          \n        eval_data = evaluation_data_list[i] if i < len(evaluation_data_list)\
          \ else []\n        try:\n            q_scores = (eval.scores or {}).get(\"\
          question_scores\") or {}\n            if q_scores and all(isinstance(q_scores.get(k),\
          \ dict) for k in q_scores):\n                evaluation_result_list = ExperimentResults.create_evaluation_results_json(eval_data,\
          \ eval)\n            else:\n                evaluation_result_list = _evaluation_result_fallback(eval_data,\
          \ eval)\n        except (KeyError, TypeError):\n            evaluation_result_list\
          \ = _evaluation_result_fallback(eval_data, eval)\n        with (patt_dir\
          \ / \"evaluation_results.json\").open(\"w+\", encoding=\"utf-8\") as f:\n\
          \            json_dump(evaluation_result_list, f, indent=2)\n\n    # TODO\
          \ autorag_run_artifact\n\n"
