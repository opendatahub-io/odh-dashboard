          \ for extraction largest-first.\n\n        Documents with unsupported extensions\
          \ are filtered out before any\n        downloads begin. Supported documents\
          \ are downloaded concurrently via a\n        thread pool. Once all downloads\
          \ complete, the local files are sorted by\n        size descending before\
          \ being submitted to the process pool. This ensures\n        the heaviest\
          \ documents are picked up by workers first, avoiding the\n        straggler\
          \ problem where one slow document blocks completion while other\n      \
          \  workers sit idle.\n\n        Args:\n            docs: List of document\
          \ descriptor dicts from the documents_descriptor JSON.\n            download_path:\
          \ Local temporary directory where downloaded files are stored.\n       \
          \     process_pool: Active multiprocessing Pool to submit extraction tasks\
          \ to.\n            out_dir: Directory where extracted Markdown files will\
          \ be written.\n\n        Returns:\n            - List of (local_file_path_str,\
          \ AsyncResult) pairs, one per successfully\n              downloaded and\
          \ submitted document, ordered largest-first.\n            - List of download\
          \ error dicts, each containing 'file' (S3 key) and\n              'traceback'\
          \ (full exception traceback string).\n        \"\"\"\n        download_error_details\
          \ = []\n        downloaded_paths = []\n        skipped_docs = [doc for doc\
          \ in docs if Path(doc[\"key\"]).suffix.lower() not in SUPPORTED_EXTENSIONS]\n\
          \        supported = [doc for doc in docs if Path(doc[\"key\"]).suffix.lower()\
          \ in SUPPORTED_EXTENSIONS]\n        if skipped_docs:\n            skipped_keys\
          \ = \", \".join(doc[\"key\"] for doc in skipped_docs)\n            logger.warning(\"\
          Skipping %d document(s) with unsupported extensions: %s\", len(skipped_docs),\
          \ skipped_keys)\n\n        with ThreadPoolExecutor(max_workers=DOWNLOAD_MAX_THREADS)\
          \ as dl_pool:\n            dl_futures = {dl_pool.submit(download_document,\
          \ doc, download_path): doc for doc in supported}\n            for dl_future\
          \ in as_completed(dl_futures):\n                doc = dl_futures[dl_future]\n\
          \                key = doc.get(\"key\", \"?\") if isinstance(doc, dict)\
          \ else \"?\"\n                try:\n                    local_path = dl_future.result()\n\
          \                except Exception as exc:\n                    exception_traceback\
          \ = \"\".join(traceback.format_exception(type(exc), exc, exc.__traceback__))\n\
          \                    logger.warning(\"Download failed for key=%s: %s\",\
          \ key, exc)\n                    download_error_details.append({\"file\"\
          : key, \"traceback\": exception_traceback})\n                    continue\n\
          \                downloaded_paths.append(local_path)\n\n        downloaded_paths.sort(key=lambda\
          \ p: p.stat().st_size, reverse=True)\n        extraction_tasks = [\n   \
          \         (str(local_path), process_pool.apply_async(worker_process_document,\
          \ (str(local_path), str(out_dir))))\n            for local_path in downloaded_paths\n\
          \        ]\n        return extraction_tasks, download_error_details\n\n\
          \    def raise_if_threshold_exceeded(error_details: list, total_docs: int,\
          \ tolerance: Optional[float]) -> None:\n        \"\"\"Check whether the\
          \ error count exceeds the allowed tolerance.\n\n        Called twice during\
          \ the pipeline run: once after downloads complete\n        (to abort before\
          \ extraction starts if too many files failed to\n        download) and once\
          \ after all extraction tasks finish (to report\n        the combined total).\n\
          \n        Args:\n            error_details: List of error dicts accumulated\
          \ so far, each with\n                'file' and 'traceback' keys.\n    \
          \        total_docs: Total number of documents in the original input, used\n\
          \                to compute the failure percentage.\n            tolerance:\
          \ Fraction of total_docs (0.0\u20131.0) that may fail without\n        \
          \        raising. None means zero tolerance \u2014 any error raises.\n\n\
          \        Raises:\n            RuntimeError: When the number of errors exceeds\
          \ the allowed count.\n        \"\"\"\n        n_errors = len(error_details)\n\
          \        if n_errors == 0:\n            return\n        allowed = 0 if tolerance\
          \ is None else int(tolerance * total_docs)\n        if n_errors <= allowed:\n\
          \            return\n        tolerance_str = \"0 (none allowed)\" if tolerance\
          \ is None else f\"{tolerance:.0%} of {total_docs}\"\n        shown = error_details[:10]\n\
          \        lines = [\n            f\"Text extraction failed: {n_errors}/{total_docs}\
          \ document(s) failed (tolerance: {tolerance_str}).\",\n            f\"Showing\
          \ {len(shown)} of {n_errors} error(s):\",\n        ]\n        for i, err\
          \ in enumerate(shown, 1):\n            tb_lines = err[\"traceback\"].strip().splitlines()\n\
          \            snippet = \"\\n    \".join(tb_lines[-5:])\n            lines.append(f\"\
          \\n  [{i}] {err['file']}\\n    {snippet}\")\n        raise RuntimeError(\"\
          \\n\".join(lines))\n\n    with open(descriptor_path) as f:\n        descriptor\
          \ = json.load(f)\n    bucket = descriptor[\"bucket\"]\n    documents = descriptor[\"\
          documents\"]\n\n    if not documents:\n        logger.info(\"No documents\
          \ to process.\")\n        return\n\n    documents = sorted(documents, key=lambda\
          \ d: d.get(\"size_bytes\", 0), reverse=True)\n\n    if max_extraction_workers\
          \ is not None:\n        effective_workers = max(1, max_extraction_workers)\n\
          \    else:\n        effective_workers = min(max(1, (os.cpu_count() or 1)\
          \ // 2), 8)\n    logger.info(\n        \"Starting text extraction for %d\
          \ documents. extraction_workers=%d, download_threads=%d.\",\n        len(documents),\n\
          \        effective_workers,\n        DOWNLOAD_MAX_THREADS,\n    )\n\n  \
          \  if _docling_artifacts_path() is not None:\n        os.environ.setdefault(\"\
          HF_HUB_OFFLINE\", \"1\")\n\n    multiprocessing_context = multiprocessing.get_context(\"\
          spawn\")\n    with (\n        tempfile.TemporaryDirectory() as download_dir,\n\
          \        multiprocessing_context.Pool(\n            processes=effective_workers,\n\
          \            initializer=_text_extraction_pool_initializer,\n        ) as\
          \ process_pool,\n    ):\n        download_start_time = time.perf_counter()\n\
          \        extraction_tasks, download_error_details = download_and_submit(\n\
          \            documents, Path(download_dir), process_pool, output_dir\n \
          \       )\n        logger.info(\n            \"Downloads finished in %.1fs;\
          \ %d file(s) queued for extraction, %d download error(s).\",\n         \
          \   time.perf_counter() - download_start_time,\n            len(extraction_tasks),\n\
          \            len(download_error_details),\n        )\n        raise_if_threshold_exceeded(download_error_details,\
          \ len(documents), error_tolerance)\n\n        extraction_error_details =\
          \ []\n        processed_count = 0\n        pending = list(extraction_tasks)\n\
          \        completed = 0\n        while pending:\n            still_pending\
          \ = []\n            for file_path, task in pending:\n                if\
          \ task.ready():\n                    completed += 1\n                  \
          \  try:\n                        success, tb = task.get()\n            \
          \        except Exception:\n                        tb = traceback.format_exc()\n\
          \                        logger.error(\"Worker crashed for %s:\\n%s\", file_path,\
          \ tb)\n                        success = False\n                    Path(file_path).unlink(missing_ok=True)\n\
          \                    if success:\n                        processed_count\
          \ += 1\n                    else:\n                        extraction_error_details.append({\"\
          file\": file_path, \"traceback\": tb})\n                    logger.info(\"\
          Extraction progress %d/%d\", completed, len(extraction_tasks))\n       \
          \         else:\n                    still_pending.append((file_path, task))\n\
          \            pending = still_pending\n            if pending:\n        \
          \        time.sleep(0.01)\n\n    all_error_details = download_error_details\
          \ + extraction_error_details\n    total_errors = len(all_error_details)\n\
          \    total_docs = len(documents)\n    logger.info(\n        \"Text extraction\
          \ completed. Total processed: %d/%d, Errors: %d\",\n        processed_count,\n\
          \        total_docs,\n        total_errors,\n    )\n    raise_if_threshold_exceeded(all_error_details,\
          \ total_docs, error_tolerance)\n\n"
        image: registry.redhat.io/rhoai/odh-autorag-rhel9@sha256:152c98afbf558367807d9dc0bd0a203a71936476039c7130eeecc079d0605cf2
        resources:
          cpuRequest: 2.0
          memoryRequest: 8.589934592
          resourceCpuRequest: '2'
          resourceMemoryRequest: 8Gi
pipelineInfo:
  description: Automated system for building and optimizing Retrieval-Augmented Generation
    (RAG) applications
  name: documents-rag-optimization-pipeline
root:
  dag:
    tasks:
      documents-discovery:
        cachingOptions: {}
        componentRef:
          name: comp-documents-discovery
        dependentTasks:
        - test-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            input_data_bucket_name:
              componentInputParameter: input_data_bucket_name
            input_data_path:
              componentInputParameter: input_data_key
        taskInfo:
          name: documents-discovery
      leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - rag-templates-optimization
        inputs:
          artifacts:
            rag_patterns:
              taskOutputArtifact:
                outputArtifactKey: rag_patterns
                producerTask: rag-templates-optimization
        taskInfo:
          name: leaderboard-evaluation
      prepare-responses-api-requests:
        cachingOptions: {}
        componentRef:
          name: comp-prepare-responses-api-requests
        dependentTasks:
        - rag-templates-optimization
        inputs:
          artifacts:
            rag_patterns:
              taskOutputArtifact:
                outputArtifactKey: rag_patterns
                producerTask: rag-templates-optimization
        taskInfo:
          name: prepare-responses-api-requests
      rag-templates-optimization:
        cachingOptions: {}
        componentRef:
          name: comp-rag-templates-optimization
        dependentTasks:
        - search-space-preparation
        - test-data-loader
        - text-extraction
        inputs:
          artifacts:
            extracted_text:
              taskOutputArtifact:
                outputArtifactKey: extracted_text
                producerTask: text-extraction
            search_space_prep_report:
              taskOutputArtifact:
                outputArtifactKey: search_space_prep_report
                producerTask: search-space-preparation
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            input_data_key:
              componentInputParameter: input_data_key
            llama_stack_vector_io_provider_id:
              componentInputParameter: llama_stack_vector_io_provider_id
            optimization_settings:
              runtimeValue:
                constant:
                  max_number_of_rag_patterns: '{{$.inputs.parameters[''pipelinechannel--optimization_max_rag_patterns'']}}'
                  metric: '{{$.inputs.parameters[''pipelinechannel--optimization_metric'']}}'
            pipelinechannel--optimization_max_rag_patterns:
              componentInputParameter: optimization_max_rag_patterns
            pipelinechannel--optimization_metric:
              componentInputParameter: optimization_metric
            test_data_key:
              componentInputParameter: test_data_key
        taskInfo:
          name: rag-templates-optimization
      search-space-preparation:
        cachingOptions: {}
        componentRef:
          name: comp-search-space-preparation
        dependentTasks:
        - test-data-loader
        - text-extraction
        inputs:
          artifacts:
            extracted_text:
              taskOutputArtifact:
                outputArtifactKey: extracted_text
                producerTask: text-extraction
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            embeddings_models:
              componentInputParameter: embeddings_models
            generation_models:
              componentInputParameter: generation_models
        taskInfo:
          name: search-space-preparation
      test-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-test-data-loader
        inputs:
          parameters:
            test_data_bucket_name:
              componentInputParameter: test_data_bucket_name
            test_data_path:
              componentInputParameter: test_data_key
        taskInfo:
          name: test-data-loader
      text-extraction:
        cachingOptions: {}
        componentRef:
          name: comp-text-extraction
        dependentTasks:
        - documents-discovery
        inputs:
          artifacts:
            documents_descriptor:
              taskOutputArtifact:
                outputArtifactKey: discovered_documents
                producerTask: documents-discovery
        taskInfo:
          name: text-extraction
  inputDefinitions:
    parameters:
      embeddings_models:
        description: Optional list of embedding model identifiers to use in the search
          space.
        isOptional: true
        parameterType: LIST
      generation_models:
        description: 'Optional list of foundation/generation model identifiers to
          use in the

          search space.'
        isOptional: true
        parameterType: LIST
      input_data_bucket_name:
        description: S3 (or compatible) bucket name for the input documents.
        parameterType: STRING
      input_data_key:
        defaultValue: ''
        description: Object key (path) of the input documents in the input data bucket.
        isOptional: true
        parameterType: STRING
      input_data_secret_name:
        description: 'Name of the Kubernetes secret holding S3-compatible credentials

          for input document data access. The following environment variables are
          required:

          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION.'
        parameterType: STRING
      llama_stack_secret_name:
        description: 'Name of the Kubernetes secret for llama-stack API connection.

          The secret must define: LLAMA_STACK_CLIENT_API_KEY, LLAMA_STACK_CLIENT_BASE_URL.'
        parameterType: STRING
      llama_stack_vector_io_provider_id:
        description: Vector I/O provider id (e.g., registered in llama-stack Milvus).
        parameterType: STRING
      optimization_max_rag_patterns:
        defaultValue: 8.0
        description: 'Maximum number of RAG patterns to generate. Passed to ai4rag

          (max_number_of_rag_patterns). Defaults to 8.'
        isOptional: true
        parameterType: NUMBER_INTEGER
      optimization_metric:
        defaultValue: faithfulness
        description: 'Quality metric used to optimize RAG patterns. Supported values:

          "faithfulness", "answer_correctness", "context_correctness".'
        isOptional: true
        parameterType: STRING
      test_data_bucket_name:
        description: S3 (or compatible) bucket name for the test data file.
        parameterType: STRING
      test_data_key:
        description: Object key (path) of the test data JSON file in the test data
          bucket.
        parameterType: STRING
      test_data_secret_name:
        description: 'Name of the Kubernetes secret holding S3-compatible credentials
          for

          test data access. The following environment variables are required:

          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION.'
        parameterType: STRING
