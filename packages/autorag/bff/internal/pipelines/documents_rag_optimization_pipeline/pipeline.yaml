          question section\": \"user question\",\n        }\n        normalized =\
          \ text\n        lowered = normalized.lower()\n        for source, target\
          \ in replacements.items():\n            idx = lowered.find(source)\n   \
          \         if idx >= 0:\n                normalized = normalized[:idx] +\
          \ target + normalized[idx + len(source) :]\n                lowered = normalized.lower()\n\
          \        return normalized.strip()\n\n    def _compose_instructions(generation:\
          \ dict) -> str:\n        \"\"\"Compose Responses API instructions from system/user\
          \ generation fields.\"\"\"\n        system_text = _normalize_system_message_for_file_search(generation.get(\"\
          system_message_text\"))\n        language_hint = _language_instruction_from_user_message(generation.get(\"\
          user_message_text\"))\n        if not system_text:\n            return default_instructions\n\
          \n        parts = [system_text]\n        lowered = system_text.lower()\n\
          \        if \"file_search\" not in lowered and \"retriev\" not in lowered:\n\
          \            parts.append(grounding_instruction)\n        if language_hint:\n\
          \            if \"same language as the user question\" not in lowered and\
          \ \"language of the question\" not in lowered:\n                parts.append(language_hint)\n\
          \        elif \"same language as the user question\" not in lowered and\
