          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef text_extraction(\n    documents_descriptor: dsl.Input[dsl.Artifact],\n\
          \    extracted_text: dsl.Output[dsl.Artifact],\n    error_tolerance: Optional[float]\
          \ = None,\n    max_extraction_workers: Optional[int] = None,\n):\n    \"\
          \"\"Text Extraction component.\n\n    Reads the documents_descriptor JSON\
          \ (from documents_discovery), fetches\n    the listed documents from S3,\
          \ and extracts text using the docling library.\n\n    Args:\n        documents_descriptor:\
          \ Input artifact containing\n            documents_descriptor.json with\
          \ bucket, prefix, and documents list.\n        extracted_text: Output artifact\
          \ where the extracted text content will be stored.\n        error_tolerance:\
          \ Fraction of documents (0.0\u20131.0) allowed to fail without\n       \
          \     raising an error. None (the default) means zero tolerance \u2014 any\
          \ failure\n            raises immediately after all documents are processed.\
          \ 0.1 means up to\n            10 % of documents may fail. Exceeding the\
          \ threshold raises RuntimeError\n            with a summary of up to 10\
          \ failing documents.\n        max_extraction_workers: Number of parallel\
          \ worker processes used for text\n            extraction. Each worker loads\
          \ a full docling DocumentConverter into memory\n            (ONNX models,\
          \ layout detection, etc.), so this should be kept low to avoid\n       \
          \     out-of-memory issues. Defaults to 4. Set to None to use all available\
          \ CPU\n            cores. Set to 1 to disable parallelism.\n    \"\"\"\n\
          \    import json\n    import logging\n    import os\n    import sys\n  \
          \  import tempfile\n    import time\n    import traceback\n    from concurrent.futures\
          \ import ThreadPoolExecutor, as_completed\n    from multiprocessing.pool\
          \ import AsyncResult\n    from pathlib import Path\n\n    import boto3\n\
          \    import multiprocess as multiprocessing\n    from botocore.exceptions\
          \ import SSLError\n\n    DOCUMENTS_DESCRIPTOR_FILENAME = \"documents_descriptor.json\"\
          \n    SUPPORTED_EXTENSIONS = {\".pdf\", \".docx\", \".pptx\", \".md\", \"\
          .html\", \".txt\"}\n    DOWNLOAD_MAX_THREADS = 8\n\n    descriptor_path\
          \ = Path(documents_descriptor.path) / DOCUMENTS_DESCRIPTOR_FILENAME\n  \
          \  if not descriptor_path.exists():\n        raise FileNotFoundError(f\"\
          documents_descriptor.json not found at {descriptor_path}\")\n\n    s3_creds\
          \ = {k: os.environ.get(k) for k in [\"AWS_ACCESS_KEY_ID\", \"AWS_SECRET_ACCESS_KEY\"\
          , \"AWS_S3_ENDPOINT\"]}\n    for k, v in s3_creds.items():\n        if v\
          \ is None:\n            raise ValueError(f\"{k} environment variable not\
          \ set. Check if kubernetes secret was configured properly.\")\n    s3_creds[\"\
          AWS_DEFAULT_REGION\"] = os.environ.get(\"AWS_DEFAULT_REGION\")\n\n    logger\
          \ = logging.getLogger(\"Text Extraction component logger\")\n    logger.setLevel(logging.INFO)\n\
          \    logger.propagate = False\n    if not logger.handlers:\n        handler\
          \ = logging.StreamHandler(sys.stdout)\n        logger.addHandler(handler)\n\
          \n    output_dir = Path(extracted_text.path)\n    output_dir.mkdir(parents=True,\
          \ exist_ok=True)\n\n    def make_s3_client(verify=True):\n        \"\"\"\
          Create a new boto3 S3 client from the environment credentials.\n\n     \
          \   A fresh client is created on every call so it is safe to use from\n\
          \        multiple threads without sharing state. Pass verify=False to skip\n\
          \        TLS certificate verification (used as a fallback when an SSLError\n\
          \        is encountered during download).\n        \"\"\"\n        session\
          \ = boto3.session.Session(\n            aws_access_key_id=s3_creds[\"AWS_ACCESS_KEY_ID\"\
          ],\n            aws_secret_access_key=s3_creds[\"AWS_SECRET_ACCESS_KEY\"\
          ],\n            region_name=s3_creds.get(\"AWS_DEFAULT_REGION\"),\n    \
          \    )\n        return session.client(\n            service_name=\"s3\"\
          ,\n            endpoint_url=s3_creds[\"AWS_S3_ENDPOINT\"],\n           \
          \ verify=verify,\n        )\n\n    def download_document(doc: dict, base_path:\
          \ Path) -> Path:\n        \"\"\"Download a single document from S3 to a\
          \ local path mirroring the S3 key structure.\n\n        On an SSLError the\
          \ download is retried once with certificate verification\n        disabled.\
          \ Any other exception propagates to the caller.\n\n        Args:\n     \
          \       doc: Document descriptor dict containing at least a \"key\" field\
          \ with\n                the S3 object key.\n            base_path: Local\
          \ directory under which the file is saved, preserving\n                the\
          \ S3 key as a relative sub-path.\n\n        Returns:\n            Path to\
          \ the downloaded local file.\n        \"\"\"\n        raw_key = doc[\"key\"\
          ]\n        safe_key = raw_key.strip().lstrip(\"/\")\n        rel = Path(safe_key)\n\
          \        if not safe_key or rel.is_absolute() or \"..\" in rel.parts:\n\
          \            raise ValueError(f\"Unsafe S3 key (path traversal): {raw_key!r}\"\
          )\n        local_path = (base_path / rel).resolve()\n        base_resolved\
          \ = base_path.resolve()\n        if not local_path.is_relative_to(base_resolved):\n\
          \            raise ValueError(f\"Unsafe S3 key (escapes download directory):\
          \ {raw_key!r}\")\n        local_path.parent.mkdir(parents=True, exist_ok=True)\n\
          \        _dl_t0 = time.perf_counter()\n        logger.info(\"Downloading\
          \ %s\", raw_key)\n        try:\n            make_s3_client().download_file(bucket,\
          \ raw_key, str(local_path))\n        except SSLError:\n            logger.warning(\"\
          SSL error when downloading %s, retrying with verify=False\", raw_key)\n\
          \            make_s3_client(verify=False).download_file(bucket, raw_key,\
          \ str(local_path))\n        logger.info(\"Download finished %s (%.1fs)\"\
          , raw_key, time.perf_counter() - _dl_t0)\n        return local_path\n\n\
          \    def _docling_artifacts_path() -> Optional[Path]:\n        \"\"\"Local\
          \ Docling models root (contains docling-project--* dirs). Set via image\
          \ ENV for offline use.\n\n        Returns the path only when it exists and\
          \ contains at least one model\n        directory. If the path is missing\
          \ or empty, returns None so that\n        docling falls back to downloading\
          \ models from HuggingFace.\n        \"\"\"\n        raw = os.environ.get(\"\
          DOCLING_ARTIFACTS_PATH\")\n        if not raw:\n            logger.info(\"\
          DOCLING_ARTIFACTS_PATH not set \u2014 models will be downloaded from HuggingFace.\"\
          )\n            return None\n        p = Path(raw)\n        if not p.is_dir()\
          \ or not any(p.iterdir()):\n            logger.warning(\n              \
          \  \"DOCLING_ARTIFACTS_PATH=%s is set but the directory is missing or empty\
          \ \"\n                \"\u2014 falling back to HuggingFace model download.\"\
          ,\n                raw,\n            )\n            return None\n      \
          \  logger.info(\"Using local Docling artifacts from %s\", p)\n        return\
          \ p\n\n    def _build_docling_format_options():\n        \"\"\"Shared pipeline\
          \ options for main-process warmup and worker processes (spawn-safe: module-level).\"\
          \"\"\n        from docling.datamodel.accelerator_options import AcceleratorOptions\n\
          \        from docling.datamodel.base_models import InputFormat\n       \
          \ from docling.datamodel.pipeline_options import PaginatedPipelineOptions,\
          \ ThreadedPdfPipelineOptions\n        from docling.document_converter import\
          \ (\n            HTMLFormatOption,\n            MarkdownFormatOption,\n\
          \            PdfFormatOption,\n            PowerpointFormatOption,\n   \
          \         WordFormatOption,\n        )\n\n        ap = _docling_artifacts_path()\n\
          \        pdf_pipeline_options = ThreadedPdfPipelineOptions(\n          \
          \  artifacts_path=ap,\n            do_ocr=False,\n            do_table_structure=False,\n\
          \            accelerator_options=AcceleratorOptions(device=\"cpu\", num_threads=2),\n\
          \        )\n        paginated_pipeline_options = PaginatedPipelineOptions(\n\
          \            artifacts_path=ap,\n            generate_page_images=False,\n\
          \            accelerator_options=AcceleratorOptions(device=\"cpu\", num_threads=2),\n\
          \        )\n        return {\n            InputFormat.PDF: PdfFormatOption(pipeline_options=pdf_pipeline_options),\n\
          \            InputFormat.DOCX: WordFormatOption(pipeline_options=paginated_pipeline_options),\n\
          \            InputFormat.PPTX: PowerpointFormatOption(pipeline_options=paginated_pipeline_options),\n\
          \            InputFormat.HTML: HTMLFormatOption(),\n            InputFormat.MD:\
          \ MarkdownFormatOption(),\n        }\n\n    def _text_extraction_pool_initializer()\
          \ -> None:\n        \"\"\"Pool initializer (top-level for multiprocessing\
          \ spawn pickling).\"\"\"\n        import time\n\n        os.environ[\"TQDM_DISABLE\"\
          ] = \"1\"\n        os.environ.setdefault(\"OPENBLAS_NUM_THREADS\", \"1\"\
          )\n        os.environ.setdefault(\"MKL_NUM_THREADS\", \"1\")\n        os.environ.setdefault(\"\
          OMP_NUM_THREADS\", \"1\")\n\n        if _docling_artifacts_path() is not\
          \ None:\n            os.environ.setdefault(\"HF_HUB_OFFLINE\", \"1\")\n\n\
          \        from docling.document_converter import DocumentConverter\n\n  \
          \      worker_log = logging.getLogger(\"text_extraction_worker\")\n    \
          \    worker_log.setLevel(logging.INFO)\n        worker_log.propagate = False\n\
          \        if not worker_log.handlers:\n            worker_log.addHandler(logging.StreamHandler(sys.stdout))\n\
          \n        worker_pid = os.getpid()\n        init_start_time = time.perf_counter()\n\
          \        worker_log.debug(\"Worker pid=%s: loading DocumentConverter.\"\
          , worker_pid)\n\n        mod = sys.modules[__name__]\n        mod._mp_worker_converter\
          \ = DocumentConverter(format_options=_build_docling_format_options())\n\
          \        worker_log.debug(\n            \"Worker pid=%s: DocumentConverter\
          \ ready (%.1fs)\",\n            worker_pid,\n            time.perf_counter()\
          \ - init_start_time,\n        )\n\n    def worker_process_document(file_path_str:\
          \ str, output_dir_str: str) -> tuple[bool, str | None]:\n        \"\"\"\
          Convert a single document to Markdown and write it to the output directory.\n\
          \n        Plain-text (.txt) files are copied as-is without invoking docling.\n\
          \        All other supported formats are converted via the DocumentConverter\n\
          \        that was created by the multiprocessing pool initializer in this\
          \ process.\n\n        Args:\n            file_path_str: Absolute path to\
          \ the local input file.\n            output_dir_str: Absolute path to the\
          \ directory where the resulting\n                Markdown file will be written\
          \ (named <original_filename>.md).\n\n        Returns:\n            (True,\
          \ None) on success; (False, error_message) on failure where\n          \
          \  error_message is either a full traceback string or a plain description.\n\
          \        \"\"\"\n        worker_log = logging.getLogger(\"text_extraction_worker\"\
          )\n        start_time = time.perf_counter()\n        try:\n            input_file\
          \ = Path(file_path_str)\n            output_dir = Path(output_dir_str)\n\
          \            output_file = output_dir / f\"{input_file.name}.md\"\n    \
          \        if input_file.suffix.lower() == \".txt\":\n                output_file.write_text(input_file.read_text(encoding=\"\
          utf-8\"), encoding=\"utf-8\")\n                return True, None\n\n   \
          \         converter = getattr(sys.modules[__name__], \"_mp_worker_converter\"\
          , None)\n            if converter is None:\n                error_message\
          \ = (\n                    f\"Worker pid={os.getpid()} has no DocumentConverter.\
          \ \"\n                    \"Pool initializer did not run or failed before\
          \ setting _mp_worker_converter. \"\n                )\n                return\
          \ False, error_message\n\n            file_size_mib = input_file.stat().st_size\
          \ / (1024 * 1024) if input_file.exists() else 0.0\n            worker_log.info(\n\
          \                \"pid=%s docling convert start: %s (%.1f MiB on disk)\"\
          , os.getpid(), input_file.name, file_size_mib\n            )\n         \
          \   conversion_result = converter.convert(input_file)\n            output_file.write_text(conversion_result.document.export_to_markdown(),\
          \ encoding=\"utf-8\")\n            worker_log.info(\n                \"\
          pid=%s docling convert done: %s -> %s (%.1fs)\",\n                os.getpid(),\n\
          \                input_file.name,\n                output_file.name,\n \
          \               time.perf_counter() - start_time,\n            )\n     \
          \       return True, None\n        except Exception:\n            error_traceback\
          \ = traceback.format_exc()\n            worker_log.error(\"Failed to process\
          \ %s:\\n%s\", file_path_str, error_traceback)\n            return False,\
          \ error_traceback\n\n    def download_and_submit(\n        docs: list, download_path:\
          \ Path, process_pool, out_dir: Path\n    ) -> tuple[list[tuple[str, AsyncResult]],\
          \ list[dict]]:\n        \"\"\"Download all documents from S3, then submit\
          \ for extraction largest-first.\n\n        Documents with unsupported extensions\
          \ are filtered out before any\n        downloads begin. Supported documents\
          \ are downloaded concurrently via a\n        thread pool. Once all downloads\
          \ complete, the local files are sorted by\n        size descending before\
          \ being submitted to the process pool. This ensures\n        the heaviest\
          \ documents are picked up by workers first, avoiding the\n        straggler\
          \ problem where one slow document blocks completion while other\n      \
          \  workers sit idle.\n\n        Args:\n            docs: List of document\
          \ descriptor dicts from the documents_descriptor JSON.\n            download_path:\
          \ Local temporary directory where downloaded files are stored.\n       \
          \     process_pool: Active multiprocessing Pool to submit extraction tasks\
          \ to.\n            out_dir: Directory where extracted Markdown files will\
          \ be written.\n\n        Returns:\n            - List of (local_file_path_str,\
          \ AsyncResult) pairs, one per successfully\n              downloaded and\
          \ submitted document, ordered largest-first.\n            - List of download\
          \ error dicts, each containing 'file' (S3 key) and\n              'traceback'\
          \ (full exception traceback string).\n        \"\"\"\n        download_error_details\
          \ = []\n        downloaded_paths = []\n        skipped_docs = [doc for doc\
          \ in docs if Path(doc[\"key\"]).suffix.lower() not in SUPPORTED_EXTENSIONS]\n\
          \        supported = [doc for doc in docs if Path(doc[\"key\"]).suffix.lower()\
          \ in SUPPORTED_EXTENSIONS]\n        if skipped_docs:\n            skipped_keys\
          \ = \", \".join(doc[\"key\"] for doc in skipped_docs)\n            logger.warning(\"\
          Skipping %d document(s) with unsupported extensions: %s\", len(skipped_docs),\
          \ skipped_keys)\n\n        with ThreadPoolExecutor(max_workers=DOWNLOAD_MAX_THREADS)\
          \ as dl_pool:\n            dl_futures = {dl_pool.submit(download_document,\
          \ doc, download_path): doc for doc in supported}\n            for dl_future\
          \ in as_completed(dl_futures):\n                doc = dl_futures[dl_future]\n\
          \                key = doc.get(\"key\", \"?\") if isinstance(doc, dict)\
          \ else \"?\"\n                try:\n                    local_path = dl_future.result()\n\
          \                except Exception as exc:\n                    exception_traceback\
          \ = \"\".join(traceback.format_exception(type(exc), exc, exc.__traceback__))\n\
          \                    logger.warning(\"Download failed for key=%s: %s\",\
          \ key, exc)\n                    download_error_details.append({\"file\"\
          : key, \"traceback\": exception_traceback})\n                    continue\n\
          \                downloaded_paths.append(local_path)\n\n        downloaded_paths.sort(key=lambda\
          \ p: p.stat().st_size, reverse=True)\n        extraction_tasks = [\n   \
          \         (str(local_path), process_pool.apply_async(worker_process_document,\
          \ (str(local_path), str(out_dir))))\n            for local_path in downloaded_paths\n\
          \        ]\n        return extraction_tasks, download_error_details\n\n\
          \    def raise_if_threshold_exceeded(error_details: list, total_docs: int,\
          \ tolerance: Optional[float]) -> None:\n        \"\"\"Check whether the\
          \ error count exceeds the allowed tolerance.\n\n        Called twice during\
          \ the pipeline run: once after downloads complete\n        (to abort before\
          \ extraction starts if too many files failed to\n        download) and once\
          \ after all extraction tasks finish (to report\n        the combined total).\n\
          \n        Args:\n            error_details: List of error dicts accumulated\
          \ so far, each with\n                'file' and 'traceback' keys.\n    \
          \        total_docs: Total number of documents in the original input, used\n\
          \                to compute the failure percentage.\n            tolerance:\
          \ Fraction of total_docs (0.0\u20131.0) that may fail without\n        \
          \        raising. None means zero tolerance \u2014 any error raises.\n\n\
          \        Raises:\n            RuntimeError: When the number of errors exceeds\
          \ the allowed count.\n        \"\"\"\n        n_errors = len(error_details)\n\
          \        if n_errors == 0:\n            return\n        allowed = 0 if tolerance\
          \ is None else int(tolerance * total_docs)\n        if n_errors <= allowed:\n\
          \            return\n        tolerance_str = \"0 (none allowed)\" if tolerance\
          \ is None else f\"{tolerance:.0%} of {total_docs}\"\n        shown = error_details[:10]\n\
          \        lines = [\n            f\"Text extraction failed: {n_errors}/{total_docs}\
          \ document(s) failed (tolerance: {tolerance_str}).\",\n            f\"Showing\
          \ {len(shown)} of {n_errors} error(s):\",\n        ]\n        for i, err\
          \ in enumerate(shown, 1):\n            tb_lines = err[\"traceback\"].strip().splitlines()\n\
          \            snippet = \"\\n    \".join(tb_lines[-5:])\n            lines.append(f\"\
          \\n  [{i}] {err['file']}\\n    {snippet}\")\n        raise RuntimeError(\"\
          \\n\".join(lines))\n\n    with open(descriptor_path) as f:\n        descriptor\
          \ = json.load(f)\n    bucket = descriptor[\"bucket\"]\n    documents = descriptor[\"\
          documents\"]\n\n    if not documents:\n        logger.info(\"No documents\
          \ to process.\")\n        return\n\n    documents = sorted(documents, key=lambda\
          \ d: d.get(\"size_bytes\", 0), reverse=True)\n\n    if max_extraction_workers\
          \ is not None:\n        effective_workers = max(1, max_extraction_workers)\n\
          \    else:\n        effective_workers = min(max(1, (os.cpu_count() or 1)\
          \ // 2), 8)\n    logger.info(\n        \"Starting text extraction for %d\
          \ documents. extraction_workers=%d, download_threads=%d.\",\n        len(documents),\n\
          \        effective_workers,\n        DOWNLOAD_MAX_THREADS,\n    )\n\n  \
          \  if _docling_artifacts_path() is not None:\n        os.environ.setdefault(\"\
          HF_HUB_OFFLINE\", \"1\")\n\n    multiprocessing_context = multiprocessing.get_context(\"\
          spawn\")\n    with (\n        tempfile.TemporaryDirectory() as download_dir,\n\
          \        multiprocessing_context.Pool(\n            processes=effective_workers,\n\
          \            initializer=_text_extraction_pool_initializer,\n        ) as\
          \ process_pool,\n    ):\n        download_start_time = time.perf_counter()\n\
          \        extraction_tasks, download_error_details = download_and_submit(\n\
          \            documents, Path(download_dir), process_pool, output_dir\n \
          \       )\n        logger.info(\n            \"Downloads finished in %.1fs;\
          \ %d file(s) queued for extraction, %d download error(s).\",\n         \
          \   time.perf_counter() - download_start_time,\n            len(extraction_tasks),\n\
          \            len(download_error_details),\n        )\n        raise_if_threshold_exceeded(download_error_details,\
          \ len(documents), error_tolerance)\n\n        extraction_error_details =\
          \ []\n        processed_count = 0\n        pending = list(extraction_tasks)\n\
          \        completed = 0\n        while pending:\n            still_pending\
          \ = []\n            for file_path, task in pending:\n                if\
          \ task.ready():\n                    completed += 1\n                  \
          \  try:\n                        success, tb = task.get()\n            \
          \        except Exception:\n                        tb = traceback.format_exc()\n\
          \                        logger.error(\"Worker crashed for %s:\\n%s\", file_path,\
          \ tb)\n                        success = False\n                    Path(file_path).unlink(missing_ok=True)\n\
          \                    if success:\n                        processed_count\
          \ += 1\n                    else:\n                        extraction_error_details.append({\"\
          file\": file_path, \"traceback\": tb})\n                    logger.info(\"\
          Extraction progress %d/%d\", completed, len(extraction_tasks))\n       \
          \         else:\n                    still_pending.append((file_path, task))\n\
          \            pending = still_pending\n            if pending:\n        \
          \        time.sleep(0.01)\n\n    all_error_details = download_error_details\
          \ + extraction_error_details\n    total_errors = len(all_error_details)\n\
          \    total_docs = len(documents)\n    logger.info(\n        \"Text extraction\
          \ completed. Total processed: %d/%d, Errors: %d\",\n        processed_count,\n\
          \        total_docs,\n        total_errors,\n    )\n    raise_if_threshold_exceeded(all_error_details,\
          \ total_docs, error_tolerance)\n\n"
        image: quay.io/opendatahub/odh-autorag:odh-stable
        resources:
          cpuLimit: 32.0
          cpuRequest: 2.0
          memoryLimit: 68.719476736
          memoryRequest: 8.589934592
          resourceCpuLimit: '32'
          resourceCpuRequest: '2'
          resourceMemoryLimit: 64Gi
          resourceMemoryRequest: 8Gi
pipelineInfo:
  description: AutoRAG pipeline for building high-quality RAG applications from your
    documents with minimal configuration. Powered by ai4rag, it explores and optimizes
    retrieval and generation design choices against your quality goals. Delivers ranked,
    production-ready patterns, OGX deployment payloads, and a leaderboard of the best
    configurations.
  name: documents-rag-optimization-pipeline
root:
  dag:
    tasks:
      documents-discovery:
        cachingOptions: {}
        componentRef:
          name: comp-documents-discovery
        dependentTasks:
        - test-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            input_data_bucket_name:
              componentInputParameter: input_data_bucket_name
            input_data_path:
              componentInputParameter: input_data_key
        taskInfo:
          name: documents-discovery
      leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - rag-templates-optimization
        inputs:
          artifacts:
            rag_patterns:
              taskOutputArtifact:
                outputArtifactKey: rag_patterns
                producerTask: rag-templates-optimization
        taskInfo:
          name: leaderboard-evaluation
      rag-templates-optimization:
        cachingOptions: {}
        componentRef:
          name: comp-rag-templates-optimization
        dependentTasks:
        - search-space-preparation
        - test-data-loader
        - text-extraction
        inputs:
          artifacts:
            extracted_text:
              taskOutputArtifact:
                outputArtifactKey: extracted_text
                producerTask: text-extraction
            search_space_prep_report:
              taskOutputArtifact:
                outputArtifactKey: search_space_prep_report
                producerTask: search-space-preparation
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            input_data_key:
              componentInputParameter: input_data_key
            optimization_settings:
              runtimeValue:
                constant:
                  max_number_of_rag_patterns: '{{$.inputs.parameters[''pipelinechannel--optimization_max_rag_patterns'']}}'
                  metric: '{{$.inputs.parameters[''pipelinechannel--optimization_metric'']}}'
            pipelinechannel--optimization_max_rag_patterns:
              componentInputParameter: optimization_max_rag_patterns
            pipelinechannel--optimization_metric:
              componentInputParameter: optimization_metric
            test_data_key:
              componentInputParameter: test_data_key
            vector_io_provider_id:
              componentInputParameter: vector_io_provider_id
        taskInfo:
          name: rag-templates-optimization
      search-space-preparation:
        cachingOptions: {}
        componentRef:
          name: comp-search-space-preparation
        dependentTasks:
        - test-data-loader
        - text-extraction
        inputs:
          artifacts:
            extracted_text:
              taskOutputArtifact:
                outputArtifactKey: extracted_text
                producerTask: text-extraction
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            embedding_models:
              componentInputParameter: embedding_models
            generation_models:
              componentInputParameter: generation_models
        taskInfo:
          name: search-space-preparation
      test-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-test-data-loader
        inputs:
          parameters:
            test_data_bucket_name:
              componentInputParameter: test_data_bucket_name
            test_data_path:
              componentInputParameter: test_data_key
        taskInfo:
          name: test-data-loader
      text-extraction:
        cachingOptions: {}
        componentRef:
          name: comp-text-extraction
        dependentTasks:
        - documents-discovery
        inputs:
          artifacts:
            documents_descriptor:
              taskOutputArtifact:
                outputArtifactKey: discovered_documents
                producerTask: documents-discovery
        taskInfo:
          name: text-extraction
  inputDefinitions:
    parameters:
      embedding_models:
        description: Optional list of embedding model identifiers to use in the search
          space.
        isOptional: true
        parameterType: LIST
      generation_models:
        description: 'Optional list of foundation/generation model identifiers to
          use in the

          search space.'
        isOptional: true
        parameterType: LIST
      input_data_bucket_name:
        description: S3 (or compatible) bucket name for the input documents.
        parameterType: STRING
      input_data_key:
        defaultValue: ''
        description: Object key (path) of the input documents in the input data bucket.
        isOptional: true
        parameterType: STRING
      input_data_secret_name:
        description: 'Name of the Kubernetes secret holding S3-compatible credentials

          for input document data access. The following environment variables are
          required:

          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT.

          AWS_DEFAULT_REGION is optional.'
        parameterType: STRING
      ogx_secret_name:
        description: 'Name of the Kubernetes secret for OGX API connection.

          The secret must define: OGX_CLIENT_API_KEY, OGX_CLIENT_BASE_URL.'
        parameterType: STRING
      optimization_max_rag_patterns:
        defaultValue: 8.0
        description: 'Maximum number of RAG patterns to generate. Passed to ai4rag

          (max_number_of_rag_patterns). Defaults to 8.'
        isOptional: true
        parameterType: NUMBER_INTEGER
      optimization_metric:
        defaultValue: faithfulness
        description: 'Quality metric used to optimize RAG patterns. Supported values:

          "faithfulness", "answer_correctness", "context_correctness".'
        isOptional: true
        parameterType: STRING
      test_data_bucket_name:
        description: S3 (or compatible) bucket name for the test data file.
        parameterType: STRING
      test_data_key:
        description: Object key (path) of the test data JSON file in the test data
          bucket.
        parameterType: STRING
      test_data_secret_name:
        description: 'Name of the Kubernetes secret holding S3-compatible credentials
          for

          test data access. The following environment variables are required:

          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT.

          AWS_DEFAULT_REGION is optional.'
        parameterType: STRING
      vector_io_provider_id:
        description: Vector I/O provider id (e.g., registered in OGX Milvus).
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-documents-discovery:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: input_data_secret_name
        exec-rag-templates-optimization:
          secretAsEnv:
          - keyToEnv:
            - envVar: OGX_CLIENT_BASE_URL
              secretKey: OGX_CLIENT_BASE_URL
            - envVar: OGX_CLIENT_API_KEY
              secretKey: OGX_CLIENT_API_KEY
            optional: false
            secretNameParameter:
              componentInputParameter: ogx_secret_name
        exec-search-space-preparation:
          secretAsEnv:
          - keyToEnv:
            - envVar: OGX_CLIENT_BASE_URL
              secretKey: OGX_CLIENT_BASE_URL
            - envVar: OGX_CLIENT_API_KEY
              secretKey: OGX_CLIENT_API_KEY
            optional: false
            secretNameParameter:
              componentInputParameter: ogx_secret_name
        exec-test-data-loader:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: test_data_secret_name
        exec-text-extraction:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: true
            secretNameParameter:
              componentInputParameter: input_data_secret_name
