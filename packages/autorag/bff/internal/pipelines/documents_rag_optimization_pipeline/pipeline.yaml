        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef test_data_loader(\n    test_data_bucket_name: str,\n    test_data_path:\
          \ str,\n    benchmark_sample_size: int = 25,\n    test_data: dsl.Output[dsl.Artifact]\
          \ = None,\n):\n    \"\"\"Download test data JSON from S3 and sample it for\
          \ benchmarking.\n\n    The component reads S3-compatible credentials from\
          \ environment variables\n    (injected by the pipeline from a Kubernetes\
          \ secret), downloads a JSON\n    test data file, and randomly samples up\
          \ to ``benchmark_sample_size``\n    records to limit evaluation cost in\
          \ downstream components.\n\n    Args:\n        test_data_bucket_name: S3\
          \ (or compatible) bucket that contains the test\n            data file.\n\
          \        test_data_path: S3 object key to the JSON test data file.\n   \
          \     benchmark_sample_size: Maximum number of records to keep from the\
          \ test\n            data. When the dataset exceeds this limit, a reproducible\
          \ random\n            sample is drawn (seed 42). Set to 0 to disable sampling\
          \ and keep\n            all records.\n        test_data: Output artifact\
          \ that receives the (possibly sampled) file.\n\n    Environment variables\
          \ (required when run with pipeline secret injection):\n        AWS_ACCESS_KEY_ID,\
          \ AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT.\n        AWS_DEFAULT_REGION is\
          \ optional.\n\n    Raises:\n        ValueError: If S3 credentials are missing\
          \ or misconfigured.\n        Exception: If the download fails or the path\
          \ is not a JSON file.\n    \"\"\"\n    import json\n    import logging\n\
          \    import os\n    import sys\n\n    import boto3\n    from botocore.exceptions\
          \ import ClientError, SSLError\n\n    logger = logging.getLogger(\"Test\
          \ Data Loader component logger\")\n    logger.setLevel(logging.INFO)\n \
          \   if not logger.handlers:\n        handler = logging.StreamHandler(sys.stdout)\n\
          \        logger.addHandler(handler)\n\n    if not test_data_bucket_name:\n\
          \        raise TypeError(\"test_data_bucket_name must be a non-empty string\"\
          )\n\n    benchmark_record_keys = {\"question\", \"correct_answers\", \"\
