          \            Request bodies use ``RESPONSES_BODY_DEFAULT_QUESTION`` as the\
          \ placeholder user message;\n            the interactive script replaces\
          \ it when you run it locally.\n    \"\"\"\n    import json\n    import os\n\
          \    from pathlib import Path\n\n    # Fixed placeholder question embedded\
