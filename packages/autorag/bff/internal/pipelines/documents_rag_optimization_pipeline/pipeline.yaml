        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef prepare_responses_api_requests(\n    rag_patterns: dsl.InputPath(dsl.Artifact),\n\
          \    responses_api_artifacts: dsl.Output[dsl.Artifact],\n):\n    \"\"\"\
          Emit one Llama Stack ``POST /v1/responses`` JSON body per RAG pattern directory.\n\
