# testManifestLinks.cy.ts Test Data #
#
# This test validates URLs found in manifest YAML files.
# It uses tiered timeouts:
#   - Internal domains (*.redhat.com): 5s
#   - Normal external URLs: 15s
#   - Known slow domains (catalog.redhat.com, etc.): 30s
#
# To skip this test in fast CI runs, set: SKIP_EXTERNAL_URL_VALIDATION=true
#
excludedSubstrings:
  - my-project-s2i-python-service
  - clusterip/
  - ClusterIP
  - s2i-python-service
  - user-dev-rhoam-quarkus
  - project-simple
  - example.apps
  - localhost
  - console-openshift-console.apps.test-cluster.example.com/
  - console-openshift-console.apps.test-cluster.example.com
  - figma.com/figma/ns
  - scikit-learn.org/stable/getting_started.html
  - 2Fopentracker
  - 2Ftracker.openbittorrent
  - ww3.
  - www3.
  - w3.org
