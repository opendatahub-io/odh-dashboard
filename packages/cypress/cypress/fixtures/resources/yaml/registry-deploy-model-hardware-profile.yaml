apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: cypress-registry-deploy-model-hwp
  annotations:
    opendatahub.io/dashboard-feature-visibility: '["model-serving"]'
spec:
  displayName: cypress-registry-deploy-model-hwp
  description: 'Hardware profile for testRegistryDeployModel.cy.ts'
  enabled: true
  identifiers:
    - defaultCount: 6
      displayName: CPU
      identifier: cpu
      maxCount: 8
      minCount: 100m
      resourceType: CPU
    - defaultCount: 14Gi
      displayName: Memory
      identifier: memory
      maxCount: 16Gi
      minCount: 10Gi
      resourceType: Memory
