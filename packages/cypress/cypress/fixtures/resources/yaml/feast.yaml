kind: Secret
apiVersion: v1
metadata:
  name: s3-credentials-secret
  namespace: ${namespace}
stringData:
  AWS_ACCESS_KEY_ID: ${awsAccessKey}
  AWS_SECRET_ACCESS_KEY: ${awsSecretKey}
  AWS_DEFAULT_REGION: ${awsDefaultRegion}
---
kind: Secret
apiVersion: v1
metadata:
  name: feast-online-store-secret
  namespace: ${namespace}
stringData:
  dynamodb: |
    type: dynamodb
    region: ${awsDefaultRegion}
---
apiVersion: feast.dev/v1
kind: FeatureStore
metadata:
  name: test-s3
  namespace: ${namespace}
  labels:
    feature-store-ui: enabled
spec:
  feastProject: credit_scoring_local
  services:
    onlineStore:
      persistence:
        store:
          type: dynamodb
          secretRef:
            name: feast-online-store-secret
      server:
        envFrom:
          - secretRef:
              name: s3-credentials-secret
    registry:
      local:
        persistence:
          file:
            path: s3://${awsBucketName}/feast-test/credit_scoring_local/registry.pb
        server:
          envFrom:
          - secretRef:
              name: s3-credentials-secret
          grpc: true
          restAPI: true
