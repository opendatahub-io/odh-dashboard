apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{SERVICE_ACCOUNT_NAME}}
  namespace: {{NAMESPACE}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{CLUSTER_ROLE_BINDING_NAME}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: {{SERVICE_ACCOUNT_NAME}}
    namespace: {{NAMESPACE}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{CONFIG_MAP_NAME}}
  namespace: {{NAMESPACE}}
data:
  config.toml: |
    log_level = 2
    read_only = true
    toolsets = ["core", "config"]
    port = "8080"
