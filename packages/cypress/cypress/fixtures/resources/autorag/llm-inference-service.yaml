apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: autorag-llm
  labels:
    opendatahub.io/dashboard: 'true'
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: autorag-vllm-cpu-runtime
      storageUri: '{{LLM_MODEL_URI}}'
    resources:
      requests:
        cpu: '1'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 12Gi
