apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: autorag-vllm-cpu-runtime
  labels:
    opendatahub.io/dashboard: 'true'
  annotations:
    openshift.io/display-name: AutoRAG vLLM CPU Runtime
    opendatahub.io/apiProtocol: REST
spec:
  containers:
    - name: kserve-container
      image: '{{VLLM_CPU_IMAGE}}'
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: '1'
          memory: 8Gi
        limits:
          cpu: '4'
          memory: 12Gi
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
