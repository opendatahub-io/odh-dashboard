apiVersion: v1
kind: ConfigMap
metadata:
  name: milvus-config
  labels:
    app: milvus
data:
  embedEtcd.yaml: |
    listen-client-urls: http://0.0.0.0:2379
    advertise-client-urls: http://0.0.0.0:2379
    quota-backend-bytes: 4294967296
    auto-compaction-mode: revision
    auto-compaction-retention: '1000'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  labels:
    app: milvus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
        - name: milvus
          image: '{{MILVUS_IMAGE}}'
          command: ['milvus', 'run', 'standalone']
          ports:
            - containerPort: 19530
              name: grpc
            - containerPort: 9091
              name: health
          env:
            - name: ETCD_USE_EMBED
              value: 'true'
            - name: ETCD_DATA_DIR
              value: /var/lib/milvus/etcd
            - name: ETCD_CONFIG_PATH
              value: /milvus/configs/embedEtcd.yaml
            - name: COMMON_STORAGETYPE
              value: local
          resources:
            requests:
              cpu: '1'
              memory: 2Gi
            limits:
              cpu: '2'
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
            - name: etcd-config
              mountPath: /milvus/configs/embedEtcd.yaml
              subPath: embedEtcd.yaml
      volumes:
        - name: data
          emptyDir: {}
        - name: etcd-config
          configMap:
            name: milvus-config
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  labels:
    app: milvus
spec:
  type: ClusterIP
  ports:
    - port: 19530
      targetPort: 19530
      protocol: TCP
      name: grpc
  selector:
    app: milvus
