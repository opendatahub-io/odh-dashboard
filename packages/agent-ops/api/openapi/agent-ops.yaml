openapi: 3.0.3
info:
  title: Agent Ops REST API
  version: 1.0.0
  description: REST API Agent Ops BFF
  license:
    name: Apache 2.0
    url: "https://www.apache.org/licenses/LICENSE-2.0"
servers:
  - url: "https://localhost:8080"
  - url: "http://localhost:8080"
paths:
  /healthcheck:
    summary: Path targeted for healthcheck purposes.
    description: >-
      The REST endpoint/path used to allow a healthcheck update.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/HealthCheckResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: healthcheck
      summary: HealthCheck
      description: HealthCheck endpoint.
  /api/v1/namespaces:
    summary: Path used to get available namespaces.
    description: >-
      The REST endpoint/path used to list available namespaces.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          description: "Ok"
          content:
            application/json:
              schema:
                type: object
                properties:
                  metadata:
                    type: object
                    description: Metadata about the response
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                        example: default-namespace
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getNamespaces
      summary: Get Available Namespaces
      description: Returns available namespaces in the cluster.
  /api/v1/user:
    summary: Path used to Retrieve a user based on the header.
    description: >-
      The REST endpoint/path used pass all the config information needed for the UI.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getConfig
      summary: Get configuration info
      description: Gets the configuration information needed for the UI [TBD]
  /api/v1/agents/runtimes:
    summary: List deployed agent runtimes.
    description: >-
      Returns deployed agents and tools with runtime status and endpoint details.
    get:
      tags:
        - AgentOperation
      parameters:
        - name: namespace
          in: query
          required: false
          description: >-
            Kubernetes namespace to scope results to. When provided, only agents
            from this namespace are returned. When omitted, agents from all
            enabled namespaces are returned.
          schema:
            type: string
            pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
            maxLength: 63
        - name: limit
          in: query
          required: false
          description: Maximum number of runtimes to return.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: continueToken
          in: query
          required: false
          description: Opaque token for the next page of runtime results.
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/AgentRuntimesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: listAgentRuntimes
      summary: List agent runtimes
      description: Returns deployed agent and tool runtimes.
  /api/v1/agents/runtimes/{ns}/{name}:
    summary: Get agent runtime detail.
    description: >-
      Returns full agent detail, runtime info, workload status, service endpoints,
      pod count, and conditions for a single deployed agent.
    get:
      tags:
        - AgentOperation
      parameters:
        - $ref: "#/components/parameters/agentNamespace"
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          $ref: "#/components/responses/AgentRuntimeDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      operationId: getAgentRuntimeDetail
      summary: Get agent runtime detail
      description: Returns full runtime detail for a single deployed agent.
  /api/v1/agents/deploy:
    summary: Deploy a new agent runtime.
    description: >-
      Creates all Kubernetes resources (ServiceAccount, AgentRuntime CR, Deployment,
      Service, and optionally an OpenShift Route) for a new agent deployment.
    post:
      tags:
        - AgentOperation
      requestBody:
        required: true
        description: Agent deployment specification.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployAgentRequest"
            example:
              name: my-agent
              namespace: agent-ops-demo
              containerImage: quay.io/example/agent
              imageTag: v1.0.0
              protocol: a2a
              framework: langgraph
              createRoute: true
              envVars:
                - name: LOG_LEVEL
                  value: info
      responses:
        "201":
          $ref: "#/components/responses/DeployAgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: deployAgent
      summary: Deploy a new agent
      description: Creates all K8s resources for a new agent deployment.

components:
  schemas:
    Config:
      required:
        - userId
        - clusterAdmin
      type: object
      properties:
        userId:
          type: string
          example: user@example.com
        clusterAdmin:
          type: boolean
          example: true
    HealthCheckModel:
      type: object
      required:
        - status
        - system_info
      properties:
        status:
          type: string
          example: available
          description: BFF service availability status
        system_info:
          $ref: "#/components/schemas/SystemInfo"
    SystemInfo:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          example: "1.0.0"
          description: BFF version string
    Error:
      description: Error code and message.
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: Error code
          type: string
          example: BAD_REQUEST
        message:
          description: Error message
          type: string
          example: invalid request parameters
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/Error"
    AgentRuntime:
      description: A deployed agent or tool runtime.
      required:
        - name
        - namespace
        - status
        - type
        - endpointUrl
        - lastSyncTime
      type: object
      properties:
        name:
          type: string
          example: sample-support-agent
        namespace:
          type: string
          example: agent-ops-demo
        status:
          type: string
          description: Normalized deployment status (backend-specific values mapped to strings).
          example: Ready
        type:
          type: string
          description: Resource type label (e.g. agent, tool).
          example: agent
        endpointUrl:
          type: string
          format: uri
          example: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
        lastSyncTime:
          type: string
          format: date-time
          example: "2026-05-26T14:30:00Z"
    AgentRuntimesList:
      description: Collection of deployed agent runtimes.
      required:
        - runtimes
      type: object
      properties:
        runtimes:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/AgentRuntime"
        continueToken:
          type: string
          nullable: true
          description: Opaque token for fetching the next page. Omitted when all results fit in the current page.
    AgentServiceEndpoint:
      description: Network endpoint exposed by an agent runtime.
      required:
        - name
        - url
        - port
      type: object
      properties:
        name:
          type: string
          example: http
        url:
          type: string
          format: uri
          example: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
        port:
          type: integer
          example: 8080
    AgentRuntimeCondition:
      description: Kubernetes-style condition for an agent runtime.
      required:
        - type
        - status
        - lastTransitionTime
      type: object
      properties:
        type:
          type: string
          example: Ready
        status:
          type: string
          example: "True"
        reason:
          type: string
          example: MinimumReplicasAvailable
        message:
          type: string
          example: Deployment has minimum availability.
        lastTransitionTime:
          type: string
          format: date-time
          example: "2026-05-26T14:30:00Z"
    AgentRuntimeDetail:
      description: Full runtime view for a single deployed agent.
      required:
        - name
        - namespace
        - description
        - runtime
        - workloadStatus
        - serviceEndpoints
        - podCount
        - conditions
      type: object
      properties:
        name:
          type: string
          example: sample-support-agent
        namespace:
          type: string
          example: agent-ops-demo
        description:
          type: string
          example: Customer support agent that triages tickets and drafts responses.
        runtime:
          $ref: "#/components/schemas/AgentRuntime"
        workloadStatus:
          type: string
          description: High-level workload status from the monitoring backend.
          example: Available
        serviceEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/AgentServiceEndpoint"
        podCount:
          type: integer
          example: 2
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/AgentRuntimeCondition"
        agentCard:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AgentCardDetail"
    AgentCardProvider:
      type: object
      properties:
        organization:
          type: string
          example: Red Hat OpenShift AI
        url:
          type: string
          format: uri
          example: https://www.redhat.com/en/technologies/cloud-computing/openshift/ai
    AgentCardSkillParameter:
      type: object
      required:
        - name
        - required
      properties:
        name:
          type: string
          example: city
        type:
          type: string
          example: string
        description:
          type: string
          example: City name to get weather for
        required:
          type: boolean
          example: true
        default:
          type: string
    AgentCardSkill:
      type: object
      required:
        - id
        - name
        - tags
        - examples
        - inputModes
        - outputModes
        - parameters
      properties:
        id:
          type: string
          example: code-generation
        name:
          type: string
          example: Code generation
        description:
          type: string
          example: Generate or refactor code from natural language prompts with repository context.
        tags:
          type: array
          items:
            type: string
          example: ["development", "code"]
        examples:
          type: array
          items:
            type: string
          example: ["Add unit tests for the auth module"]
        inputModes:
          type: array
          items:
            type: string
          example: ["text/plain"]
        outputModes:
          type: array
          items:
            type: string
          example: ["text/plain"]
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/AgentCardSkillParameter"
    AgentCardCapabilities:
      type: object
      required:
        - streaming
        - pushNotifications
        - optional
      properties:
        streaming:
          type: boolean
          example: true
        pushNotifications:
          type: boolean
          example: false
        optional:
          type: array
          items:
            type: string
          example: ["Streaming"]
    AgentCardDetail:
      description: A2A agent card metadata for the agent detail UI.
      type: object
      required:
        - name
        - defaultInputModes
        - defaultOutputModes
        - capabilities
      properties:
        name:
          type: string
          example: Claude Code Development Agent
        description:
          type: string
          example: Assists developers with code generation, repository analysis, and test authoring.
        version:
          type: string
          example: "1.2.0"
        provider:
          $ref: "#/components/schemas/AgentCardProvider"
        agentCardUrl:
          type: string
          format: uri
          example: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080/.well-known/agent-card.json
        externalAgentCardUrl:
          description: >-
            Optional public agent card URL from an OpenShift Route targeting the agent Service.
            Omitted when no matching Route exists or Route lookup is unavailable.
          type: string
          format: uri
          example: https://sample-support-agent.apps.example.com/.well-known/agent-card.json
        documentationUrl:
          type: string
          format: uri
          example: https://docs.example.com/agents/claude-code
        iconUrl:
          type: string
          format: uri
        defaultInputModes:
          type: array
          items:
            type: string
          example: ["text/plain", "application/json"]
        defaultOutputModes:
          type: array
          items:
            type: string
          example: ["text/plain", "application/json"]
        authenticationMethods:
          type: array
          default: []
          items:
            type: string
          example: []
        protocols:
          type: array
          default: []
          items:
            type: string
          example: ["A2A", "HTTP"]
        labels:
          type: array
          default: []
          items:
            type: string
          example: ["Anthropic", "Claude Code"]
        skills:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/AgentCardSkill"
        capabilities:
          $ref: "#/components/schemas/AgentCardCapabilities"
        toolConnections:
          type: array
          default: []
          items:
            type: string
          example: []
        uuid:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        spiffeId:
          type: string
          example: spiffe://cluster.local/ns/team1/sa/claude-code-development-agent
        lastFetchTime:
          type: string
          format: date-time
          example: "2026-05-26T14:30:00Z"
        transportSecurity:
          type: string
          enum: [mtls, http]
          example: http
        validSignature:
          type: boolean
          example: true
        linkedSkills:
          type: array
          default: []
          items:
            type: string
          example: []
    DeployAgentRequest:
      description: Specification for deploying a new agent.
      required:
        - name
        - namespace
        - containerImage
        - imageTag
      type: object
      properties:
        name:
          type: string
          description: Agent name (DNS-1123 label).
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 63
          example: my-agent
        namespace:
          type: string
          description: Target Kubernetes namespace (DNS-1123 label).
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 63
          example: agent-ops-demo
        containerImage:
          type: string
          description: Container image reference (without tag).
          example: quay.io/example/agent
        imageTag:
          type: string
          description: Container image tag.
          example: v1.0.0
        imagePullSecret:
          type: string
          description: Name of an existing image pull secret in the target namespace.
          example: my-pull-secret
        protocol:
          type: string
          description: Agent communication protocol.
          enum: [a2a, mcp]
          default: a2a
          example: a2a
        framework:
          type: string
          description: Agent framework identifier (valid K8s label value, max 63 chars).
          pattern: '^[a-zA-Z0-9]([-a-zA-Z0-9_.]*[a-zA-Z0-9])?$'
          maxLength: 63
          example: langgraph
        envVars:
          type: array
          description: Environment variables injected into the agent container.
          items:
            $ref: "#/components/schemas/DeployAgentEnvVar"
        servicePorts:
          type: array
          description: Service port mappings. Defaults to http 8080→8000/TCP if omitted.
          items:
            $ref: "#/components/schemas/DeployAgentServicePort"
        createRoute:
          type: boolean
          description: Whether to create an OpenShift Route for external access.
          default: false
          example: true
        authBridgeEnabled:
          type: boolean
          description: Whether to enable kagenti AuthBridge sidecar injection.
          default: true
          example: true
        authBridgeMode:
          type: string
          description: AuthBridge sidecar mode.
          enum: [proxy-sidecar, envoy-sidecar, lite, waypoint]
          example: proxy-sidecar
        mtlsMode:
          type: string
          description: Mutual TLS mode for the agent.
          enum: [disabled, permissive, strict]
          example: disabled
    DeployAgentEnvVar:
      description: An environment variable for an agent container.
      required:
        - name
        - value
      type: object
      properties:
        name:
          type: string
          example: LOG_LEVEL
        value:
          type: string
          example: info
    DeployAgentServicePort:
      description: A service port mapping for an agent.
      required:
        - name
        - port
        - targetPort
      type: object
      properties:
        name:
          type: string
          example: http
        port:
          type: integer
          minimum: 1
          maximum: 65535
          example: 8080
        targetPort:
          type: integer
          minimum: 1
          maximum: 65535
          example: 8000
        protocol:
          type: string
          default: TCP
          example: TCP
    DeployAgentResult:
      description: Result of a successful agent deployment.
      required:
        - success
        - name
        - namespace
      type: object
      properties:
        success:
          type: boolean
          example: true
        name:
          type: string
          example: my-agent
        namespace:
          type: string
          example: agent-ops-demo
        message:
          type: string
          example: Agent deployed successfully
  responses:
    HealthCheckResponse:
      description: BFF service health status
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthCheckModel"
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: The specified resource was not found
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Bad Request parameters
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Unauthorized
    Conflict:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: A resource with the same name already exists
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: The caller does not have permission to access the requested agent
    ServiceUnavailable:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Upstream Kubernetes or agent data source is unavailable
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
      description: Unexpected internal server error
    ConfigResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                type: object
                description: Metadata about the response
              data:
                $ref: "#/components/schemas/Config"
      description: A response containing a list of Config entities.
    AgentRuntimesResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                type: object
                description: Metadata about the response
              data:
                $ref: "#/components/schemas/AgentRuntimesList"
          examples:
            default:
              value:
                metadata:
                  requestId: req-agent-runtimes-001
                  status: ok
                  timestamp: "2026-05-12T16:00:03.214610Z"
                data:
                  runtimes:
                    - name: sample-support-agent
                      namespace: agent-ops-demo
                      status: Ready
                      type: agent
                      endpointUrl: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
                      lastSyncTime: "2026-05-12T16:00:03.214610Z"
      description: A response containing deployed agent runtimes.
    AgentRuntimeDetailResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                type: object
                description: Metadata about the response
              data:
                $ref: "#/components/schemas/AgentRuntimeDetail"
          examples:
            default:
              value:
                metadata:
                  requestId: req-agent-runtime-detail-001
                  status: ok
                  timestamp: "2026-05-12T16:00:03.214610Z"
                data:
                  name: sample-support-agent
                  namespace: agent-ops-demo
                  description: Customer support agent that triages tickets and drafts responses.
                  runtime:
                    name: sample-support-agent
                    namespace: agent-ops-demo
                    status: Ready
                    type: agent
                    endpointUrl: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
                    lastSyncTime: "2026-05-12T16:00:03.214610Z"
                  workloadStatus: Ready
                  serviceEndpoints:
                    - name: http
                      url: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
                      port: 8080
                  podCount: 2
                  conditions:
                    - type: Available
                      status: "True"
                      reason: MinimumReplicasAvailable
                      message: Deployment has minimum availability.
                      lastTransitionTime: "2026-05-12T16:00:03.214610Z"
                  agentCard:
                    name: Sample Support Agent
                    description: Customer support agent that triages tickets and drafts responses.
                    version: "1.0.0"
                    provider:
                      organization: Red Hat OpenShift AI
                      url: https://www.redhat.com/en/technologies/cloud-computing/openshift/ai
                    agentCardUrl: http://sample-support-agent.agent-ops-demo.svc.cluster.local:8080/.well-known/agent-card.json
                    externalAgentCardUrl: https://sample-support-agent.apps.example.com/.well-known/agent-card.json
                    documentationUrl: https://docs.example.com/agents/sample-support-agent
                    defaultInputModes: ["text/plain"]
                    defaultOutputModes: ["text/plain"]
                    authenticationMethods: ["Bearer"]
                    protocols: ["A2A", "HTTP"]
                    labels: ["Red Hat OpenShift AI", "Sample Support Agent"]
                    skills:
                      - id: triage-ticket
                        name: Triage ticket
                        description: Classify and prioritize incoming support tickets.
                        tags: ["support"]
                        examples: ["Triage this customer issue"]
                        inputModes: ["text/plain"]
                        outputModes: ["text/plain"]
                        parameters: []
                    capabilities:
                      streaming: true
                      pushNotifications: false
                      optional: ["Streaming"]
                    toolConnections: []
                    uuid: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                    spiffeId: spiffe://cluster.local/ns/agent-ops-demo/sa/default
                    lastFetchTime: "2026-05-12T16:00:03.214610Z"
                    transportSecurity: http
                    validSignature: true
                    linkedSkills: ["summarizer"]
      description: A response containing full agent runtime detail.
    DeployAgentResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/DeployAgentResult"
          examples:
            default:
              value:
                data:
                  success: true
                  name: my-agent
                  namespace: agent-ops-demo
                  message: Agent deployed successfully
      description: A response confirming successful agent deployment.


  parameters:
    agentNamespace:
      name: ns
      description: Kubernetes namespace of the agent.
      schema:
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        maxLength: 63
      in: path
      required: true
      example: agent-ops-demo
    agentName:
      name: name
      description: Name of the agent resource.
      schema:
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        maxLength: 63
      in: path
      required: true
      example: sample-support-agent

  securitySchemes:
    Bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Bearer JWT scheme
security:
  - Bearer: []
tags:
  - name: K8SOperation
    description: Operation performed in Kubernetes
  - name: AgentOperation
    description: Agent runtime operations
