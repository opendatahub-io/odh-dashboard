openapi: 3.0.3
info:
  title: Agent Ops REST API
  version: 1.0.0
  description: REST API Agent Ops BFF
  license:
    name: Apache 2.0
    url: "https://www.apache.org/licenses/LICENSE-2.0"
servers:
  - url: "https://localhost:8080"
  - url: "http://localhost:8080"
paths:
  /healthcheck:
    summary: Path targeted for healthcheck purposes.
    description: >-
      The REST endpoint/path used to allow a healthcheck update.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          description: "Ok"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: healthcheck
      summary: HealthCheck
      description: HealthCheck endpoint.
  /api/v1/namespaces:
    summary: Path used to get available namespaces.
    description: >-
      The REST endpoint/path used to list available namespaces.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          description: "Ok"
          content:
            application/json:
              schema:
                type: object
                properties:
                  metadata:
                    type: object
                    description: Metadata about the response
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                        example: default-namespace
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getNamespaces
      summary: Get Available Namespaces
      description: Returns available namespaces in the cluster.
  /api/v1/user:
    summary: Path used to Retrieve a user based on the header.
    description: >-
      The REST endpoint/path used pass all the config information needed for the UI.
    get:
      tags:
        - K8SOperation
      responses:
        "200":
          $ref: "#/components/responses/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getConfig
      summary: Get configuration info
      description: Gets the configuration information needed for the UI [TBD]
  /api/v1/agents/runtimes:
    summary: List deployed agent runtimes.
    description: >-
      Returns deployed agents and tools with runtime status and endpoint details.
    get:
      tags:
        - AgentOperation
      responses:
        "200":
          $ref: "#/components/responses/AgentRuntimesResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: listAgentRuntimes
      summary: List agent runtimes
      description: Returns deployed agent and tool runtimes.
  /api/v1/agents/runtimes/{ns}/{name}:
    summary: Get agent runtime detail.
    description: >-
      Returns full agent detail, runtime info, workload status, service endpoints,
      pod count, and conditions for a single deployed agent.
    get:
      tags:
        - AgentOperation
      parameters:
        - $ref: "#/components/parameters/agentNamespace"
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          $ref: "#/components/responses/AgentRuntimeDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getAgentRuntimeDetail
      summary: Get agent runtime detail
      description: Returns full runtime detail for a single deployed agent.
  /api/v1/agents/cards/{ns}/{name}:
    summary: Get agent discovery card.
    description: >-
      Returns agent card metadata including skills, capabilities, provider info,
      and supported input/output modes.
    get:
      tags:
        - AgentOperation
      parameters:
        - $ref: "#/components/parameters/agentNamespace"
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          $ref: "#/components/responses/AgentCardResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: getAgentCard
      summary: Get agent card
      description: Returns the agent discovery card for a single agent.
components:
  schemas:
    Config:
      required:
        - userId
        - clusterAdmin
      type: object
      properties:
        userId:
          type: string
          example: user@example.com
        clusterAdmin:
          type: boolean
          example: true
    BaseResource:
      allOf:
        - $ref: "#/components/schemas/BaseResourceCreate"
        - type: object
          properties:
            id:
              format: int64
              description: Output only. The unique server generated id of the resource.
              type: string
              readOnly: true
            createTimeSinceEpoch:
              format: int64
              description: Output only. Create time of the resource in millisecond since epoch.
              type: string
              readOnly: true
            lastUpdateTimeSinceEpoch:
              format: int64
              description: |-
                Output only. Last update time of the resource since epoch in millisecond
                since epoch.
              type: string
              readOnly: true
    BaseResourceCreate:
      allOf:
        - $ref: "#/components/schemas/BaseResourceUpdate"
        - type: object
          properties:
            name:
              description: |-
                The client provided name of the artifact. This field is optional. If set,
                it must be unique among all the artifacts of the same artifact type within
                a database instance and cannot be changed once set.
              type: string
    BaseResourceUpdate:
      type: object
      properties:
        customProperties:
          description: User provided custom properties which are not defined by its type.
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MetadataValue"
        description:
          description: |-
            An optional description about the resource.
          type: string
        externalId:
          description: |-
            The external id that come from the clients' system. This field is optional.
            If set, it must be unique among all resources within a database instance.
          type: string

    Error:
      description: Error code and message.
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: Error code
          type: string
        message:
          description: Error message
          type: string
    SortOrder:
      description: Supported sort direction for ordering result entities.
      enum:
        - ASC
        - DESC
      type: string
    OrderByField:
      description: Supported fields for ordering result entities.
      enum:
        - CREATE_TIME
        - LAST_UPDATE_TIME
        - Id
      type: string
    AgentRuntime:
      description: A deployed agent or tool runtime.
      required:
        - name
        - namespace
        - status
        - type
        - endpointUrl
        - lastSyncTime
      type: object
      properties:
        name:
          type: string
          example: sample-support-agent
        namespace:
          type: string
          example: agent-ops-demo
        status:
          type: string
          description: Normalized deployment status (backend-specific values mapped to strings).
          example: Ready
        type:
          type: string
          description: Resource type label (e.g. Agent, Tool).
          example: Agent
        endpointUrl:
          type: string
          format: uri
          example: https://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
        lastSyncTime:
          type: string
          format: date-time
          example: "2026-05-26T14:30:00Z"
    AgentRuntimesList:
      description: Collection of deployed agent runtimes.
      required:
        - runtimes
      type: object
      properties:
        runtimes:
          type: array
          items:
            $ref: "#/components/schemas/AgentRuntime"
    AgentServiceEndpoint:
      description: Network endpoint exposed by an agent runtime.
      required:
        - name
        - url
        - port
      type: object
      properties:
        name:
          type: string
          example: http
        url:
          type: string
          format: uri
          example: https://sample-support-agent.agent-ops-demo.svc.cluster.local:8080
        port:
          type: integer
          example: 8080
    AgentRuntimeCondition:
      description: Kubernetes-style condition for an agent runtime.
      required:
        - type
        - status
        - lastTransitionTime
      type: object
      properties:
        type:
          type: string
          example: Ready
        status:
          type: string
          example: "True"
        reason:
          type: string
          example: MinimumReplicasAvailable
        message:
          type: string
          example: Deployment has minimum availability.
        lastTransitionTime:
          type: string
          format: date-time
          example: "2026-05-26T14:30:00Z"
    AgentRuntimeDetail:
      description: Full runtime view for a single deployed agent.
      required:
        - name
        - namespace
        - description
        - runtime
        - workloadStatus
        - serviceEndpoints
        - podCount
        - conditions
      type: object
      properties:
        name:
          type: string
          example: sample-support-agent
        namespace:
          type: string
          example: agent-ops-demo
        description:
          type: string
          example: Customer support agent that triages tickets and drafts responses.
        runtime:
          $ref: "#/components/schemas/AgentRuntime"
        workloadStatus:
          type: string
          description: High-level workload status from the monitoring backend.
          example: Available
        serviceEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/AgentServiceEndpoint"
        podCount:
          type: integer
          example: 2
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/AgentRuntimeCondition"
    AgentSkill:
      description: Skill exposed by an agent.
      required:
        - id
        - name
        - description
      type: object
      properties:
        id:
          type: string
          example: ticket-triage
        name:
          type: string
          example: Ticket triage
        description:
          type: string
          example: Classifies incoming support tickets by priority and topic.
    AgentCapabilities:
      description: Optional protocol features supported by the agent.
      required:
        - streaming
        - pushNotifications
      type: object
      properties:
        streaming:
          type: boolean
          example: true
        pushNotifications:
          type: boolean
          example: true
    AgentProvider:
      description: Agent provider metadata.
      required:
        - name
      type: object
      properties:
        name:
          type: string
          example: opendatahub
        displayName:
          type: string
          example: Open Data Hub
        url:
          type: string
          format: uri
          example: https://opendatahub.io
    AgentCard:
      description: Agent discovery card for a single agent.
      required:
        - name
        - namespace
        - description
        - version
        - skills
        - capabilities
        - provider
        - supportedInputModes
        - supportedOutputModes
      type: object
      properties:
        name:
          type: string
          example: sample-support-agent
        namespace:
          type: string
          example: agent-ops-demo
        description:
          type: string
          example: Customer support agent that triages tickets and drafts responses.
        version:
          type: string
          example: 1.2.0
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkill"
        capabilities:
          $ref: "#/components/schemas/AgentCapabilities"
        provider:
          $ref: "#/components/schemas/AgentProvider"
        supportedInputModes:
          type: array
          items:
            type: string
          example:
            - text
            - application/json
        supportedOutputModes:
          type: array
          items:
            type: string
          example:
            - text
            - application/json

  responses:
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: The specified resource was not found
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Bad Request parameters
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Unauthorized
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Unexpected internal server error
    ConfigResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                type: object
                description: Metadata about the response
              data:
                $ref: "#/components/schemas/Config"
      description: A response containing a list of Config entities.
    AgentRuntimesResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/AgentRuntimesList"
      description: A response containing deployed agent runtimes.
    AgentRuntimeDetailResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/AgentRuntimeDetail"
      description: A response containing full agent runtime detail.
    AgentCardResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/AgentCard"
      description: A response containing an agent discovery card.
    ConflictResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Conflict - Role Binding with the same name already exists

  parameters:
    id:
      name: id
      description: The ID of resource.
      schema:
        type: string
      in: path
      required: true
    name:
      examples:
        name:
          value: entity-name
      name: name
      description: Name of entity to search.
      schema:
        type: string
      in: query
      required: false
    externalId:
      examples:
        externalId:
          value: "10"
      name: externalId
      description: External ID of entity to search.
      schema:
        type: string
      in: query
      required: false
    parentResourceId:
      examples:
        parentResourceId:
          value: "10"
      name: parentResourceId
      description: ID of the parent resource to use for search.
      schema:
        type: string
      in: query
      required: false
    pageSize:
      examples:
        pageSize:
          value: "100"
      name: pageSize
      description: Number of entities in each page.
      schema:
        type: string
      in: query
      required: false
    nextPageToken:
      name: nextPageToken
      description: Token to use to retrieve next page of results.
      schema:
        type: string
      in: query
      required: false
    orderBy:
      style: form
      explode: true
      examples:
        orderBy:
          value: Id
      name: orderBy
      description: Specifies the order by criteria for listing entities.
      schema:
        $ref: "#/components/schemas/OrderByField"
      in: query
      required: false
    sortOrder:
      style: form
      explode: true
      examples:
        sortOrder:
          value: DESC
      name: sortOrder
      description: "Specifies the sort order for listing entities, defaults to ASC."
      schema:
        $ref: "#/components/schemas/SortOrder"
      in: query
      required: false
    namespace:
      name: namespace
      description: The namespace to filter resources by.
      schema:
        type: string
      in: query
      required: false
    agentNamespace:
      name: ns
      description: Kubernetes namespace of the agent.
      schema:
        type: string
      in: path
      required: true
      example: agent-ops-demo
    agentName:
      name: name
      description: Name of the agent resource.
      schema:
        type: string
      in: path
      required: true
      example: sample-support-agent

  securitySchemes:
    Bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Bearer JWT scheme
security:
  - Bearer: []
tags:
  - name: K8SOperation
    description: Operation performed in Kubernetes
  - name: AgentOperation
    description: Agent runtime operations
